<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>历史成绩 - {{ username }}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #333;
    padding: 24px 16px;
  }

  h1 {
    color: #fff;
    font-size: 26px;
    font-weight: 900;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    margin-bottom: 8px;
  }

  .subtitle {
    color: rgba(255,255,255,0.8);
    font-size: 15px;
    margin-bottom: 24px;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    width: 100%;
    max-width: 760px;
    padding: 24px 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    margin-bottom: 18px;
  }

  .section-title {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    color: #2d3748;
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 14px;
  }

  .section-title span {
    color: #718096;
    font-size: 13px;
    font-weight: 600;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    padding: 12px 10px;
    text-align: center;
    font-size: 15px;
  }

  th {
    background: #f7fafc;
    color: #5a67d8;
    font-weight: 700;
    font-size: 14px;
    border-bottom: 2px solid #e2e8f0;
  }

  tr:not(:last-child) td {
    border-bottom: 1px solid #edf2f7;
  }

  tr:hover td {
    background: #f0f4ff;
  }

  td { color: #2d3748; }

  .accuracy-high { color: #38a169; font-weight: 700; }
  .accuracy-mid { color: #d69e2e; font-weight: 700; }
  .accuracy-low { color: #e53e3e; font-weight: 700; }

  .wrong-chars {
    margin-top: 4px; font-size: 16px; font-weight: 700; color: #2d3748;
    word-break: break-all; line-height: 1.4; max-width: 220px;
  }

  .wrong-preview {
    margin-top: 5px;
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .wrong-preview a {
    color: #2d3748;
    font-size: 16px;
    font-weight: 800;
    text-decoration: none;
  }

  .wrong-book-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .wrong-group {
    border: 1px solid #edf2f7;
    border-radius: 12px;
    overflow: hidden;
  }

  .wrong-group-title {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 9px 12px;
    background: #fff5f5;
    color: #c53030;
    font-size: 14px;
    font-weight: 800;
  }

  .wrong-item {
    display: grid;
    grid-template-columns: 52px 1fr;
    gap: 12px;
    padding: 12px;
  }

  .wrong-item:not(:last-child) { border-bottom: 1px solid #edf2f7; }

  .wrong-char {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    background: #f7fafc;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #2d3748;
    font-size: 26px;
    font-weight: 900;
  }

  .wrong-main {
    text-align: left;
    min-width: 0;
  }

  .wrong-question {
    color: #2d3748;
    font-size: 15px;
    font-weight: 800;
    margin-bottom: 5px;
  }

  .wrong-meta {
    color: #4a5568;
    font-size: 13px;
    line-height: 1.55;
  }

  .wrong-source {
    margin-top: 5px;
    font-size: 12px;
  }

  .wrong-source a,
  .score-link {
    color: #5a67d8;
    font-weight: 700;
    text-decoration: underline;
  }

  .untraced-note {
    margin-top: 5px;
    color: #a0aec0;
    font-size: 12px;
  }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: #a0aec0;
    font-size: 16px;
  }

  .back-btn {
    margin-top: 20px;
    padding: 10px 32px;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 20px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: all 0.2s;
  }

  .back-btn:hover { background: rgba(255,255,255,0.3); }

  @media (max-width: 420px) {
    th, td { padding: 10px 6px; font-size: 13px; }
    .card { padding: 16px 12px; }
  }
</style>
</head>
<body>

<h1>历史成绩</h1>
<p class="subtitle">{{ username }}</p>

<div class="card" id="wrongBookCard">
  <div class="section-title">错题本 <span id="wrongBookSummary"></span></div>
  <div class="wrong-book-list" id="wrongBookContent">
    <div class="empty">加载中...</div>
  </div>
</div>

<div class="card">
  <div class="section-title">成绩记录 <span>错题数按第一次答错固定</span></div>
  <table>
    <thead>
      <tr>
        <th>日期</th>
        <th>来源</th>
        <th>题数</th>
        <th>正确</th>
        <th>正确率</th>
        <th>错题</th>
      </tr>
    </thead>
    <tbody id="scoreBody">
      <tr><td colspan="6" class="empty">加载中...</td></tr>
    </tbody>
  </table>
</div>

<button class="back-btn" onclick="window.close()">关闭</button>

<script>
function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
const MODE_LABELS = {
  char_to_pinyin: "看字选拼音",
  pinyin_to_char: "看拼音选字",
  listen_to_char: "听音选字",
  pinyin_typing: "给汉字注音",
  dictation_handwrite: "看拼音写词语",
  read_aloud: "看字读音",
};

function groupByDate(items) {
  return items.reduce((acc, item) => {
    const key = String(item.source_date || item.date || "");
    if (!acc[key]) acc[key] = [];
    acc[key].push(item);
    return acc;
  }, {});
}

function renderWrongBook(items) {
  const box = document.getElementById("wrongBookContent");
  const summary = document.getElementById("wrongBookSummary");
  summary.textContent = items.length ? `${items.length} 题` : "";
  if (!items.length) {
    box.innerHTML = '<div class="empty">暂无可追溯错题</div>';
    return;
  }

  const grouped = groupByDate(items);
  box.innerHTML = Object.keys(grouped).sort().reverse().map(date => {
    const rows = grouped[date];
    return `<section class="wrong-group" id="wrong-date-${esc(date)}">
      <div class="wrong-group-title">
        <span>${esc(date)}</span>
        <span>${rows.length} 题</span>
      </div>
      ${rows.map(w => {
        const mode = MODE_LABELS[w.mode] || w.mode || "";
        const question = w.question || w.character || "";
        const correct = w.correct_answer || w.pinyin || w.character || "";
        const user = w.user_answer ? `第一次答成: ${esc(w.user_answer)}` : "第一次答错";
        const sourceLabel = w.source_label || w.source || "未知来源";
        return `<div class="wrong-item" id="wrong-${w.id}">
          <div class="wrong-char">${esc(w.character || question || "?")}</div>
          <div class="wrong-main">
            <div class="wrong-question">题目: ${esc(question)}</div>
            <div class="wrong-meta">
              正确答案: <strong>${esc(correct)}</strong> · ${user}<br>
              ${esc(w.grade || "")} · ${esc(mode)}${w.words ? ` · 组词: ${esc(w.words)}` : ""}
            </div>
            <div class="wrong-source">来源: <a href="#score-${esc(date)}">${esc(sourceLabel)}</a></div>
          </div>
        </div>`;
      }).join("")}
    </section>`;
  }).join("");
}

async function loadScores() {
  const res = await fetch("/api/scores");
  const data = await res.json();
  const body = document.getElementById("scoreBody");
  body.innerHTML = "";
  renderWrongBook(data.wrong_book || []);

  if (!data.scores || data.scores.length === 0) {
    body.innerHTML = '<tr><td colspan="6" class="empty">暂无成绩记录</td></tr>';
    return;
  }

  data.scores.forEach(s => {
    const tr = document.createElement("tr");
    const total = s.total_questions || 0;
    const correct = s.correct_answers || 0;
    const pct = total > 0 ? Math.round(correct / total * 100) : 0;
    let cls = "accuracy-low";
    if (pct >= 80) cls = "accuracy-high";
    else if (pct >= 60) cls = "accuracy-mid";
    const wrongCount = s.wrong_count || 0;
    const wrongItems = s.wrong_items || [];
    const untraced = s.untraced_wrong_count || 0;
    let wrongCell;
    if (wrongCount > 0) {
      const traceableHtml = wrongItems.length > 0
        ? `<div class="wrong-preview">${wrongItems.slice(0, 8).map(w => `<a href="#wrong-${w.id}" title="${esc(w.source_label || "")}">${esc(w.character || "?")}</a>`).join("")}</div>`
        : '';
      const untracedHtml = untraced > 0
        ? `<div class="untraced-note">另有 ${untraced} 题旧记录仅能追溯数量</div>`
        : '';
      const target = wrongItems.length > 0 ? `#wrong-date-${s.date}` : '#wrongBookCard';
      wrongCell = `<a class="score-link" href="${target}">${wrongCount}题</a>${traceableHtml}${untracedHtml}`;
    } else {
      wrongCell = '<span style="color:#a0aec0">-</span>';
    }

    tr.id = `score-${s.date}`;
    tr.innerHTML = `
      <td>${esc(s.date || "")}</td>
      <td style="font-size:12px;color:#718096">${esc(s.source || "")}</td>
      <td>${total}</td>
      <td>${correct}</td>
      <td class="${cls}">${total > 0 ? pct + "%" : "-"}</td>
      <td>${wrongCell}</td>
    `;
    body.appendChild(tr);
  });
}

loadScores();
</script>
</body>
</html>
