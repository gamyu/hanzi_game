<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>联系管理员</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh; color: #2d3748; padding: 24px 16px;
    display: flex; flex-direction: column; align-items: center;
  }
  .top-nav {
    width: 100%; max-width: 720px; display: flex; justify-content: space-between;
    margin-bottom: 16px; color: #fff;
  }
  .top-nav a { color: #fff; text-decoration: none; font-size: 14px; opacity: 0.9; }
  .top-nav a:hover { opacity: 1; }
  h1 { color: #fff; font-size: 26px; font-weight: 900; text-shadow: 0 2px 8px rgba(0,0,0,0.2); margin-bottom: 6px; }
  .subtitle { color: rgba(255,255,255,0.85); font-size: 14px; margin-bottom: 20px; }
  .card {
    width: 100%; max-width: 560px; background: #fff; border-radius: 14px;
    padding: 22px 22px 18px; box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  }
  .card h2 { font-size: 17px; color: #2d3748; margin-bottom: 4px; }
  .card .hint { font-size: 13px; color: #718096; margin-bottom: 14px; }
  label { display:block; font-size: 13px; color:#4a5568; margin: 10px 0 4px; font-weight: 600; }
  input[type=text], input[type=email], textarea {
    width: 100%; padding: 9px 11px; border: 1px solid #cbd5e0; border-radius: 8px;
    font-size: 14px; font-family: inherit; background: #f7fafc;
  }
  input[type=text]:focus, input[type=email]:focus, textarea:focus {
    outline: none; border-color: #667eea; background: #fff;
    box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
  }
  textarea { min-height: 140px; resize: vertical; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 14px; }
  button.primary {
    background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
    border: none; padding: 10px 22px; border-radius: 8px; font-size: 15px;
    font-weight: 700; cursor: pointer;
  }
  button.primary:disabled { opacity: 0.6; cursor: not-allowed; }
  button.primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.3); }
  .mailto-btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px;
    background: #fff; color: #5a67d8; border: 1px solid #cbd5e0; border-radius: 8px;
    text-decoration: none; font-size: 14px; font-weight: 600;
  }
  .mailto-btn:hover { border-color: #667eea; background: #f0f4ff; }
  .msg { margin-top: 12px; font-size: 13px; padding: 8px 12px; border-radius: 8px; }
  .msg.ok { background: #f0fff4; color: #22543d; border: 1px solid #9ae6b4; }
  .msg.err { background: #fff5f5; color: #822727; border: 1px solid #feb2b2; }
  .fallback {
    margin-top: 16px; padding-top: 14px; border-top: 1px dashed #e2e8f0;
    font-size: 13px; color: #718096;
  }
  .fallback strong { color: #2d3748; }
  .char-counter { font-size: 12px; color: #a0aec0; text-align: right; margin-top: 4px; }
</style>
</head>
<body>

<div class="top-nav">
  <a href="/">← 返回游戏</a>
  <span>{% if username %}{{ username }}{% endif %}</span>
</div>

<h1>📮 联系管理员</h1>
<div class="subtitle">你可以在下面留言，或直接发邮件给管理员</div>

<div class="card">
  <h2>在线留言</h2>
  <div class="hint">提交后系统会自动把留言转发到管理员邮箱。</div>

  <label for="c-username">姓名 / 用户名 <span style="color:#a0aec0;font-weight:400">(选填)</span></label>
  <input type="text" id="c-username" maxlength="50" placeholder="便于管理员识别你">

  <label for="c-email">回复邮箱 <span style="color:#a0aec0;font-weight:400">(选填，如需回复请填写)</span></label>
  <input type="email" id="c-email" maxlength="200" placeholder="you@example.com">

  <label for="c-subject">主题 <span style="color:#a0aec0;font-weight:400">(选填)</span></label>
  <input type="text" id="c-subject" maxlength="200" placeholder="一句话说明留言主题">

  <label for="c-message">留言内容 <span style="color:#e53e3e">*</span></label>
  <textarea id="c-message" maxlength="4000" placeholder="请写下你的建议、问题或反馈..."></textarea>
  <div class="char-counter"><span id="cCount">0</span> / 4000</div>

  <div class="row">
    <button id="cSubmit" class="primary" onclick="submitContact()">提交留言</button>
    <a class="mailto-btn" id="cMailto" href="#">✉️ 直接发邮件</a>
  </div>
  <div id="cMsg" class="msg" style="display:none"></div>

  <div class="fallback">
    你也可以直接发邮件到 <strong>{{ admin_email }}</strong>。
  </div>
</div>

<script>
const ADMIN_EMAIL = "{{ admin_email }}";

function buildMailtoLink() {
  const name = document.getElementById("c-username").value.trim();
  const subject = document.getElementById("c-subject").value.trim();
  const message = document.getElementById("c-message").value.trim();
  const email = document.getElementById("c-email").value.trim();
  const bodyLines = [];
  if (name) bodyLines.push(`来自: ${name}`);
  if (email) bodyLines.push(`回复邮箱: ${email}`);
  if (bodyLines.length) bodyLines.push("");
  bodyLines.push(message || "");
  const params = new URLSearchParams();
  params.set("subject", subject || "汉字游戏 留言");
  params.set("body", bodyLines.join("\n"));
  return `mailto:${ADMIN_EMAIL}?${params.toString()}`;
}

function refreshMailto() {
  document.getElementById("cMailto").href = buildMailtoLink();
}

["c-username", "c-email", "c-subject", "c-message"].forEach(id => {
  document.getElementById(id).addEventListener("input", refreshMailto);
});
document.getElementById("c-message").addEventListener("input", () => {
  document.getElementById("cCount").textContent = document.getElementById("c-message").value.length;
});
refreshMailto();

async function submitContact() {
  const username = document.getElementById("c-username").value.trim();
  const reply_email = document.getElementById("c-email").value.trim();
  const subject = document.getElementById("c-subject").value.trim();
  const message = document.getElementById("c-message").value.trim();
  const msgEl = document.getElementById("cMsg");
  const btn = document.getElementById("cSubmit");

  msgEl.style.display = "none";
  if (!message) {
    msgEl.className = "msg err"; msgEl.textContent = "请填写留言内容"; msgEl.style.display = "";
    return;
  }
  btn.disabled = true; btn.textContent = "提交中...";
  try {
    const res = await fetch("/api/contact", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, reply_email, subject, message }),
    });
    const data = await res.json();
    if (!res.ok || data.error) {
      msgEl.className = "msg err";
      msgEl.textContent = data.error || "提交失败，请稍后再试";
      msgEl.style.display = "";
    } else {
      msgEl.className = "msg ok";
      msgEl.textContent = data.email_sent
        ? `✓ 留言已提交并发送到管理员邮箱 (${data.admin_email})`
        : `✓ 留言已保存，管理员会在后台查看。如需直接发送邮件，请使用下方按钮。`;
      msgEl.style.display = "";
      document.getElementById("c-subject").value = "";
      document.getElementById("c-message").value = "";
      document.getElementById("cCount").textContent = "0";
      refreshMailto();
    }
  } catch (e) {
    msgEl.className = "msg err";
    msgEl.textContent = "网络错误，请稍后再试";
    msgEl.style.display = "";
  } finally {
    btn.disabled = false; btn.textContent = "提交留言";
  }
}
</script>

</body>
</html>
