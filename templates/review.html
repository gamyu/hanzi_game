<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>错题复习 - {{ username }}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #e53e3e 0%, #c53030 50%, #9b2c2c 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #333;
    padding: 24px 16px;
  }

  h1 {
    color: #fff;
    font-size: 26px;
    font-weight: 900;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    margin-bottom: 4px;
  }

  .subtitle {
    color: rgba(255,255,255,0.85);
    font-size: 15px;
    margin-bottom: 24px;
  }

  /* --- Tab bar --- */
  .tab-bar {
    display: flex;
    gap: 0;
    margin-bottom: 16px;
    width: 100%;
    max-width: 700px;
  }

  .tab-btn {
    flex: 1;
    padding: 10px 0;
    border: 2px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.8);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn:first-child { border-radius: 12px 0 0 12px; }
  .tab-btn:last-child { border-radius: 0 12px 12px 0; }

  .tab-btn.active {
    background: rgba(255,255,255,0.9);
    color: #c53030;
    border-color: #fff;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    width: 100%;
    max-width: 700px;
    padding: 24px 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }

  .filter-card {
    margin-bottom: 14px;
  }

  .filter-heading {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }

  .filter-title {
    color: #2d3748;
    font-size: 18px;
    font-weight: 900;
  }

  .filter-summary {
    color: #718096;
    font-size: 13px;
    font-weight: 800;
    white-space: nowrap;
  }

  .filter-row {
    display: flex;
    gap: 12px;
    align-items: end;
    flex-wrap: wrap;
  }

  .filter-field {
    flex: 1 1 180px;
  }

  .filter-action {
    flex: 0 0 auto;
  }

  .filter-start-btn {
    border: 0;
    border-radius: 12px;
    background: #c53030;
    color: #fff;
    cursor: pointer;
    font: inherit;
    font-weight: 900;
    min-height: 42px;
    padding: 10px 18px;
    white-space: nowrap;
  }

  .filter-start-btn:hover {
    background: #9b2c2c;
  }

  .filter-field label {
    display: block;
    color: #4a5568;
    font-size: 13px;
    font-weight: 800;
    margin-bottom: 5px;
  }

  .filter-field select {
    width: 100%;
    border: 1px solid #cbd5e0;
    border-radius: 10px;
    background: #f7fafc;
    color: #2d3748;
    font: inherit;
    padding: 9px 10px;
  }

  .group-row td {
    background: #f7fafc;
    color: #4a5568;
    font-size: 13px;
    font-weight: 900;
    text-align: left;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    padding: 12px 8px;
    text-align: center;
    font-size: 14px;
  }

  th {
    background: #fff5f5;
    color: #c53030;
    font-weight: 700;
    font-size: 13px;
    border-bottom: 2px solid #fed7d7;
    white-space: nowrap;
  }

  .mastered-card th {
    background: #f0fff4;
    color: #276749;
    border-bottom: 2px solid #c6f6d5;
  }

  tr:not(:last-child) td {
    border-bottom: 1px solid #edf2f7;
  }

  tr:hover td { background: #fff5f5; }
  .mastered-card tr:hover td { background: #f0fff4; }

  td { color: #2d3748; }

  .char-cell {
    font-size: 32px;
    font-weight: 900;
    color: #2d3748;
  }

  .pinyin-cell {
    color: #5a67d8;
    font-weight: 600;
  }

  .mode-cell {
    font-size: 12px;
    color: #718096;
  }

  .date-cell {
    font-size: 12px;
    color: #a0aec0;
    white-space: nowrap;
  }

  .review-count-cell {
    font-weight: 700;
    font-size: 15px;
  }

  .review-count-0 { color: #e53e3e; }
  .review-count-1 { color: #dd6b20; }
  .review-count-2 { color: #d69e2e; }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: #a0aec0;
    font-size: 16px;
  }

  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .action-btn {
    padding: 10px 32px;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 20px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: all 0.2s;
  }

  .action-btn:hover { background: rgba(255,255,255,0.3); }

  .action-btn.primary {
    background: rgba(255,255,255,0.9);
    color: #c53030;
    border-color: #fff;
  }

  .action-btn.primary:hover { background: #fff; }

  /* --- Quiz overlay --- */
  .quiz-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }

  .quiz-overlay.active { display: flex; }

  .quiz-box {
    background: #fff;
    border-radius: 24px;
    width: 90%;
    max-width: 460px;
    padding: 32px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
    position: relative;
  }

  .quiz-progress {
    font-size: 13px;
    color: #a0aec0;
    margin-bottom: 8px;
  }

  .quiz-mode-tag {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    background: #ebf4ff;
    color: #3182ce;
    margin-bottom: 16px;
  }

  .quiz-question {
    font-size: 48px;
    font-weight: 900;
    color: #2d3748;
    margin: 12px 0;
  }

  .quiz-question.pinyin-display {
    font-size: 28px;
    font-weight: 700;
    color: #5a67d8;
  }

  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 20px 0;
  }

  .quiz-opt {
    padding: 14px 8px;
    border: 2px solid #e2e8f0;
    border-radius: 14px;
    background: #fff;
    font-size: 20px;
    font-weight: 700;
    color: #2d3748;
    cursor: pointer;
    transition: all 0.15s;
  }

  .quiz-opt:hover { border-color: #5a67d8; background: #ebf4ff; }

  .quiz-opt.correct {
    border-color: #48bb78;
    background: #f0fff4;
    color: #276749;
  }

  .quiz-opt.wrong {
    border-color: #fc8181;
    background: #fff5f5;
    color: #c53030;
  }

  .quiz-opt[disabled] { pointer-events: none; }

  .quiz-hint {
    font-size: 14px;
    color: #718096;
    margin-top: 8px;
  }

  .quiz-result {
    font-size: 18px;
    font-weight: 700;
    margin: 20px 0 12px;
  }

  .quiz-result .score { color: #5a67d8; }

  .quiz-close {
    padding: 10px 36px;
    border: none;
    border-radius: 16px;
    background: #5a67d8;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }

  .quiz-close:hover { background: #4c51bf; }

  .quiz-x {
    position: absolute;
    top: 12px;
    right: 16px;
    background: none;
    border: none;
    font-size: 24px;
    color: #a0aec0;
    cursor: pointer;
    line-height: 1;
    padding: 4px;
  }

  .quiz-x:hover { color: #e53e3e; }

  .listen-btn {
    font-size: 48px;
    background: none;
    border: none;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .listen-btn:hover { transform: scale(1.15); }

  .dictation-input {
    font-size: 28px;
    text-align: center;
    padding: 10px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 14px;
    width: 80%;
    margin: 16px auto;
    display: block;
    font-family: inherit;
  }

  .dictation-input:focus { outline: none; border-color: #5a67d8; }

  .dictation-submit {
    padding: 10px 40px;
    border: none;
    border-radius: 14px;
    background: #5a67d8;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }

  .dictation-result {
    font-size: 32px;
    font-weight: 900;
    margin: 8px 0;
  }

  .dictation-result.correct { color: #48bb78; }
  .dictation-result.wrong { color: #e53e3e; }

  .review-pinyin-input {
    font-size: 24px;
    text-align: center;
    padding: 10px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 14px;
    width: 88%;
    margin: 14px auto 8px;
    display: block;
    font-family: inherit;
  }

  .review-pinyin-input:focus { outline: none; border-color: #5a67d8; }

  .review-input-note {
    color: #a0aec0;
    font-size: 12px;
    margin-bottom: 12px;
  }

  .review-canvas-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
  }

  .review-hw-box {
    position: relative;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    overflow: hidden;
    background: #fefefe;
  }

  .review-hw-box canvas {
    display: block;
    cursor: crosshair;
    touch-action: none;
  }

  .review-grid-lines {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .review-grid-line-v,
  .review-grid-line-h {
    position: absolute;
    background: #a0aec0;
  }

  .review-grid-line-v { top: 0; bottom: 0; width: 2px; }
  .review-grid-line-h { left: 0; right: 0; height: 2px; }

  .review-grid-dash-v,
  .review-grid-dash-h {
    position: absolute;
  }

  .review-grid-dash-v {
    width: 0;
    border-left: 1px dashed #cbd5e0;
  }

  .review-grid-dash-h {
    height: 0;
    border-top: 1px dashed #cbd5e0;
  }

  .review-canvas-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .review-canvas-buttons button {
    padding: 8px 18px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    background: #fff;
    color: #2d3748;
    cursor: pointer;
    font: inherit;
    font-weight: 700;
  }

  .review-canvas-buttons button.active,
  .review-canvas-buttons button.submit {
    background: #5a67d8;
    border-color: #5a67d8;
    color: #fff;
  }

  .review-recognized {
    min-height: 22px;
    color: #5a67d8;
    font-weight: 800;
    font-size: 16px;
  }

  .auto-next-control {
    display: flex; align-items: center; justify-content: center;
    margin: 4px 0 12px; font-size: 13px; color: #4a5568;
  }
  .auto-next-control label {
    display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;
  }
  .auto-next-switch { position: relative; width: 40px; height: 22px; display: inline-block; }
  .auto-next-switch input { opacity: 0; width: 0; height: 0; }
  .auto-next-switch .slider {
    position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
    background: #cbd5e0; border-radius: 22px; transition: 0.3s;
  }
  .auto-next-switch .slider:before {
    content: ""; position: absolute; height: 16px; width: 16px; left: 3px; bottom: 3px;
    background: #fff; border-radius: 50%; transition: 0.3s;
  }
  .auto-next-switch input:checked + .slider { background: #5a67d8; }
  .auto-next-switch input:checked + .slider:before { transform: translateX(18px); }
  .ok-btn {
    margin-top: 10px; padding: 8px 32px; border: none; border-radius: 12px;
    background: #5a67d8; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
  }

  @media (max-width: 420px) {
    th, td { padding: 10px 4px; font-size: 12px; }
    .char-cell { font-size: 24px; }
    .card { padding: 16px 10px; }
    .quiz-question { font-size: 36px; }
    .quiz-opt { font-size: 16px; padding: 10px 6px; }
  }
</style>
</head>
<body>

<h1>错题复习</h1>
<p class="subtitle" id="dateLabel">加载中...</p>

<div class="tab-bar">
  <button class="tab-btn active" id="tabWrong" onclick="switchTab('wrong')">待复习</button>
  <button class="tab-btn" id="tabMastered" onclick="switchTab('mastered')">已掌握</button>
</div>

<div class="card filter-card" id="filterCard">
  <div class="filter-heading">
    <div class="filter-title">选择复习范围</div>
    <div class="filter-summary" id="filterSummary">加载中...</div>
  </div>
  <div class="filter-row">
    <div class="filter-field">
      <label for="reviewTypeFilter">复习类型</label>
      <select id="reviewTypeFilter" onchange="loadWrongAnswers()">
        <option value="all">全部</option>
        <option value="recognition">认字</option>
        <option value="writing">写字</option>
      </select>
    </div>
    <div class="filter-field">
      <label for="reviewCountFilter">复习次数</label>
      <select id="reviewCountFilter" onchange="loadWrongAnswers()">
        <option value="all">全部待复习</option>
        <option value="0">未复习</option>
        <option value="1">已复习过一次</option>
        <option value="2">已复习过两次</option>
      </select>
    </div>
    <div class="filter-action">
      <button class="filter-start-btn" id="startReviewBtn" style="display:none" onclick="startReview()">开始复习当前范围</button>
    </div>
  </div>
</div>

<div class="card" id="wrongCard">
  <table>
    <thead>
      <tr>
        <th>汉字</th>
        <th>拼音</th>
        <th>组词</th>
        <th>年级</th>
        <th>模式</th>
        <th>日期</th>
        <th>已复习</th>
      </tr>
    </thead>
    <tbody id="reviewBody">
      <tr><td colspan="7" class="empty">加载中...</td></tr>
    </tbody>
  </table>
</div>

<div class="card mastered-card" id="masteredCard" style="display:none">
  <table>
    <thead>
      <tr>
        <th>汉字</th>
        <th>拼音</th>
        <th>组词</th>
        <th>年级</th>
        <th>模式</th>
        <th>复习次数</th>
        <th>掌握日期</th>
      </tr>
    </thead>
    <tbody id="masteredBody">
      <tr><td colspan="7" class="empty">加载中...</td></tr>
    </tbody>
  </table>
</div>

<div class="btn-row" id="btnRow">
  <button class="action-btn" onclick="location.href='/'">返回主页</button>
</div>

<!-- Quiz overlay -->
<div class="quiz-overlay" id="quizOverlay" onclick="if(event.target===this)closeQuiz()">
  <div class="quiz-box" id="quizBox"></div>
</div>

<script>
function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
{
  const _origFetch = window.fetch;
  window.fetch = function(url, opts) {
    opts = opts || {};
    const method = (opts.method || "GET").toUpperCase();
    if (method !== "GET" && method !== "HEAD" && method !== "OPTIONS") {
      opts.headers = Object.assign({}, opts.headers, {"X-CSRF-Token": "{{ csrf_token() }}"});
    }
    return _origFetch.call(this, url, opts);
  };
}
const MODE_LABELS = {
  char_to_pinyin: "看字选拼音",
  pinyin_to_char: "看拼音选字",
  listen_to_char: "听音选字",
  pinyin_typing: "给汉字注音",
  dictation_handwrite: "看拼音写词语",
  read_aloud: "看字读音",
};

function isAutoNext() {
  return localStorage.getItem('autoNextQuestion') !== 'false';
}
function setAutoNext(on) {
  localStorage.setItem('autoNextQuestion', on ? 'true' : 'false');
}
function autoNextControlHTML() {
  return `<div class="auto-next-control">
    <label>
      <span class="auto-next-switch">
        <input type="checkbox" class="auto-next-toggle" ${isAutoNext() ? 'checked' : ''} onchange="setAutoNext(this.checked)">
        <span class="slider"></span>
      </span>
      <span>自动下一题</span>
    </label>
  </div>`;
}
function advanceOrWait(nextFn, hintEl, delay) {
  if (isAutoNext()) {
    setTimeout(nextFn, delay || 800);
  } else {
    const btn = document.createElement("button");
    btn.textContent = "继续";
    btn.className = "ok-btn";
    btn.onclick = () => {
      btn.disabled = true;
      nextFn();
    };
    if (hintEl) hintEl.appendChild(btn);
    setTimeout(() => btn.focus(), 0);
  }
}

function feedbackDelay(q, base) {
  return q && q.word_hint ? Math.max(base || 800, 2200) : (base || 800);
}

function normalizePinyin(s) {
  return String(s || "").toLowerCase().trim().replace(/\s+/g, " ");
}

function applyTone(base, tone) {
  base = String(base || "").replace(/v/g, "ü").toLowerCase();
  if (!base || tone === 0) return base;
  const toneMap = {
    a: ["ā","á","ǎ","à"], e: ["ē","é","ě","è"], i: ["ī","í","ǐ","ì"],
    o: ["ō","ó","ǒ","ò"], u: ["ū","ú","ǔ","ù"], ü: ["ǖ","ǘ","ǚ","ǜ"],
  };
  const order = ["a", "e", "o", "i", "u", "ü"];
  let target = -1;
  for (const vowel of order) {
    target = base.indexOf(vowel);
    if (target >= 0) break;
  }
  if (target < 0) return base;
  const ch = base[target];
  return base.slice(0, target) + (toneMap[ch]?.[tone - 1] || ch) + base.slice(target + 1);
}

function parseNumberTonePinyin(input) {
  input = String(input || "").trim();
  if (!input) return "";
  const last = input[input.length - 1];
  if (/[0-4]/.test(last)) {
    return applyTone(input.slice(0, -1), parseInt(last, 10));
  }
  return input;
}

function parsePinyinInput(input) {
  return String(input || "").trim().split(/\s+/).filter(Boolean).map(parseNumberTonePinyin).join(" ");
}

const params = new URLSearchParams(window.location.search);
const date = params.get("date") || "";

let wrongItems = [];
let currentTab = "wrong";

function switchTab(tab) {
  currentTab = tab;
  document.getElementById("tabWrong").classList.toggle("active", tab === "wrong");
  document.getElementById("tabMastered").classList.toggle("active", tab === "mastered");
  document.getElementById("filterCard").style.display = tab === "wrong" ? "" : "none";
  document.getElementById("wrongCard").style.display = tab === "wrong" ? "" : "none";
  document.getElementById("masteredCard").style.display = tab === "mastered" ? "" : "none";
  document.getElementById("startReviewBtn").style.display = (tab === "wrong" && wrongItems.length > 0) ? "" : "none";
  if (tab === "mastered") loadMastered();
}

async function loadWrongAnswers() {
  document.getElementById("dateLabel").textContent = date ? `${date} - {{ username }}` : "{{ username }}";
  document.getElementById("filterSummary").textContent = "加载中...";

  const type = document.getElementById("reviewTypeFilter").value;
  const count = document.getElementById("reviewCountFilter").value;
  const query = new URLSearchParams();
  if (date) query.set("date", date);
  if (type !== "all") query.set("type", type);
  if (count !== "all") query.set("review_count", count);
  const url = `/api/wrong_answers${query.toString() ? "?" + query.toString() : ""}`;
  const res = await fetch(url);
  const data = await res.json();
  const body = document.getElementById("reviewBody");
  body.innerHTML = "";

  const items = data.wrong_answers || [];
  wrongItems = items;
  document.getElementById("filterSummary").textContent = items.length ? `当前范围 ${items.length} 题` : "当前范围暂无错题";

  if (items.length === 0) {
    body.innerHTML = '<tr><td colspan="7" class="empty">没有错题记录</td></tr>';
    document.getElementById("startReviewBtn").style.display = "none";
    return;
  }

  if (currentTab === "wrong") {
    document.getElementById("startReviewBtn").style.display = "";
  }

  const groupLabels = {
    0: "未复习",
    1: "已复习过一次",
    2: "已复习过两次",
  };
  const renderRow = w => {
    const rc = w.review_count || 0;
    const rcClass = rc >= 2 ? "review-count-2" : rc >= 1 ? "review-count-1" : "review-count-0";
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="char-cell">${esc(w.character)}</td>
      <td class="pinyin-cell">${esc(w.pinyin)}</td>
      <td>${esc(w.words || "")}</td>
      <td>${esc(w.grade)}</td>
      <td class="mode-cell">${esc(MODE_LABELS[w.mode] || w.mode)}</td>
      <td class="date-cell">${esc(w.date || "")}</td>
      <td class="review-count-cell ${rcClass}">${rc}次</td>
    `;
    body.appendChild(tr);
  };

  if (count === "all") {
    [0, 1, 2].forEach(rc => {
      const rows = items.filter(w => (w.review_count || 0) === rc);
      if (!rows.length) return;
      const group = document.createElement("tr");
      group.className = "group-row";
      group.innerHTML = `<td colspan="7">${groupLabels[rc]} · ${rows.length} 题</td>`;
      body.appendChild(group);
      rows.forEach(renderRow);
    });
  } else {
    items.forEach(renderRow);
  }
}

async function loadMastered() {
  const body = document.getElementById("masteredBody");
  body.innerHTML = '<tr><td colspan="7" class="empty">加载中...</td></tr>';

  const res = await fetch("/api/mastered_words");
  const data = await res.json();
  const items = data.mastered_words || [];
  body.innerHTML = "";

  if (items.length === 0) {
    body.innerHTML = '<tr><td colspan="7" class="empty">还没有已掌握的错题</td></tr>';
    return;
  }

  items.forEach(w => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="char-cell">${esc(w.character)}</td>
      <td class="pinyin-cell">${esc(w.pinyin)}</td>
      <td>${esc(w.words || "")}</td>
      <td>${esc(w.grade)}</td>
      <td class="mode-cell">${esc(MODE_LABELS[w.mode] || w.mode)}</td>
      <td>${w.review_count || 0}次</td>
      <td class="date-cell">${esc(w.mastered_date || "")}</td>
    `;
    body.appendChild(tr);
  });
}

// --- TTS helper ---
let ttsAudio = null;
function speakText(text) {
  if (ttsAudio) { ttsAudio.pause(); ttsAudio.currentTime = 0; }
  const url = `/api/tts?text=${encodeURIComponent(text)}&elongate=true`;
  ttsAudio = new Audio(url);
  ttsAudio.volume = 1.0;
  ttsAudio.play();
}

// --- Review quiz ---
let reviewQueue = [];
let reviewIndex = 0;
let reviewCorrect = 0;
let reviewTotal = 0;

function startReview() {
  // Items already sorted by review_count ASC from API, no need to re-sort
  reviewQueue = [...wrongItems];
  reviewIndex = 0;
  reviewCorrect = 0;
  reviewTotal = reviewQueue.length;
  document.getElementById("quizOverlay").classList.add("active");
  loadReviewQuestion();
}

async function loadReviewQuestion() {
  if (reviewIndex >= reviewQueue.length) {
    showReviewResult();
    return;
  }

  const item = reviewQueue[reviewIndex];
  const box = document.getElementById("quizBox");
  box.innerHTML = '<div style="color:#a0aec0;padding:24px">加载中...</div>';

  const res = await fetch("/api/review_question", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      character: item.character,
      pinyin: item.pinyin,
      words: item.words || "",
      grade: item.grade,
      mode: item.mode,
    }),
  });
  const q = await res.json();

  if (q.error) {
    reviewIndex++;
    loadReviewQuestion();
    return;
  }

  renderReviewQuestion(q, item);
}

function renderReviewQuestion(q, item) {
  const box = document.getElementById("quizBox");
  const progress = `<div class="quiz-progress">第 ${reviewIndex + 1} / ${reviewTotal} 题</div>`;
  const modeTag = `<div class="quiz-mode-tag">${MODE_LABELS[q.mode] || q.mode}</div>`;
  const closeBtn = '<button class="quiz-x" onclick="closeQuiz()" title="关闭">&times;</button>';
  const autoNext = autoNextControlHTML();

  if (q.mode === "pinyin_typing") {
    const contextHint = q.context_word ? `<div class="review-input-note">(${esc(q.context_word)})</div>` : "";
    box.innerHTML = `
      ${closeBtn}${progress}${autoNext}${modeTag}
      <div class="quiz-question">${esc(q.question)}</div>
      ${contextHint}
      <input class="review-pinyin-input" id="pinyinInput" placeholder="输入拼音，如 hua1" autocomplete="off" autocapitalize="off">
      <div class="review-input-note">可用数字表示声调: hua2=huá，0=轻声；多字请用空格分开</div>
      <button class="dictation-submit" onclick="checkPinyinTyping(this)">确认</button>
      <div class="quiz-hint" id="quizHint"></div>
    `;
    const pyInput = document.getElementById("pinyinInput");
    pyInput.focus();
    pyInput.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        checkPinyinTyping(document.querySelector(".dictation-submit"));
      }
    });
    box._answer = q.answer;
    box._item = item;
    box._question = q;
    return;
  }

  if (q.mode === "dictation_handwrite") {
    const charCount = q.answer.length;
    const cols = charCount >= 3 ? 2 : charCount;
    const cellSize = getReviewCellSize(cols);
    const rows = Math.ceil(charCount / cols);
    const canvasW = cols * cellSize;
    const canvasH = rows * cellSize;
    box.innerHTML = `
      ${closeBtn}${progress}${autoNext}${modeTag}
      <div class="quiz-question pinyin-display">${esc(q.question)}</div>
      <div class="review-canvas-wrap">
        <div class="review-hw-box" style="width:${canvasW}px;height:${canvasH}px">
          <canvas id="reviewCanvas" width="${canvasW}" height="${canvasH}" style="width:${canvasW}px;height:${canvasH}px"></canvas>
          <div class="review-grid-lines" id="reviewGrid"></div>
        </div>
        <div class="review-recognized" id="reviewRecognized"></div>
        <div class="review-canvas-buttons">
          <button onclick="clearReviewCanvas()">清除</button>
          <button id="reviewEraserBtn" onclick="toggleReviewEraser()">橡皮擦</button>
          <button onclick="recognizeReviewCanvas()">识别</button>
          <button class="submit" onclick="checkReviewHandwriting(this)">确认</button>
        </div>
      </div>
      <div class="quiz-hint" id="quizHint"></div>
    `;
    drawReviewGrid(cols, rows, cellSize, charCount);
    initReviewCanvas();
    box._answer = q.answer;
    box._item = item;
    box._question = q;
    return;
  }

  renderLegacyChoiceQuestion(q, item);
}

function getReviewCellSize(cols) {
  const maxWidth = Math.min(window.innerWidth * 0.76, 380);
  return Math.floor(Math.min(150, maxWidth / Math.max(cols, 1)));
}

function drawReviewGrid(cols, rows, cellSize, charCount) {
  const gridEl = document.getElementById("reviewGrid");
  for (let i = 1; i < cols; i++) {
    const line = document.createElement("div");
    line.className = "review-grid-line-v";
    line.style.left = `${i * cellSize}px`;
    gridEl.appendChild(line);
  }
  for (let r = 1; r < rows; r++) {
    const line = document.createElement("div");
    line.className = "review-grid-line-h";
    line.style.top = `${r * cellSize}px`;
    gridEl.appendChild(line);
  }
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (r * cols + c >= charCount) break;
      const dashV = document.createElement("div");
      dashV.className = "review-grid-dash-v";
      dashV.style.left = `${c * cellSize + cellSize / 2}px`;
      dashV.style.top = `${r * cellSize}px`;
      dashV.style.height = `${cellSize}px`;
      gridEl.appendChild(dashV);
      const dashH = document.createElement("div");
      dashH.className = "review-grid-dash-h";
      dashH.style.left = `${c * cellSize}px`;
      dashH.style.top = `${r * cellSize + cellSize / 2}px`;
      dashH.style.width = `${cellSize}px`;
      gridEl.appendChild(dashH);
    }
  }
}

let reviewCanvasStrokes = [];
let reviewCurrentStroke = null;
let reviewIsDrawing = false;
let reviewEraserMode = false;
let reviewRecognizedText = "";

function initReviewCanvas() {
  reviewCanvasStrokes = [];
  reviewCurrentStroke = null;
  reviewIsDrawing = false;
  reviewEraserMode = false;
  reviewRecognizedText = "";
  const canvas = document.getElementById("reviewCanvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  ctx.lineWidth = 5;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = "#2d3748";

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return [t.clientX - rect.left, t.clientY - rect.top];
  }

  function startStroke(e) {
    e.preventDefault();
    reviewIsDrawing = true;
    const [x, y] = getPos(e);
    ctx.beginPath();
    ctx.moveTo(x, y);
    if (reviewEraserMode) {
      ctx.globalCompositeOperation = "destination-out";
      ctx.lineWidth = 22;
      reviewCurrentStroke = null;
    } else {
      ctx.globalCompositeOperation = "source-over";
      ctx.lineWidth = 5;
      reviewCurrentStroke = [[x], [y], [Date.now()]];
    }
  }

  function moveStroke(e) {
    if (!reviewIsDrawing) return;
    e.preventDefault();
    const [x, y] = getPos(e);
    if (reviewEraserMode) eraseReviewStrokesAt(x, y, 12);
    if (reviewCurrentStroke) {
      reviewCurrentStroke[0].push(x);
      reviewCurrentStroke[1].push(y);
      reviewCurrentStroke[2].push(Date.now());
    }
    ctx.lineTo(x, y);
    ctx.stroke();
  }

  function endStroke(e) {
    if (!reviewIsDrawing) return;
    e.preventDefault();
    reviewIsDrawing = false;
    ctx.globalCompositeOperation = "source-over";
    if (reviewCurrentStroke && reviewCurrentStroke[0].length > 0) {
      reviewCanvasStrokes.push(reviewCurrentStroke);
    }
    reviewCurrentStroke = null;
  }

  canvas.addEventListener("mousedown", startStroke);
  canvas.addEventListener("mousemove", moveStroke);
  canvas.addEventListener("mouseup", endStroke);
  canvas.addEventListener("mouseleave", endStroke);
  canvas.addEventListener("touchstart", startStroke);
  canvas.addEventListener("touchmove", moveStroke);
  canvas.addEventListener("touchend", endStroke);
}

function eraseReviewStrokesAt(ex, ey, radius) {
  for (let i = reviewCanvasStrokes.length - 1; i >= 0; i--) {
    const s = reviewCanvasStrokes[i];
    for (let j = 0; j < s[0].length; j++) {
      const dx = s[0][j] - ex;
      const dy = s[1][j] - ey;
      if (dx * dx + dy * dy <= radius * radius) {
        reviewCanvasStrokes.splice(i, 1);
        break;
      }
    }
  }
}

function clearReviewCanvas() {
  const canvas = document.getElementById("reviewCanvas");
  if (!canvas) return;
  canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
  reviewCanvasStrokes = [];
  reviewRecognizedText = "";
  document.getElementById("reviewRecognized").textContent = "";
}

function toggleReviewEraser() {
  reviewEraserMode = !reviewEraserMode;
  const btn = document.getElementById("reviewEraserBtn");
  if (btn) {
    btn.classList.toggle("active", reviewEraserMode);
    btn.textContent = reviewEraserMode ? "写字" : "橡皮擦";
  }
}

async function recognizeReviewCanvas() {
  const canvas = document.getElementById("reviewCanvas");
  const recEl = document.getElementById("reviewRecognized");
  if (!canvas || reviewCanvasStrokes.length === 0) return;
  recEl.textContent = "识别中...";
  try {
    const res = await fetch("/api/handwriting", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ strokes: reviewCanvasStrokes, width: canvas.width, height: canvas.height }),
    });
    const data = await res.json();
    if (data[0] === "SUCCESS") {
      reviewRecognizedText = (data[1][0][1] || [])[0] || "";
      recEl.textContent = reviewRecognizedText ? `识别结果: ${reviewRecognizedText}` : "未能识别，请重写";
    } else {
      recEl.textContent = "识别失败，请重试";
    }
  } catch(e) {
    recEl.textContent = "识别失败，请重试";
  }
}

async function checkReviewHandwriting(btn) {
  const box = document.getElementById("quizBox");
  const q = box._question || {};
  const answer = box._answer;
  const item = box._item;
  const hint = document.getElementById("quizHint");
  if (!reviewRecognizedText && reviewCanvasStrokes.length > 0) {
    await recognizeReviewCanvas();
  }
  if (!reviewRecognizedText) {
    document.getElementById("reviewRecognized").textContent = "请先写字";
    return;
  }
  btn.disabled = true;
  if (reviewRecognizedText === answer) {
    reviewCorrect++;
    hint.innerHTML = `<div class="dictation-result correct">${answer} ✓</div>`;
    await markReviewed(item);
  } else {
    hint.innerHTML = `<div class="dictation-result wrong">${reviewRecognizedText} ✗</div><div style="margin-top:8px;font-size:20px;font-weight:700;color:#48bb78">正确答案: ${answer}</div>`;
  }

  advanceOrWait(() => {
    reviewIndex++;
    loadReviewQuestion();
  }, hint, feedbackDelay(q, 1500));
}

async function checkPinyinTyping(btn) {
  const box = document.getElementById("quizBox");
  const q = box._question || {};
  const input = document.getElementById("pinyinInput");
  const answer = box._answer;
  const item = box._item;
  const hint = document.getElementById("quizHint");
  const userAnswer = parsePinyinInput(input.value);
  if (!userAnswer) return;
  btn.disabled = true;
  input.disabled = true;

  if (normalizePinyin(userAnswer) === normalizePinyin(answer)) {
    reviewCorrect++;
    hint.innerHTML = `<div class="dictation-result correct">${answer} ✓</div>${q.word_hint ? `<div>组词: ${esc(q.word_hint)}</div>` : ""}`;
    await markReviewed(item);
  } else {
    hint.innerHTML = `<div class="dictation-result wrong">${esc(userAnswer)} ✗</div><div style="margin-top:8px;font-size:20px;font-weight:700;color:#48bb78">正确答案: ${answer}</div>${q.word_hint ? `<div style="margin-top:6px">组词: ${esc(q.word_hint)}</div>` : ""}`;
  }

  advanceOrWait(() => {
    reviewIndex++;
    loadReviewQuestion();
  }, hint, feedbackDelay(q, 1500));
}

function renderLegacyChoiceQuestion(q, item) {
  const box = document.getElementById("quizBox");
  const progress = `<div class="quiz-progress">第 ${reviewIndex + 1} / ${reviewTotal} 题</div>`;
  const modeTag = `<div class="quiz-mode-tag">${MODE_LABELS[q.mode] || q.mode}</div>`;
  const closeBtn = '<button class="quiz-x" onclick="closeQuiz()" title="关闭">&times;</button>';
  const autoNext = autoNextControlHTML();

  if (q.mode === "dictation_handwrite") {
    box.innerHTML = `
      ${closeBtn}${progress}${autoNext}${modeTag}
      <div class="quiz-question pinyin-display">${q.question}</div>
      <input class="dictation-input" id="dictInput" placeholder="写出词语" autocomplete="off">
      <br>
      <button class="dictation-submit" onclick="checkDictation(this)">确认</button>
      <div class="quiz-hint" id="quizHint"></div>
    `;
    const input = document.getElementById("dictInput");
    input.focus();
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        checkDictation(document.querySelector(".dictation-submit"));
      }
    });
    box._answer = q.answer;
    box._item = item;
    return;
  }

  if (q.mode === "listen_to_char") {
    box.innerHTML = `
      ${closeBtn}${progress}${autoNext}${modeTag}
      <div>听读音，选汉字</div>
      <button class="listen-btn" onclick="speakText('${q.question}')">&#128264;</button>
      <div class="quiz-options" id="quizOpts"></div>
      <div class="quiz-hint" id="quizHint"></div>
    `;
    setTimeout(() => speakText(q.question), 200);
  } else if (q.mode === "char_to_pinyin") {
    box.innerHTML = `
      ${closeBtn}${progress}${autoNext}${modeTag}
      <div class="quiz-question">${q.question}</div>
      <div class="quiz-options" id="quizOpts"></div>
      <div class="quiz-hint" id="quizHint"></div>
    `;
  } else {
    box.innerHTML = `
      ${closeBtn}${progress}${autoNext}${modeTag}
      <div class="quiz-question pinyin-display">${q.question}</div>
      <div class="quiz-options" id="quizOpts"></div>
      <div class="quiz-hint" id="quizHint"></div>
    `;
  }

  const optsEl = document.getElementById("quizOpts");
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "quiz-opt";
    btn.textContent = opt;
    btn.onclick = () => handleReviewAnswer(btn, i, q, item);
    optsEl.appendChild(btn);
  });
}

async function markReviewed(item) {
  await fetch("/api/review_done", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ event_id: item.event_id, character: item.character, mode: item.mode }),
  });
}

async function handleReviewAnswer(btn, idx, q, item) {
  const allBtns = document.querySelectorAll(".quiz-opt");
  allBtns.forEach(b => b.disabled = true);

  if (idx === q.correct_index) {
    btn.classList.add("correct");
    reviewCorrect++;
    await markReviewed(item);
  } else {
    btn.classList.add("wrong");
    allBtns[q.correct_index].classList.add("correct");
  }

  const hint = document.getElementById("quizHint");
  if (q.word_hint) {
    hint.textContent = `组词: ${q.word_hint}`;
  }

  advanceOrWait(() => {
    reviewIndex++;
    loadReviewQuestion();
  }, hint, feedbackDelay(q, 1200));
}

async function checkDictation(btn) {
  const box = document.getElementById("quizBox");
  const input = document.getElementById("dictInput");
  const answer = box._answer;
  const item = box._item;
  const userAnswer = input.value.trim();
  if (!userAnswer) return;

  btn.disabled = true;
  input.disabled = true;

  const hint = document.getElementById("quizHint");
  if (userAnswer === answer) {
    reviewCorrect++;
    hint.innerHTML = `<div class="dictation-result correct">${answer} ✓</div>`;
    await markReviewed(item);
  } else {
    hint.innerHTML = `<div class="dictation-result wrong">${userAnswer} ✗</div><div style="margin-top:8px;font-size:20px;font-weight:700;color:#48bb78">正确答案: ${answer}</div>`;
  }

  advanceOrWait(() => {
    reviewIndex++;
    loadReviewQuestion();
  }, hint, feedbackDelay(box._question || {}, 1500));
}

function showReviewResult() {
  const box = document.getElementById("quizBox");
  const pct = reviewTotal > 0 ? Math.round(reviewCorrect / reviewTotal * 100) : 0;
  box.innerHTML = `
    <div style="font-size:48px;margin-bottom:16px">${pct >= 80 ? "🎉" : pct >= 60 ? "💪" : "📖"}</div>
    <div class="quiz-result">
      复习完成!<br>
      <span class="score">${reviewCorrect} / ${reviewTotal}</span> 正确率 ${pct}%
    </div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="quiz-close" onclick="restartReview()">再来一轮</button>
      <button class="quiz-close" style="background:#a0aec0" onclick="closeQuiz()">返回列表</button>
    </div>
  `;
}

async function restartReview() {
  await loadWrongAnswers();
  startReview();
}

function closeQuiz() {
  document.getElementById("quizOverlay").classList.remove("active");
  if (ttsAudio) { ttsAudio.pause(); }
  loadWrongAnswers();
}

document.addEventListener("keydown", event => {
  if (event.key !== "Enter") return;
  if (event.defaultPrevented) return;
  if (event.target && ["TEXTAREA", "SELECT"].includes(event.target.tagName) && !event.target.disabled) return;
  const okButtons = Array.from(document.querySelectorAll(".ok-btn"))
    .filter(btn => !btn.disabled && btn.offsetParent !== null);
  const okBtn = okButtons[okButtons.length - 1];
  if (okBtn) {
    event.preventDefault();
    okBtn.click();
    return;
  }
  const submitBtn = document.querySelector(".dictation-submit:not(:disabled), .review-canvas-buttons .submit:not(:disabled)");
  if (submitBtn && submitBtn.offsetParent !== null) {
    event.preventDefault();
    submitBtn.click();
  }
});

loadWrongAnswers();
