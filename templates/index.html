// --- Pinyin for 给汉字注音 (homework quiz) with handwrite/type toggle ---
let pinyinState = { recognized: '' };
let hwPinyinCharCount = 0;
let hwPinyinCellStrokes = [];
let hwPinyinCellRecognized = [];
let hwPinyinToneSelections = [];
let hwPinyinBaseInputs = [];
let hwPinyinDrawingState = [];

function initHwPinyinCanvases() {
  hwPinyinDrawingState = [];
  for (let i = 0; i < hwPinyinCharCount; i++) {
    const box = document.getElementById(`hwPyBox${i}`);
    const canvas = document.getElementById(`hwPyCanvas${i}`);
    if (!canvas || !box) continue;
    canvas.width = box.clientWidth;
    canvas.height = box.clientHeight;
    const ctx = canvas.getContext("2d");
    ctx.lineWidth = 4; ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.strokeStyle = "#2d3748";
    const ds = { isDrawing: false, currentStroke: null };
    hwPinyinDrawingState.push(ds);
    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const t = e.touches ? e.touches[0] : e;
      return [t.clientX - rect.left, t.clientY - rect.top];
    }
    const idx = i;
    function startStroke(e) { e.preventDefault(); ds.isDrawing = true; const [x,y] = getPos(e); ds.currentStroke = [[x],[y],[Date.now()]]; ctx.beginPath(); ctx.moveTo(x,y); }
    function moveStroke(e) { if (!ds.isDrawing) return; e.preventDefault(); const [x,y] = getPos(e); ds.currentStroke[0].push(x); ds.currentStroke[1].push(y); ds.currentStroke[2].push(Date.now()); ctx.lineTo(x,y); ctx.stroke(); }
    function endStroke(e) { if (!ds.isDrawing) return; e.preventDefault(); ds.isDrawing = false; if (ds.currentStroke && ds.currentStroke[0].length > 0) hwPinyinCellStrokes[idx].push(ds.currentStroke); ds.currentStroke = null; }
    canvas.addEventListener("mousedown", startStroke); canvas.addEventListener("mousemove", moveStroke);
    canvas.addEventListener("mouseup", endStroke); canvas.addEventListener("mouseleave", endStroke);
    canvas.addEventListener("touchstart", startStroke); canvas.addEventListener("touchmove", moveStroke); canvas.addEventListener("touchend", endStroke);
  }
}

function setHwPinyinTone(idx, tone) {

function clearPinyinCanvas() {
  pinyinState.recognized = '';
  const recEl = document.getElementById("pinyinRecognized"); if (recEl) recEl.textContent = '';
  const mode = localStorage.getItem("pinyin_input_mode") || "handwrite";
  for (let i = 0; i < hwPinyinCharCount; i++) {

      hwPinyinCellStrokes[i] = [];

      const canvas = document.getElementById(`hwPyCanvas${i}`);
      if (canvas) canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
    } else {
      const input = document.getElementById(`hwPyInput${i}`);
      if (input) input.value = '';
      hwPinyinToneSelections[i] = null;
      hwPinyinBaseInputs[i] = '';
      const area = document.getElementById(`hwPyTypeArea${i}`);
      if (area) area.querySelectorAll('.game-pinyin-tone-btn').forEach(b => b.className = 'game-pinyin-tone-btn');
    }
    const resEl = document.getElementById(`hwPyResult${i}`);
    if (resEl) resEl.textContent = '';
  }
}

async function recognizePinyin() {
  const recEl = document.getElementById("pinyinRecognized");
  let anyStrokes = false;
  for (let i = 0; i < hwPinyinCharCount; i++) {
    if (hwPinyinCellStrokes[i].length > 0) { anyStrokes = true; break; }
  }
  if (!anyStrokes) return;
  if (recEl) recEl.textContent = "识别中...";
  try {
    const results = await Promise.all(hwPinyinCellStrokes.map(async (strokes, i) => {
      if (strokes.length === 0) return '';
      const box = document.getElementById(`hwPyBox${i}`);
      const w = box ? box.clientWidth : 140;
      const h = box ? box.clientHeight : 180;
      const res = await fetch("/api/handwriting", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ strokes, width: w, height: h }),
      });
      const data = await res.json();
      try { if (data[0] === "SUCCESS") return data[1][0][1][0]; } catch(e) {}
      return '';
    }));
    for (let i = 0; i < hwPinyinCharCount; i++) {
      hwPinyinCellRecognized[i] = results[i] || '';
      const resEl = document.getElementById(`hwPyResult${i}`);
      if (resEl) resEl.textContent = results[i] || (hwPinyinCellStrokes[i].length > 0 ? '?' : '');
    }
    const combined = results.join(' ').trim();
    pinyinState.recognized = combined;
    if (recEl) recEl.textContent = combined ? `识别结果: ${combined}` : "未能识别，请清除后重写";
  } catch(e) {
    if (recEl) recEl.textContent = "识别失败，请重试";
  }
}

function getHwPinyinAnswer() {
  const mode = localStorage.getItem("pinyin_input_mode") || "handwrite";
  if (mode === 'type') {
    const parts = [];
    for (let i = 0; i < hwPinyinCharCount; i++) {
      const base = (document.getElementById(`hwPyInput${i}`)?.value || '').trim().replace(/v/g, 'ü');
      const tone = hwPinyinToneSelections[i];
      if (!base) return null;
      if (tone === null || tone === undefined) return null;
      parts.push(gameApplyTone(base, tone));
    }
    return parts.join(' ');
  } else {
    return pinyinState.recognized || null;
  }
}

function normalizePinyin(s) {
  return s.toLowerCase().trim().replace(/\s+/g, ' ');
}

async function hwPinyinSubmit() {
  if (!hwQuiz.answering) return;
  const mode = localStorage.getItem("pinyin_input_mode") || "handwrite";
  if (mode === 'handwrite') {
    let anyStrokes = false;
    for (let i = 0; i < hwPinyinCharCount; i++) {
      if (hwPinyinCellStrokes[i].length > 0) { anyStrokes = true; break; }
    }
    if (!pinyinState.recognized && anyStrokes) {
      await recognizePinyin();
    }
  }
  const userAnswer = getHwPinyinAnswer();
  if (!userAnswer) {
    const el = document.getElementById("pinyinRecognized");
    if (el) el.textContent = mode === 'type' ? "请输入所有拼音并选择声调" : "请先写拼音";
    return;
  }
  hwQuiz.answering = false;

  const q = hwQuiz.questions[hwQuiz.currentIndex];
  const hint = document.getElementById("hwQuizHint");
  const btn = document.getElementById("pinyinSubmitBtn");
  btn.disabled = true;

  const isCorrect = normalizePinyin(userAnswer) === normalizePinyin(q.answer);
  const qKey = q._origIndex !== undefined ? q._origIndex : q.question;

  if (isCorrect) {
    if (!hwQuiz.answeredCorrectly.has(qKey)) {
      hwQuiz.correctCount++;
      hwQuiz.answeredCorrectly.add(qKey);
    }
    reportHwStreak(true);
    hint.innerHTML = `<span style="color:#38a169;font-weight:700">正确!</span> ${q.word_hint ? '组词: ' + q.word_hint : ''}`;
    setTimeout(nextHwQuestion, 800);
  } else {
    reportHwStreak(false);
    const retryCount = hwQuiz.retryMap[qKey] || 0;
    if (retryCount === 0) {
      hwQuiz.wrongItems.push({
        character: q.display_char || q.question,
        pinyin: q.display_pinyin || q.answer,
        words: q.word_hint || "",
        mode: q.mode,
      });
    }
    hwQuiz.retryMap[qKey] = retryCount + 1;
    if (retryCount + 1 <= 2) {
      const retryQ = { ...q, _isRetry: true };
      hwQuiz.questions.splice(hwQuiz.currentIndex + 1, 0, retryQ);
    }
    hint.innerHTML = `<span style="color:#e53e3e;font-weight:700">答错了!</span> 你写的: ${userAnswer}
      <br>正确答案: <div class="pinyin-correct-show">${q.answer}</div>
      ${q.word_hint ? '<br>组词: ' + q.word_hint : ''}
      <br><button class="ok-btn" onclick="nextHwQuestion()">继续</button>`;
  }
}

function hwQuizAnswer(selected, correctIdx) {
  if (!hwQuiz.answering) return;
  hwQuiz.answering = false;

  const q = hwQuiz.questions[hwQuiz.currentIndex];
  const btns = document.querySelectorAll(".hw-quiz-opt-btn");
  btns.forEach(b => b.classList.add("disabled"));

  const isCorrect = selected === correctIdx;
  const hint = document.getElementById("hwQuizHint");
  const qKey = q._origIndex !== undefined ? q._origIndex : q.question;

  if (isCorrect) {
    btns[selected].classList.add("correct");
    if (!hwQuiz.answeredCorrectly.has(qKey)) {
      hwQuiz.correctCount++;
      hwQuiz.answeredCorrectly.add(qKey);
    }
    reportHwStreak(true);
    hint.innerHTML = `<span style="color:#38a169;font-weight:700">正确!</span> ${q.word_hint ? '组词: ' + q.word_hint : ''}`;
    setTimeout(nextHwQuestion, 800);
  } else {
    btns[selected].classList.add("wrong");
    btns[correctIdx].classList.add("reveal");
    reportHwStreak(false);
    // Track retry count for this question
    const retryCount = hwQuiz.retryMap[qKey] || 0;
    if (retryCount === 0) {
      // First time wrong: record it
      hwQuiz.wrongItems.push({
        character: q.display_char || q.answer,
        pinyin: q.display_pinyin || q.question,
        words: q.word_hint || "",
        mode: q.mode,
      });
    }
    hwQuiz.retryMap[qKey] = retryCount + 1;
    // Add retry if under limit (max 2 retries after first wrong = total 3 attempts)
    if (retryCount + 1 <= 2) {
      // Insert retry question after current position
      const retryQ = { ...q, _isRetry: true };
      hwQuiz.questions.splice(hwQuiz.currentIndex + 1, 0, retryQ);
    }
    hint.innerHTML = `<span style="color:#e53e3e;font-weight:700">答错了!</span> 正确答案: <strong>${q.answer}</strong>
      ${q.word_hint ? '<br>组词: ' + q.word_hint : ''}
      <br><button class="ok-btn" onclick="nextHwQuestion()">继续</button>`;
  }
}

async function finishHwQuiz() {
  clearInterval(hwQuiz.timerInterval);
  const timeSpent = Math.floor((Date.now() - hwQuiz.startTime) / 1000);

  // Preview mode: no server submission
  if (hwQuiz.isPreview) {
    document.getElementById("hwQuizSection").style.display = "none";

    const total = hwQuiz.totalOriginal;
    const correct = hwQuiz.correctCount;
    const acc = Math.round(correct / total * 100);
    const mins = Math.floor(timeSpent / 60);
    const secs = timeSpent % 60;
    document.getElementById("hwResultIcon").textContent = acc >= 80 ? "🎉" : "📖";
    document.getElementById("hwResultTitle").textContent = "预习完成!";
    document.getElementById("hwResultStats").innerHTML = `正确率: <span>${correct}/${total} (${acc}%)</span> · 用时: <span>${mins}分${secs}秒</span>`;
    const wrongDiv = document.getElementById("hwResultWrong");
    if (hwQuiz.wrongItems.length > 0) {
      wrongDiv.innerHTML = `<h4>需要复习 (${hwQuiz.wrongItems.length}个):</h4>
        <div class="hw-result-wrong-list">
          ${hwQuiz.wrongItems.map(w => `<div class="hw-result-wrong-item"><span class="char">${w.character}</span> ${w.pinyin}</div>`).join("")}
        </div>`;
    } else {
      wrongDiv.innerHTML = `<div style="color:#38a169;font-weight:600;margin:12px 0">全部正确!</div>`;
    }
    document.getElementById("hwResultActions").innerHTML = `
      <button class="hw-result-btn" onclick="backToPreviewModesFromResult()">返回预习主页</button>
      <button class="hw-result-btn" onclick="hwBackToToday()">返回作业</button>
    `;
    return;
  }

  const res = await fetch("/api/homework/submit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      assignment_id: hwQuiz.assignmentId,
      total_questions: hwQuiz.totalOriginal,
      correct_answers: hwQuiz.correctCount,
      time_spent: timeSpent,
      wrong_items: hwQuiz.wrongItems,
    }),
  });
  const data = await res.json();

  document.getElementById("hwQuizSection").style.display = "none";
  document.getElementById("hwResultSection").style.display = "";

  const total = hwQuiz.totalOriginal;
  const correct = hwQuiz.correctCount;
  const acc = Math.round(correct / total * 100);
  const mins = Math.floor(timeSpent / 60);
  const secs = timeSpent % 60;

  document.getElementById("hwResultIcon").textContent = acc >= 80 ? "🎉" : acc >= 60 ? "💪" : "📚";
  document.getElementById("hwResultTitle").textContent = acc >= 80 ? "太棒了!" : acc >= 60 ? "继续努力!" : "需要加油哦!";
  document.getElementById("hwResultStats").innerHTML = `正确率: <span>${correct}/${total} (${acc}%)</span> · 用时: <span>${mins}分${secs}秒</span>`;

  if (data.coins_earned > 0) {
    document.getElementById("hwResultStats").innerHTML += `<br>获得 <span>${data.coins_earned}</span> 金币!`;
    await loadCoins();
  }

  const wrongDiv = document.getElementById("hwResultWrong");
  if (hwQuiz.wrongItems.length > 0) {
    wrongDiv.innerHTML = `<h4>错题 (${hwQuiz.wrongItems.length}个):</h4>
      <div class="hw-result-wrong-list">
        ${hwQuiz.wrongItems.map(w => `<div class="hw-result-wrong-item"><span class="char">${w.character}</span> ${w.pinyin}</div>`).join("")}
      </div>`;
  } else {
    wrongDiv.innerHTML = `<div style="color:#38a169;font-weight:600;margin:12px 0">全部正确! 太厉害了!</div>`;
  }

  if (data.all_done) {
    document.getElementById("hwResultStats").innerHTML += `<br><span style="color:#38a169">今日作业全部完成!</span>`;
  }

  // Show "继续下一课" button if next assignment was auto-created
  const actionsDiv = document.getElementById("hwResultActions");
  const typeLabel = hwQuiz.type === "recognition" ? "认字" : "写字";
  if (data.next_assignment) {
    hwQuiz.nextAssignmentId = data.next_assignment.id;
    actionsDiv.innerHTML = `
      <button class="hw-result-btn" onclick="hwBackToToday()">返回</button>
      <button class="hw-result-btn next" onclick="startHwQuiz(${data.next_assignment.id})">继续下一课 · ${gradeShort(data.next_assignment.grade)}${typeLabel}第${data.next_assignment.lesson_num}课 →</button>`;
  } else {
    hwQuiz.nextAssignmentId = null;
    actionsDiv.innerHTML = `<button class="hw-result-btn" onclick="hwBackToToday()">返回</button>`;
  }
}

let hwReview = { items: [], questions: [], currentIndex: 0, correctCount: 0, wrongItems: [], startTime: null, timerInterval: null, answering: false, answeredCorrectly: new Set(), retryMap: {}, totalOriginal: 0 };

function startHwReview() {
  // Build review questions from hwReviewItems
  const questions = [];
  hwReviewItems.forEach(item => {
    if (item.mode === "char_to_pinyin" || item.mode === "pinyin_to_char" || item.mode === "listen_to_char" || item.mode === "pinyin_typing") {
      // Recognition review: show char, pick pinyin
      questions.push({
        mode: "char_to_pinyin",
        question: item.character,
        answer: item.pinyin,
        word_hint: item.words || "",
        display_char: item.character,
        display_pinyin: item.pinyin,
        _reviewItem: item,
      });
    } else if (item.mode === "dictation_handwrite") {
      // Writing review: show pinyin, write word
      questions.push({
        mode: "dictation_handwrite",
        question: item.pinyin,
        answer: item.character,
        display_char: item.character,
        display_pinyin: item.pinyin,
        _reviewItem: item,
      });
    }
  });

  if (questions.length === 0) { hwBackToToday(); return; }

  // For char_to_pinyin, generate options
  const allPinyins = hwReviewItems.map(i => i.pinyin).filter(Boolean);
  questions.forEach(q => {
    if (q.mode === "char_to_pinyin") {
      const opts = new Set([q.answer]);
      const pool = allPinyins.filter(p => p !== q.answer);
      while (opts.size < Math.min(4, allPinyins.length) && pool.length > 0) {
        const idx = Math.floor(Math.random() * pool.length);
        opts.add(pool.splice(idx, 1)[0]);
      }
      q.options = [...opts].sort(() => Math.random() - 0.5);
      q.correct_index = q.options.indexOf(q.answer);
    }
  });

  // Shuffle
  for (let i = questions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [questions[i], questions[j]] = [questions[j], questions[i]];
  }

  hwReview.items = hwReviewItems;
  hwReview.questions = questions;
  hwReview.totalOriginal = questions.length;
  hwReview.currentIndex = 0;
  hwReview.correctCount = 0;
  hwReview.wrongItems = [];
  hwReview.startTime = Date.now();
  hwReview.answering = false;
  hwReview.answeredCorrectly = new Set();
  hwReview.retryMap = {};

  // Show quiz section
  document.getElementById("hwReviewSection").style.display = "none";
  document.getElementById("hwTodaySection").style.display = "none";
  document.getElementById("hwQuizSection").style.display = "";
  clearInterval(hwReview.timerInterval);
  hwReview.timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - hwReview.startTime) / 1000);
    document.getElementById("hwQuizTimer").textContent = `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  }, 1000);

  showHwReviewQuestion();
}

function showHwReviewQuestion() {
  const q = hwReview.questions[hwReview.currentIndex];
  const total = hwReview.totalOriginal;
  const done = hwReview.answeredCorrectly.size;
  document.getElementById("hwQuizProgress").textContent = `复习 ${done}/${total}`;
  document.getElementById("hwQuizBarFill").style.width = `${(done / total) * 100}%`;

  const area = document.getElementById("hwQuizQuestionArea");
  const opts = document.getElementById("hwQuizOptionsArea");
  const hint = document.getElementById("hwQuizHint");
  hint.innerHTML = "";

  if (q.mode === "char_to_pinyin") {
    area.innerHTML = `<div class="quiz-label">请选择正确的拼音</div><div class="hw-quiz-char">${q.question}</div>`;
    opts.innerHTML = q.options.map((o, i) =>
      `<button class="hw-quiz-opt-btn" onclick="hwReviewAnswer(${i})">${o}</button>`
    ).join("");
  } else if (q.mode === "dictation_handwrite") {
    const charCount = q.answer.length;
    const cellSize = 140;
    const cols = charCount >= 3 ? 2 : charCount;
    const rows = Math.ceil(charCount / cols);
    const canvasW = cols * cellSize;
    const canvasH = rows * cellSize;
    area.innerHTML = `<div class="quiz-label">看拼音写词语</div><div class="hw-quiz-pinyin">${q.question}</div>
      <div class="hw-canvas-wrap" style="display:flex;flex-direction:column;align-items:center">
        <div style="position:relative;width:${canvasW}px;height:${canvasH}px;border:2px solid #e2e8f0;border-radius:8px;overflow:hidden;background:#fefefe">
          <canvas id="hwQuizCanvas" width="${canvasW}" height="${canvasH}" style="width:${canvasW}px;height:${canvasH}px"></canvas>
          <div class="hw-grid-lines" id="hwReviewGrid"></div>
        </div>
        <div id="hwQuizRecognized" style="font-size:16px;font-weight:700;color:#5a67d8;min-height:22px;text-align:center;margin-top:4px"></div>
        <div style="display:flex;gap:8px;justify-content:center;margin-top:4px">
          <button class="hw-canvas-clear" onclick="clearHwQuizCanvas()">清除</button>
          <button class="hw-canvas-clear" onclick="recognizeHwQuiz()">识别</button>
        </div>
      </div>`;
    // Draw grid
    const gridEl = document.getElementById("hwReviewGrid");
    for (let i = 1; i < cols; i++) {
      const line = document.createElement("div");
      line.className = "hw-grid-line";
      line.style.left = (i * cellSize) + "px";
      gridEl.appendChild(line);
    }
    for (let r = 1; r < rows; r++) {
      const line = document.createElement("div");
      line.className = "hw-grid-line-h";
      line.style.top = (r * cellSize) + "px";
      gridEl.appendChild(line);
    }
    // Dashed center lines (田字格)
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (r * cols + c >= charCount) break;
        const dashV = document.createElement("div");
        dashV.className = "hw-grid-dash-v";
        dashV.style.left = (c * cellSize + cellSize / 2) + "px";
        dashV.style.top = (r * cellSize) + "px";
        dashV.style.height = cellSize + "px";
        gridEl.appendChild(dashV);
        const dashH = document.createElement("div");
        dashH.className = "hw-grid-dash-h";
        dashH.style.top = (r * cellSize + cellSize / 2) + "px";
        dashH.style.left = (c * cellSize) + "px";
        dashH.style.width = cellSize + "px";
        gridEl.appendChild(dashH);
      }
    }
    opts.innerHTML = `<button class="hw-quiz-opt-btn submit-hw" onclick="submitHwReviewHandwrite()">提交</button>`;
    hwQuizRecognizedResult = '';
    setTimeout(initHwQuizCanvas, 50);
  }
  hwReview.answering = true;
}

function hwReviewAnswer(selected) {
  if (!hwReview.answering) return;
  hwReview.answering = false;
  const q = hwReview.questions[hwReview.currentIndex];
  const hint = document.getElementById("hwQuizHint");
  const isCorrect = selected === q.correct_index;
  const qKey = `${q.question}_${q.mode}`;

  if (isCorrect) {
    if (!hwReview.answeredCorrectly.has(qKey)) {
      hwReview.correctCount++;
      hwReview.answeredCorrectly.add(qKey);
    }
    hint.innerHTML = `<span style="color:#38a169;font-weight:700">正确!</span>`;
    setTimeout(nextHwReviewQuestion, 800);
  } else {
    // Wrong: show answer, re-queue at end until answered correctly once
    if (!hwReview.answeredCorrectly.has(qKey)) {
      hwReview.questions.push({ ...q });
    }
    hint.innerHTML = `<span style="color:#e53e3e;font-weight:700">答错了!</span> 正确答案: <strong>${q.answer}</strong>
      ${q.word_hint ? '<br>组词: ' + q.word_hint : ''}
      <br><button class="ok-btn" onclick="nextHwReviewQuestion()">继续</button>`;
  }
}

async function submitHwReviewHandwrite() {
  if (!hwReview.answering) return;
  const q = hwReview.questions[hwReview.currentIndex];
  const hint = document.getElementById("hwQuizHint");

  // Auto-recognize if not yet recognized
  if (!hwQuizRecognizedResult && hwCanvasStrokes.length > 0) {
    await recognizeHwQuiz();
  }
  if (!hwQuizRecognizedResult) {
    const recEl = document.getElementById("hwQuizRecognized");
    if (recEl) recEl.textContent = "请先写字";
    return;
  }

  hwReview.answering = false;
  let userInput = hwQuizRecognizedResult;

  const qKey = `${q.question}_${q.mode}`;
  if (userInput === q.answer) {
    if (!hwReview.answeredCorrectly.has(qKey)) {
      hwReview.correctCount++;
      hwReview.answeredCorrectly.add(qKey);
    }
    hint.innerHTML = `<span style="color:#38a169;font-weight:700">正确!</span>`;
    setTimeout(nextHwReviewQuestion, 800);
  } else {
    // Wrong: show answer, re-queue at end until answered correctly once
    if (!hwReview.answeredCorrectly.has(qKey)) {
      hwReview.questions.push({ ...q });
    }
    hint.innerHTML = `<span style="color:#e53e3e;font-weight:700">答错了!</span> 你写的: ${userInput}
      <br>正确答案: <strong style="font-size:24px">${q.answer}</strong>
      <br><button class="ok-btn" onclick="nextHwReviewQuestion()">继续</button>`;
  }
}

function nextHwReviewQuestion() {
  hwReview.currentIndex++;
  if (hwReview.currentIndex >= hwReview.questions.length) {
    finishHwReview();
    return;
  }
  showHwReviewQuestion();
}

async function finishHwReview() {
  clearInterval(hwReview.timerInterval);

  // Submit review results to mark items as reviewed
  await fetch("/api/homework/review_submit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ items: hwReview.items }),
  });

  // All review items answered correctly — go directly to today's homework
  document.getElementById("hwQuizSection").style.display = "none";
  hwBackToToday();
}

// --- Homework Quiz Canvas ---
function initHwQuizCanvas() {
  hwCanvasStrokes = [];
  const canvas = document.getElementById("hwQuizCanvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  ctx.lineWidth = 5;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = "#2d3748";

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return [t.clientX - rect.left, t.clientY - rect.top];
  }

  function startStroke(e) {
    e.preventDefault();
    hwIsDrawing = true;
    const [x, y] = getPos(e);
    hwCurrentStroke = [[x], [y], [Date.now()]];
    ctx.beginPath();
    ctx.moveTo(x, y);
  }

  function moveStroke(e) {
    if (!hwIsDrawing) return;
    e.preventDefault();
    const [x, y] = getPos(e);
    hwCurrentStroke[0].push(x);
    hwCurrentStroke[1].push(y);
    hwCurrentStroke[2].push(Date.now());
    ctx.lineTo(x, y);
    ctx.stroke();
  }

  function endStroke(e) {
    if (!hwIsDrawing) return;
    e.preventDefault();
    hwIsDrawing = false;
    if (hwCurrentStroke && hwCurrentStroke[0].length > 0) {
      hwCanvasStrokes.push(hwCurrentStroke);
    }
    hwCurrentStroke = null;
  }

  canvas.addEventListener("mousedown", startStroke);
  canvas.addEventListener("mousemove", moveStroke);
  canvas.addEventListener("mouseup", endStroke);
  canvas.addEventListener("mouseleave", endStroke);
  canvas.addEventListener("touchstart", startStroke);
  canvas.addEventListener("touchmove", moveStroke);
  canvas.addEventListener("touchend", endStroke);
}

let hwQuizRecognizedResult = '';

function clearHwQuizCanvas() {
  hwCanvasStrokes = [];
  hwQuizRecognizedResult = '';
  const canvas = document.getElementById("hwQuizCanvas");
  if (!canvas) return;
  canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
  const recEl = document.getElementById("hwQuizRecognized"); if (recEl) recEl.textContent = '';
}

async function recognizeHwQuiz() {
  if (hwCanvasStrokes.length === 0) return;
  const canvas = document.getElementById("hwQuizCanvas");
  const recEl = document.getElementById("hwQuizRecognized");
  if (recEl) recEl.textContent = "识别中...";
  try {
    const res = await fetch("/api/handwriting", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ strokes: hwCanvasStrokes, width: canvas.width, height: canvas.height }),
    });
    const data = await res.json();
    let topResult = null;
    try { if (data[0] === "SUCCESS") topResult = data[1][0][1][0]; } catch(e) {}
    if (topResult) {
      hwQuizRecognizedResult = topResult;
      if (recEl) recEl.textContent = `识别结果: ${topResult}`;
    } else {
      if (recEl) recEl.textContent = "未能识别，请清除后重写";
    }
  } catch(e) {
    if (recEl) recEl.textContent = "识别失败，请重试";
  }
}
