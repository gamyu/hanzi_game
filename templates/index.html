<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉字小达人 - 识字游戏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #333;
  }

  /* Top bar */
  .top-bar {
    width: 100%;
    max-width: 600px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    color: #fff;
  }

  .score-box, .combo-box {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 8px 20px;
    font-size: 18px;
    font-weight: bold;
    backdrop-filter: blur(4px);
  }

  .combo-box { color: #ffe066; }
  .combo-box.hot { animation: pulse 0.5s ease-in-out; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); }
  }

  /* Streak progress bar */
  .streak-bar {
    width: 100%;
    max-width: 560px;
    padding: 0 20px;
    margin-top: -4px;
    margin-bottom: 4px;
  }
  .streak-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .streak-label {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    font-weight: 600;
  }
  .streak-reward {
    font-size: 12px;
    color: #fbd38d;
    font-weight: 700;
  }
  .streak-track {
    position: relative;
    height: 10px;
    background: rgba(255,255,255,0.15);
    border-radius: 5px;
    overflow: visible;
  }
  .streak-fill {
    height: 100%;
    border-radius: 5px;
    background: linear-gradient(90deg, #68d391, #f6e05e, #fc8181);
    transition: width 0.4s ease-out;
    position: relative;
    z-index: 1;
  }
  .streak-markers {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 100%;
    z-index: 2;
    pointer-events: none;
  }
  .streak-marker {
    position: absolute;
    top: -6px;
    width: 2px;
    height: 22px;
    background: rgba(255,255,255,0.5);
    transform: translateX(-1px);
  }
  .streak-marker-label {
    position: absolute;
    top: 18px;
    font-size: 9px;
    color: rgba(255,255,255,0.5);
    transform: translateX(-50%);
    white-space: nowrap;
    font-weight: 600;
  }
  .streak-marker.reached .streak-marker-label {
    color: #fbd38d;
  }
  .streak-marker.reached {
    background: #fbd38d;
  }

  /* Homework streak bar overrides (light background) */
  .hw-streak-bar {
    max-width: 100%;
    padding: 0;
    margin: 4px 0 8px;
  }
  .hw-streak-bar .streak-label {
    color: #4a5568;
  }
  .hw-streak-bar .streak-track {
    background: #e2e8f0;
  }
  .hw-streak-bar .streak-marker {
    background: rgba(0,0,0,0.2);
  }
  .hw-streak-bar .streak-marker-label {
    color: #718096;
  }
  .hw-streak-bar .streak-marker.reached {
    background: #d69e2e;
  }
  .hw-streak-bar .streak-marker.reached .streak-marker-label {
    color: #d69e2e;
  }

  /* Star burst celebration */
  .star-burst {
    position: fixed;
    font-size: 28px;
    pointer-events: none;
    z-index: 10001;
    animation: starFloat 1.5s ease-out forwards;
  }
  @keyframes starFloat {
    0% { opacity: 1; transform: scale(0.3) translateY(0); }
    30% { opacity: 1; transform: scale(1.2) translateY(-30px); }
    100% { opacity: 0; transform: scale(0.6) translateY(-120px); }
  }

  /* Main card */
  .card {
    background: #fff;
    border-radius: 24px;
    width: 90%;
    max-width: 560px;
    padding: 32px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    position: relative;
    overflow: hidden;
  }

  /* Question display */
  .question-area {
    min-height: 160px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }

  .question-char {
    font-size: 128px;
    font-weight: 900;
    line-height: 1.1;
    color: #2d3748;
    transition: transform 0.3s;
  }

  .question-pinyin {
    font-size: 48px;
    font-weight: 700;
    color: #5a67d8;
    line-height: 1.2;
  }

  .question-label {
    font-size: 16px;
    color: #999;
    margin-bottom: 4px;
  }

  .listen-btn {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #f6d365, #fda085);
    font-size: 48px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(253,160,133,0.4);
    transition: transform 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .listen-btn:hover { transform: scale(1.1); }
  .listen-btn:active { transform: scale(0.95); }

  /* Options grid */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    width: 100%;
  }

  .option-btn {
    padding: 18px 12px;
    border: 3px solid #e2e8f0;
    border-radius: 16px;
    background: #fff;
    font-size: 28px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    color: #2d3748;
    position: relative;
    overflow: hidden;
  }

  .option-btn:hover {
    border-color: #5a67d8;
    background: #ebf4ff;
    transform: translateY(-2px);
  }

  .option-btn:active { transform: translateY(0); }

  .option-btn.correct {
    border-color: #48bb78;
    background: #c6f6d5;
    color: #22543d;
    animation: correctPop 0.4s ease;
  }

  .option-btn.wrong {
    border-color: #fc8181;
    background: #fed7d7;
    color: #9b2c2c;
    animation: shake 0.4s ease;
  }

  .option-btn.reveal {
    border-color: #48bb78;
    background: #f0fff4;
  }

  .option-btn.disabled {
    pointer-events: none;
    opacity: 0.7;
  }

  @keyframes correctPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* Hint area */
  .hint-area {
    min-height: 32px;
    font-size: 18px;
    color: #718096;
    text-align: center;
    transition: opacity 0.3s;
  }

  .hint-area .correct-text { color: #38a169; font-weight: 700; }
  .hint-area .wrong-text { color: #e53e3e; font-weight: 700; }

  .ok-btn {
    display: inline-block;
    margin-top: 12px;
    margin-left: 12px;
    padding: 10px 40px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #5a67d8, #764ba2);
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .ok-btn:hover { transform: scale(1.05); }
  .ok-btn:active { transform: scale(0.95); }

  /* Controls at bottom */
  .controls {
    width: 90%;
    max-width: 560px;
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 32px;
  }

  .control-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .grade-btn, .mode-btn {
    padding: 10px 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 24px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
    white-space: nowrap;
  }

  .grade-btn:hover, .mode-btn:hover {
    background: rgba(255,255,255,0.3);
  }

  .grade-btn.active, .mode-btn.active {
    background: #fff;
    color: #5a67d8;
    border-color: #fff;
  }

  .section-label {
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    text-align: center;
    font-weight: 600;
  }

  /* Celebration overlay */
  .celebration {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 100;
  }

  .confetti {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 2px;
    animation: fall 1.5s ease-out forwards;
    pointer-events: none;
  }

  @keyframes fall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }

  /* Responsive */
  @media (max-width: 420px) {
    .question-char { font-size: 96px; }
    .question-pinyin { font-size: 36px; }
    .option-btn { font-size: 22px; padding: 14px 8px; }
    .card { padding: 24px 16px; }
  }

  .title {
    color: #fff;
    font-size: 28px;
    font-weight: 900;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    margin-top: 16px;
    margin-bottom: 4px;
  }

  /* User bar */
  .user-bar {
    width: 100%;
    max-width: 600px;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
    padding: 0 20px;
    color: #fff;
    font-size: 14px;
  }

  .user-bar span { font-weight: 600; }

  .user-btn {
    padding: 6px 16px;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 16px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: all 0.2s;
  }

  .user-btn:hover { background: rgba(255,255,255,0.3); }

  /* Modal overlay */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }

  .modal-overlay.hidden { display: none; }

  .modal {
    background: #fff;
    border-radius: 20px;
    padding: 32px 28px;
    width: 90%;
    max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .modal h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #2d3748;
    font-size: 22px;
  }

  .modal-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid #5a67d8;
  }

  .modal-tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: #fff;
    color: #5a67d8;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .modal-tab.active {
    background: #5a67d8;
    color: #fff;
  }

  .modal input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    font-size: 16px;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .modal input:focus { border-color: #5a67d8; }

  .modal-submit {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #5a67d8, #764ba2);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .modal-submit:hover { transform: scale(1.02); }

  .modal-error {
    color: #e53e3e;
    font-size: 14px;
    text-align: center;
    margin-bottom: 12px;
    min-height: 20px;
  }

  .modal-close {
    display: block;
    margin: 12px auto 0;
    border: none;
    background: none;
    color: #999;
    font-size: 14px;
    cursor: pointer;
  }

  .modal-close:hover { color: #333; }

  /* Dictation mode */
  .hw-canvas-box {
    border: 3px solid #e2e8f0;
    border-radius: 16px;
    overflow: hidden;
    background: #fefefe;
  }

  .hw-canvas-box canvas {
    display: block;
    cursor: crosshair;
    touch-action: none;
  }

  .hw-grid-lines {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .hw-grid-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #a0aec0;
  }

  .hw-grid-line-h {
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: #a0aec0;
  }

  .hw-grid-dash-v {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 0;
    border-left: 1px dashed #cbd5e0;
  }

  .hw-grid-dash-h {
    position: absolute;
    left: 0;
    right: 0;
    height: 0;
    border-top: 1px dashed #cbd5e0;
  }

  .canvas-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  #writeCanvas {
    cursor: crosshair;
    touch-action: none;
  }

  .canvas-controls {
    display: flex;
    gap: 12px;
  }

  .canvas-btn {
    padding: 10px 28px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    background: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    color: #2d3748;
  }

  .canvas-btn:hover { border-color: #5a67d8; background: #ebf4ff; }

  /* Leaderboard */
  .lb-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 16px;
  }

  .lb-tab {
    padding: 6px 12px;
    border: 2px solid #e2e8f0;
    border-radius: 16px;
    background: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: #718096;
    transition: all 0.2s;
  }

  .lb-tab.active {
    background: #5a67d8;
    color: #fff;
    border-color: #5a67d8;
  }

  .lb-my-rank {
    text-align: center;
    padding: 10px;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #ebf4ff, #e9d8fd);
    border-radius: 12px;
    font-weight: 700;
    color: #5a67d8;
    font-size: 15px;
  }

  .lb-list {
    max-height: 320px;
    overflow-y: auto;
  }

  .lb-row {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid #f0f0f0;
    gap: 12px;
  }

  .lb-row.me { background: #ebf4ff; border-radius: 8px; }

  .lb-rank {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 14px;
    flex-shrink: 0;
    background: #e2e8f0;
    color: #718096;
  }

  .lb-rank.gold { background: #f6e05e; color: #744210; }
  .lb-rank.silver { background: #e2e8f0; color: #4a5568; }
  .lb-rank.bronze { background: #fbd38d; color: #7b341e; }

  .lb-name { flex: 1; font-weight: 600; font-size: 15px; }
  .lb-score { font-weight: 700; color: #5a67d8; font-size: 15px; }
  .lb-acc { font-size: 12px; color: #a0aec0; margin-left: 4px; }

  /* Coins display */
  .coins-box {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 8px 20px;
    font-size: 18px;
    font-weight: bold;
    backdrop-filter: blur(4px);
    color: #ffe066;
  }

  /* Shop modal */
  .shop-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: 360px;
    overflow-y: auto;
  }

  .shop-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 14px;
    background: #fafafa;
  }

  .shop-item-info { flex: 1; }
  .shop-item-name { font-weight: 700; font-size: 16px; color: #2d3748; }
  .shop-item-desc { font-size: 13px; color: #718096; margin-top: 2px; }
  .shop-item-price { font-weight: 700; color: #d69e2e; font-size: 15px; margin-right: 12px; }

  .shop-buy-btn {
    padding: 8px 18px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #f6d365, #fda085);
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .shop-buy-btn:hover { transform: scale(1.05); }
  .shop-buy-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .shop-coins-bar {
    text-align: center;
    padding: 10px;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #fefcbf, #fef3c7);
    border-radius: 12px;
    font-weight: 700;
    color: #b7791f;
    font-size: 16px;
  }

  .shop-empty {
    text-align: center;
    color: #a0aec0;
    padding: 40px 20px;
    font-size: 15px;
  }

  .game-minutes-bar {
    text-align: center;
    padding: 8px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #c6f6d5, #b2f5ea);
    border-radius: 12px;
    font-weight: 700;
    color: #276749;
    font-size: 15px;
  }

  /* Coin notification */
  .coin-notification {
    position: fixed;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #fefcbf, #fbd38d);
    color: #975a16;
    font-size: 22px;
    font-weight: 800;
    padding: 16px 32px;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    z-index: 10000;
    animation: coinPop 2.5s ease-out forwards;
    pointer-events: none;
  }

  @keyframes coinPop {
    0% { opacity: 0; transform: translateX(-50%) scale(0.5) translateY(20px); }
    15% { opacity: 1; transform: translateX(-50%) scale(1.1) translateY(0); }
    25% { transform: translateX(-50%) scale(1) translateY(0); }
    75% { opacity: 1; }
    100% { opacity: 0; transform: translateX(-50%) scale(0.8) translateY(-40px); }
  }

  /* Admin panel */
  .admin-section {
    margin-bottom: 20px;
  }

  .admin-section h3 {
    font-size: 16px;
    color: #2d3748;
    margin-bottom: 10px;
    border-bottom: 2px solid #e2e8f0;
    padding-bottom: 6px;
  }

  .admin-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }

  .admin-input {
    flex: 1;
    padding: 8px 12px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
  }

  .admin-input:focus { border-color: #5a67d8; }

  .admin-btn {
    padding: 8px 16px;
    border: none;
    border-radius: 10px;
    background: #5a67d8;
    color: #fff;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.2s;
    white-space: nowrap;
  }

  .admin-btn:hover { transform: scale(1.03); }
  .admin-btn.danger { background: #e53e3e; }

  .admin-tabs {
    display: flex;
    gap: 0;
    border-bottom: 2px solid #e2e8f0;
  }
  .admin-tab {
    flex: 1;
    padding: 10px 0;
    border: none;
    background: none;
    font-size: 15px;
    font-weight: 600;
    color: #a0aec0;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: color 0.2s, border-color 0.2s;
  }
  .admin-tab.active {
    color: #5a67d8;
    border-bottom-color: #5a67d8;
  }
  .admin-tab:hover:not(.active) { color: #4a5568; }
  .admin-tab-content.hidden { display: none; }

  .rules-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .rules-table th {
    background: #edf2f7;
    padding: 6px 8px;
    text-align: left;
    font-weight: 600;
    font-size: 13px;
    color: #4a5568;
  }
  .rules-table td {

<script>
let CSRF_TOKEN = "{{ csrf_token() }}";
{
  const _origFetch = window.fetch;
  window.fetch = function(url, opts) {
    opts = opts || {};
    const method = (opts.method || "GET").toUpperCase();
    if (method !== "GET" && method !== "HEAD" && method !== "OPTIONS") {
      opts.headers = Object.assign({}, opts.headers, {"X-CSRF-Token": CSRF_TOKEN});
    }
    return _origFetch.call(this, url, opts);
  };
}
const MODES = [
  { id: "char_to_pinyin", label: "看字选拼音" },
  { id: "pinyin_to_char", label: "看拼音选字" },
  { id: "listen_to_char", label: "听音选字" },
  { id: "pinyin_typing", label: "给汉字注音" },
  { id: "dictation_handwrite", label: "看拼音写词语" },
];

let state = {
  grade: localStorage.getItem("hanzi_grade") || "一年级上",
  mode: localStorage.getItem("hanzi_mode") || "char_to_pinyin",
  score: 0,
  combo: 0,
  comboMax: 0,
  totalQuestions: 0,
  correctAnswers: 0,
  answering: false,
  user: null,
  authTab: "login",
  coins: 0,
  gameMinutes: 0,
  isAdmin: false,
  seenQuestions: new Set(),
  retryQueue: [],
  retryCount: 0,
  coinEligible: true,
};

// Streak milestone coin rules (loaded from server, these are defaults)
let COIN_MILESTONES = {
  recognition: [
    { streak: 15, coins: 1 },
    { streak: 30, coins: 3 },
    { streak: 45, coins: 5 },
  ],
  writing: [
    { streak: 5, coins: 2 },
    { streak: 10, coins: 10 },
    { streak: 20, coins: 25 },
  ],
};

function reportStreak(correct) {
  if (!state.user) return;
  fetch("/api/streak", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ correct, mode: state.mode, grade: state.grade }),
  }).then(r => r.json()).then(data => {
    if (data.coin_eligible !== undefined) {
      state.coinEligible = data.coin_eligible;
      updateStreakBar();
    }
    if (data.coins_earned > 0) {
      state.coins = data.coins;
      document.getElementById("coinsBox").textContent = `金币: ${state.coins}`;
      showCoinNotification(data.coins_earned, data.streak);
      spawnConfetti();
      spawnStarBurst();
    }
  }).catch(() => {});
}

async function checkCoinEligible() {
  if (!state.user) { state.coinEligible = true; return; }
  try {
    const res = await fetch(`/api/coin-eligible?mode=${encodeURIComponent(state.mode)}&grade=${encodeURIComponent(state.grade)}`);
    const data = await res.json();
    state.coinEligible = data.eligible;
  } catch (e) {
    state.coinEligible = true;
  }
  updateScoreboard();
}

function showCoinNotification(coins, streak) {
  const el = document.createElement("div");
  el.className = "coin-notification";
  el.innerHTML = `🪙 +${coins} 金币! (连击${streak})`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

function spawnStarBurst() {
  const icons = ["⭐", "🌟", "✨", "💫", "🎉", "🏆"];
  for (let i = 0; i < 12; i++) {
    const el = document.createElement("div");
    el.className = "star-burst";
    el.textContent = icons[Math.floor(Math.random() * icons.length)];
    el.style.left = (20 + Math.random() * 60) + "%";
    el.style.top = (30 + Math.random() * 30) + "%";
    el.style.animationDelay = (Math.random() * 0.6) + "s";
    el.style.animationDuration = (1 + Math.random() * 0.8) + "s";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }
}


// --- Auth ---
async function checkLogin() {
  const res = await fetch("/api/me");
  const data = await res.json();
  if (data.logged_in) {
    state.user = data.username;
    await loadCoins();
  }
  // Check admin status
  const adminRes = await fetch("/api/admin/check");
  const adminData = await adminRes.json();
  state.isAdmin = adminData.is_admin;
  renderUserBar();
}

async function loadCoins() {
  if (!state.user) return;
  const [coinRes, shopRes] = await Promise.all([
    fetch("/api/coins"),
    fetch("/api/shop"),
  ]);
  const data = await coinRes.json();
  const shopData = await shopRes.json();
  if (shopData.coin_rules) COIN_MILESTONES = shopData.coin_rules;
  if (!data.error) {
    state.coins = data.coins;
    state.gameMinutes = data.game_minutes || 0;
    // Load persistent streak for current mode
    const isWriting = state.mode === "dictation_handwrite";
    state.combo = isWriting ? (data.writing_streak || 0) : (data.recognition_streak || 0);
    state.comboMax = Math.max(state.comboMax, state.combo);
    const coinsBox = document.getElementById("coinsBox");
    coinsBox.textContent = `金币: ${state.coins}`;
    coinsBox.style.display = "";
    updateScoreboard();
  }
}

function renderUserBar() {
  const bar = document.getElementById("userBar");
  const adminBtn = state.isAdmin
    ? `<button class="user-btn" onclick="showAdminPanel()">管理员</button>`
    : `<button class="admin-link" onclick="showAdminLogin()">管理员</button>`;
  if (state.user) {
    bar.innerHTML = `
      <span style="cursor:pointer" onclick="switchToHomeworkView()">${state.user}</span>
      <button class="user-btn" onclick="startVoluntaryReview()">复习</button>
      <button class="user-btn" onclick="showShop()">商店</button>
      <button class="user-btn" onclick="showLeaderboard()">排行榜</button>
      <button class="user-btn" onclick="showScores()">历史成绩</button>
      <button class="user-btn" onclick="doLogout()">退出</button>
      ${adminBtn}
    `;
  } else {
    bar.innerHTML = `
      <button class="user-btn" onclick="showAuthModal()">登录 / 注册</button>
    `;
  }
}

function showAuthModal() {
  document.getElementById("authModal").classList.remove("hidden");
  document.getElementById("authError").textContent = "";
  document.getElementById("authUsername").value = "";
  document.getElementById("authPassword").value = "";
  document.getElementById("authCancelBtn").style.display = state.user ? "" : "none";
  switchTab("login");
  setTimeout(() => document.getElementById("authUsername").focus(), 50);
}

function hideAuthModal() {
  document.getElementById("authModal").classList.add("hidden");
}

function switchTab(tab) {
  state.authTab = tab;
  const tabs = document.querySelectorAll(".modal-tab");
  tabs[0].classList.toggle("active", tab === "login");
  tabs[1].classList.toggle("active", tab === "register");
  document.getElementById("authSubmit").textContent = tab === "login" ? "登录" : "注册";
  document.getElementById("authError").textContent = "";
}

async function submitAuth() {
  const username = document.getElementById("authUsername").value.trim();
  const password = document.getElementById("authPassword").value;
  const endpoint = state.authTab === "login" ? "/api/login" : "/api/register";

  const res = await fetch(endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password }),
  });
  const data = await res.json();

  if (data.error) {
    document.getElementById("authError").textContent = data.error;
    return;
  }

  if (data.csrf_token) CSRF_TOKEN = data.csrf_token;
  state.user = data.username;
  await loadCoins();
  await loadAppData();
  renderUserBar();
  hideAuthModal();
  // Switch to homework view after login
  switchToHomeworkView();
}

async function doLogout() {
  await saveScore();
  await fetch("/api/logout", { method: "POST" });
  state.user = null;
  state.coins = 0;
  state.combo = 0;
  document.getElementById("coinsBox").style.display = "none";
  renderUserBar();
  // Must login to use — hide everything and show auth modal
  document.getElementById("homeworkView").style.display = "none";
  document.getElementById("gameView").style.display = "none";
  showAuthModal();
}

async function saveScore() {
  if (!state.user || state.totalQuestions === 0) return;
  const payload = {
    grade: state.grade,
    mode: state.mode,
    score: state.score,
    combo_max: state.comboMax,
    total_questions: state.totalQuestions,
    correct_answers: state.correctAnswers,
  };
  // Reset session counters but keep combo (persistent streak)
  state.score = 0;
  state.comboMax = state.combo;
  state.totalQuestions = 0;
  state.correctAnswers = 0;
  updateScoreboard();
  try {
    await fetch("/api/scores", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
  } catch (e) {
    navigator.sendBeacon("/api/scores", new Blob([JSON.stringify(payload)], { type: "application/json" }));
  }
}

// Fire-and-forget save (non-blocking, for use in button handlers)
function saveScoreAsync() {
  if (!state.user || state.totalQuestions === 0) return;
  const payload = {
    grade: state.grade,
    mode: state.mode,
    score: state.score,
    combo_max: state.comboMax,
    total_questions: state.totalQuestions,
    correct_answers: state.correctAnswers,
  };
  state.score = 0;
  state.comboMax = state.combo;
  state.totalQuestions = 0;
  state.correctAnswers = 0;
  updateScoreboard();
  navigator.sendBeacon("/api/scores", new Blob([JSON.stringify(payload)], { type: "application/json" }));
}

function showScores() {
  saveScoreAsync();
  window.open("/history", "_blank");
}

// --- Leaderboard ---
const MODE_LABELS = {
  char_to_pinyin: "看字选拼音",
  pinyin_to_char: "看拼音选字",
  listen_to_char: "听音选字",
  pinyin_typing: "给汉字注音",
  dictation_handwrite: "看拼音写词语",
};

async function showLeaderboard() {
  await saveScore();
  const modal = document.getElementById("lbModal");
  modal.classList.remove("hidden");

  // Render mode tabs
  const tabs = document.getElementById("lbTabs");
  const allModes = [{ id: "", label: "全部" }, ...MODES];
  tabs.innerHTML = allModes.map(m =>
    `<button class="lb-tab${m.id === "" ? " active" : ""}" onclick="loadLeaderboard('${m.id}', this)">${m.label}</button>`
  ).join("");

  loadLeaderboard("", tabs.querySelector(".lb-tab"));
}

async function loadLeaderboard(mode, tabBtn) {
  // Update active tab
  document.querySelectorAll(".lb-tab").forEach(t => t.classList.remove("active"));
  if (tabBtn) tabBtn.classList.add("active");

  const res = await fetch(`/api/leaderboard?mode=${encodeURIComponent(mode)}`);
  const data = await res.json();

  const myRankEl = document.getElementById("lbMyRank");
  if (data.my_rank) {
    myRankEl.innerHTML = `你的排名: 第${data.my_rank.rank}名 | 累积${data.my_rank.total_score}分 | 正确率${data.my_rank.accuracy}%`;
    myRankEl.style.display = "block";
  } else {
    myRankEl.style.display = "none";
  }

  const list = document.getElementById("lbList");
  if (!data.leaderboard || data.leaderboard.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#a0aec0;padding:20px">暂无数据</div>';
    return;
  }

  list.innerHTML = data.leaderboard.map(r => {
    const rankClass = r.rank === 1 ? "gold" : r.rank === 2 ? "silver" : r.rank === 3 ? "bronze" : "";
    const isMe = state.user && r.username === state.user;
    return `<div class="lb-row${isMe ? " me" : ""}">
      <div class="lb-rank ${rankClass}">${r.rank}</div>
      <div class="lb-name">${r.username}</div>
      <div class="lb-score">${r.total_score}分<span class="lb-acc">${r.accuracy}%</span></div>
    </div>`;
  }).join("");
}

// --- Shop ---
async function showShop() {
  const modal = document.getElementById("shopModal");
  modal.classList.remove("hidden");

  const coinsBar = document.getElementById("shopCoinsBar");
  const minutesBar = document.getElementById("shopGameMinutes");
  if (state.user) {
    await loadCoins();
    coinsBar.textContent = `我的金币: ${state.coins}`;
    minutesBar.textContent = `剩余游戏时间: ${state.gameMinutes} 分钟`;
    coinsBar.style.display = "";
    minutesBar.style.display = "";
  } else {
    coinsBar.style.display = "none";
    minutesBar.style.display = "none";
  }

  // Load packages and rules
  const res = await fetch("/api/shop");
  const data = await res.json();
  const grid = document.getElementById("shopGrid");

  // Update global coin milestones from server
  if (data.coin_rules) {
    COIN_MILESTONES = data.coin_rules;
  }

  grid.innerHTML = data.items.map(item => {
    const canBuy = state.user && state.coins >= item.price;
    return `<div class="shop-item">
      <div class="shop-item-info">
        <div class="shop-item-name">${item.name}</div>
      </div>
      <div class="shop-item-price">${item.price} 金币</div>
      <button class="shop-buy-btn" onclick="buyItem(${item.id}, '${item.name}', ${item.price})" ${canBuy ? "" : "disabled"}>${state.user ? "兑换" : "登录后兑换"}</button>
    </div>`;
  }).join("");

  // Show coin rules dynamically
  const rulesDiv = document.getElementById("shopRulesInfo");
  const recRules = (data.coin_rules?.recognition || []).map(r => `连击${r.streak}→${r.coins}币`).join(", ");
  const wrtRules = (data.coin_rules?.writing || []).map(r => `连击${r.streak}→${r.coins}币`).join(", ");
  rulesDiv.innerHTML = `<strong>赚取金币规则:</strong><br>认字模式: ${recRules || "无"}<br>写字模式: ${wrtRules || "无"}`;
}

async function buyItem(itemId, name, price) {
  if (!state.user) return;
  if (!confirm(`确定花费 ${price} 金币兑换「${name}」？`)) return;

  const res = await fetch("/api/shop/buy", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ item_id: itemId }),
  });
  const data = await res.json();
  if (data.error) {
    alert(data.error);
    return;
  }
  state.coins = data.coins;
  state.gameMinutes = data.game_minutes;
  document.getElementById("coinsBox").textContent = `金币: ${state.coins}`;
  alert(`兑换成功!`);
  showShop(); // Refresh
}

function showAdminLogin() {
  document.getElementById("adminLoginModal").classList.remove("hidden");
  document.getElementById("adminLoginError").textContent = "";
  document.getElementById("adminPassword").value = "";
  setTimeout(() => document.getElementById("adminPassword").focus(), 50);
}

async function submitAdminLogin() {
  const password = document.getElementById("adminPassword").value;
  const res = await fetch("/api/admin/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password }),
  });
  const data = await res.json();
  if (data.error) {
    document.getElementById("adminLoginError").textContent = data.error;
    return;
  }
  state.isAdmin = true;

function switchAdminTab(tab) {
  // Update tab buttons
  document.querySelectorAll(".admin-tab").forEach(btn => btn.classList.remove("active"));
  document.querySelector(`.admin-tab[onclick*="${tab}"]`).classList.add("active");
  // Show/hide content
  document.querySelectorAll(".admin-tab-content").forEach(el => el.classList.add("hidden"));
  const tabMap = { rules: "adminTabRules", homework: "adminTabHomework", users: "adminTabUsers", dailylog: "adminTabDailylog" };
  document.getElementById(tabMap[tab]).classList.remove("hidden");
  if (tab === "dailylog") initDailyLogTab();
}

async function showAdminPanel() {

  try {

async function loadAdminRules() {
  const res = await fetch("/api/admin/settings");
  const data = await res.json();

  const wrtRules = data.coin_rules?.writing || [];

function fillRulesTable(tableId, rules) {
  const tbody = document.querySelector(`#${tableId} tbody`);
  tbody.innerHTML = rules.map(r =>
    `<tr>
      <td><input type="number" class="rule-streak" value="${r.streak}" min="1"></td>
      <td><input type="number" class="rule-coins" value="${r.coins}" min="1"></td>
      <td><button class="del-btn" onclick="this.closest('tr').remove()">×</button></td>
    </tr>`
  ).join("");
}

function addRuleRow(tableId) {
  const tbody = document.querySelector(`#${tableId} tbody`);
  tbody.insertAdjacentHTML("beforeend",
    `<tr>
      <td><input type="number" class="rule-streak" value="" min="1" placeholder="连击数"></td>
      <td><input type="number" class="rule-coins" value="" min="1" placeholder="金币"></td>
      <td><button class="del-btn" onclick="this.closest('tr').remove()">×</button></td>
    </tr>`);
}

function fillExchangeTable(pkgs) {
  const tbody = document.querySelector("#adminExchangeRules tbody");
  tbody.innerHTML = pkgs.map(p =>
    `<tr>
      <td><input type="number" class="pkg-price" value="${p.price}" min="1"></td>
      <td><input type="number" class="pkg-minutes" value="${p.minutes}" min="1"></td>
      <td><button class="del-btn" onclick="this.closest('tr').remove()">×</button></td>
    </tr>`
  ).join("");
}

function addExchangeRow() {
  const tbody = document.querySelector("#adminExchangeRules tbody");
  tbody.insertAdjacentHTML("beforeend",
    `<tr>
      <td><input type="number" class="pkg-price" value="" min="1" placeholder="金币"></td>
      <td><input type="number" class="pkg-minutes" value="" min="1" placeholder="分钟"></td>
      <td><button class="del-btn" onclick="this.closest('tr').remove()">×</button></td>
    </tr>`);
}

function readRulesFromTable(tableId) {
  const rows = document.querySelectorAll(`#${tableId} tbody tr`);
  const rules = [];
  for (const row of rows) {
    const streak = parseInt(row.querySelector(".rule-streak").value);
    const coins = parseInt(row.querySelector(".rule-coins").value);
    if (streak > 0 && coins > 0) rules.push({ streak, coins });
  }
  rules.sort((a, b) => a.streak - b.streak);
  return rules;
}

function readExchangeFromTable() {
  const rows = document.querySelectorAll("#adminExchangeRules tbody tr");
  const pkgs = [];
  for (const row of rows) {
    const price = parseInt(row.querySelector(".pkg-price").value);
    const minutes = parseInt(row.querySelector(".pkg-minutes").value);
    if (price > 0 && minutes > 0) pkgs.push({ price, minutes });
  }
  pkgs.sort((a, b) => a.price - b.price);
  return pkgs;
}

async function saveAllRules() {
  const coinRules = {
    recognition: readRulesFromTable("adminRecRules"),
    writing: readRulesFromTable("adminWrtRules"),
  };
  const exchangePackages = readExchangeFromTable();
  const msg = document.getElementById("adminRulesMsg");

  if (coinRules.recognition.length === 0 && coinRules.writing.length === 0) {
    msg.textContent = "至少需要一条金币规则";
    msg.style.color = "#e53e3e";
    return;
  }
  if (exchangePackages.length === 0) {
    msg.textContent = "至少需要一个兑换套餐";
    msg.style.color = "#e53e3e";
    return;
  }

  const res = await fetch("/api/admin/settings", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ coin_rules: coinRules, exchange_packages: exchangePackages }),
  });
  const data = await res.json();
  if (data.error) {
    msg.textContent = data.error;
    msg.style.color = "#e53e3e";
  } else {
    msg.textContent = "已保存!";
    msg.style.color = "#38a169";
    setTimeout(() => msg.textContent = "", 2000);
  }
}

async function showUserDetail(userId, username) {
  const res = await fetch(`/api/admin/user/${userId}/details`);
  const data = await res.json();
  if (data.error) { alert(data.error); return; }

  document.getElementById("adminUserDetailTitle").textContent = `${username} 的详情`;
  const content = document.getElementById("adminUserDetailContent");

  const modeLabels = { char_to_pinyin: "看字选拼音", pinyin_to_char: "看拼音选字", listen_to_char: "听音选字", pinyin_typing: "给汉字注音", dictation_handwrite: "看拼音写词语" };

  let html = '';

  // Score history
  html += '<h3 style="font-size:15px;margin:12px 0 8px;border-bottom:1px solid #e2e8f0;padding-bottom:4px">历史成绩</h3>';
  if (data.scores.length === 0) {
    html += '<div style="color:#a0aec0;font-size:13px;padding:8px 0">暂无成绩</div>';
  } else {
    html += '<div style="max-height:200px;overflow-y:auto;font-size:13px">';
    html += '<table style="width:100%;border-collapse:collapse"><tr style="background:#f7fafc"><th style="padding:4px 6px;text-align:left">日期</th><th>年级</th><th>模式</th><th>题数</th><th>正确</th><th>得分</th></tr>';
    data.scores.forEach(s => {
      const acc = s.total_questions > 0 ? Math.round(s.correct_answers / s.total_questions * 100) : 0;
      html += `<tr style="border-bottom:1px solid #f0f0f0"><td style="padding:4px 6px">${s.date}</td><td style="text-align:center">${s.grade}</td><td style="text-align:center">${modeLabels[s.mode] || s.mode}</td><td style="text-align:center">${s.total_questions}</td><td style="text-align:center">${s.correct_answers}(${acc}%)</td><td style="text-align:center;font-weight:700;color:#5a67d8">${s.score}</td></tr>`;
    });
    html += '</table></div>';
  }

  // Wrong answers
  const wrongTotal = data.wrong_answers.length;
  const wrongShow = data.wrong_answers.slice(0, 10);
  html += '<h3 style="font-size:15px;margin:16px 0 8px;border-bottom:1px solid #e2e8f0;padding-bottom:4px">错题记录 <span style="font-size:12px;color:#a0aec0">(' + wrongTotal + '题)</span></h3>';
  if (wrongTotal === 0) {
    html += '<div style="color:#a0aec0;font-size:13px;padding:8px 0">暂无错题</div>';
  } else {
    html += '<div style="max-height:200px;overflow-y:auto;font-size:13px">';
    html += '<table style="width:100%;border-collapse:collapse"><tr style="background:#f7fafc"><th style="padding:4px 6px;text-align:left">字/词</th><th>拼音</th><th>组词</th><th>模式</th><th>复习次数</th><th>日期</th></tr>';
    wrongShow.forEach(w => {
      const rcColor = w.review_count === 0 ? '#e53e3e' : w.review_count >= 2 ? '#38a169' : '#d69e2e';
      html += `<tr style="border-bottom:1px solid #f0f0f0"><td style="padding:4px 6px;font-size:18px;font-weight:700">${w.character}</td><td>${w.pinyin}</td><td style="font-size:12px">${w.words}</td><td style="text-align:center;font-size:12px">${modeLabels[w.mode] || w.mode}</td><td style="text-align:center;color:${rcColor};font-weight:700">${w.review_count}</td><td style="font-size:12px">${w.date}</td></tr>`;
    });
    html += '</table></div>';
    if (wrongTotal > 10) {
      html += `<div style="text-align:center;margin-top:8px"><a href="/admin/user/${userId}/wrong" target="_blank" style="color:#5a67d8;font-weight:600;font-size:14px">查看全部 ${wrongTotal} 条错题 →</a></div>`;
    }
  }

  // Mastered
  html += '<h3 style="font-size:15px;margin:16px 0 8px;border-bottom:1px solid #e2e8f0;padding-bottom:4px">已掌握 <span style="font-size:12px;color:#a0aec0">(' + data.mastered.length + '词)</span></h3>';
  if (data.mastered.length === 0) {
    html += '<div style="color:#a0aec0;font-size:13px;padding:8px 0">暂无</div>';
  } else {
    html += '<div style="max-height:150px;overflow-y:auto;font-size:13px;display:flex;flex-wrap:wrap;gap:6px">';
    data.mastered.forEach(m => {
      html += `<span style="background:#c6f6d5;padding:2px 8px;border-radius:8px;font-weight:600">${m.character}</span>`;
    });
    html += '</div>';
  }

  content.innerHTML = html;
  document.getElementById("adminUserDetailModal").classList.remove("hidden");
}

async function saveHomeworkPlan() {
  const userId = document.getElementById("hwUserId").value;
  const grade = document.getElementById("hwGrade").value;
  const recLesson = parseInt(document.getElementById("hwRecLesson").value) || 1;
  const wrtLesson = parseInt(document.getElementById("hwWrtLesson").value) || 1;
  const msg = document.getElementById("hwPlanMsg");

  if (!userId || !grade) {
    msg.textContent = "请选择用户和年级";
    msg.style.color = "#e53e3e";
    return;
  }

  try {
    const res = await fetch("/api/admin/homework/plan", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: parseInt(userId), grade, recognition_lesson: recLesson, writing_lesson: wrtLesson }),
    });
    if (!res.ok) {
      const text = await res.text();
      try { const d = JSON.parse(text); msg.textContent = d.error || `错误: ${res.status}`; }
      catch { msg.textContent = `请求失败 (${res.status})`; }
      msg.style.color = "#e53e3e";
      return;
    }
    const data = await res.json();
    if (data.error) {
      msg.textContent = data.error;
      msg.style.color = "#e53e3e";
    } else {
      msg.textContent = "已保存";
      msg.style.color = "#38a169";
      await loadAdminHomework();
    }
  } catch (e) {
    msg.textContent = "网络错误: " + e.message;
    msg.style.color = "#e53e3e";
  }
}

async function repeatAssignment(assignmentId) {

  if (data.error) { alert(data.error); return; }

}

async function loadDailyLog() {
  const userId = document.getElementById("dailyLogUserId").value;
  const days = document.getElementById("dailyLogDays").value;
  const content = document.getElementById("adminDailyLogContent");
  if (!userId) { content.innerHTML = '<div style="color:#a0aec0;padding:16px;text-align:center">请选择用户</div>'; return; }

  const res = await fetch(`/api/admin/user/${userId}/daily_log?days=${days}`);
  const data = await res.json();
  const log = data.daily_log || [];
  if (log.length === 0) { content.innerHTML = '<div style="color:#a0aec0;padding:16px;text-align:center">暂无记录</div>'; return; }

  const modeLabels = { char_to_pinyin: "看字选拼音", pinyin_to_char: "看拼音选字", listen_to_char: "听音选字", dictation_handwrite: "看拼音写词语", pinyin_typing: "给汉字注音" };
  let html = '';
  log.forEach(day => {
    html += `<div class="day-header">${day.date}</div>`;
    if (day.homework.length > 0) {
      day.homework.forEach(h => {
        const tl = h.type === "recognition" ? "认字" : "写字";
        const gs = h.grade ? (h.grade[0] + h.grade[h.grade.length-1]) : "";
        if (h.status === "completed") {
          const acc = h.total_questions > 0 ? Math.round(h.correct_answers / h.total_questions * 100) : 0;
          const accColor = acc >= 80 ? "#38a169" : "#e53e3e";
          const mins = Math.floor(h.time_spent / 60); const secs = h.time_spent % 60;
          html += `<div class="day-item">作业 ${gs}${tl}第${h.lesson_num}课: <span style="color:${accColor};font-weight:700">${acc}%</span> (${h.correct_answers}/${h.total_questions}) ${mins}分${secs}秒</div>`;
        } else {
          html += `<div class="day-item" style="color:#d69e2e">作业 ${gs}${tl}第${h.lesson_num}课: 未完成</div>`;
        }
      });
    }
    if (day.games.length > 0) {
      day.games.forEach(g => {
        const gs = g.grade ? (g.grade[0] + g.grade[g.grade.length-1]) : "";
        const ml = modeLabels[g.mode] || g.mode;
        const acc = g.total_questions > 0 ? Math.round(g.correct_answers / g.total_questions * 100) : 0;
        html += `<div class="day-item">游戏 ${gs} ${ml}: ${g.total_questions}题 正确率${acc}% 得分${g.score}</div>`;
      });
    }
    if (day.homework.length === 0 && day.games.length === 0) {
      html += `<div class="day-item" style="color:#a0aec0">无活动</div>`;
    }
  });
  content.innerHTML = html;
}

    // Must login to use — hide everything and show auth modal
    document.getElementById("homeworkView").style.display = "none";

async function loadAppData() {
  const res = await fetch("/api/grades");
  const data = await res.json();
  renderGrades(data.grades || []);
  renderModes();
}

function renderGrades(grades) {
  const row = document.getElementById("gradeRow");
  row.innerHTML = "";
  grades.forEach(g => {
    const btn = document.createElement("button");
    btn.className = "grade-btn" + (g === state.grade ? " active" : "");
    btn.textContent = g;
    btn.onclick = async () => {
      saveScoreAsync();
      state.grade = g;
      localStorage.setItem("hanzi_grade", g);
      state.seenQuestions.clear();
      state.retryQueue = [];
      state.retryCount = 0;
      await checkCoinEligible();
      updateScoreboard();
      document.querySelectorAll(".grade-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      loadQuestion();
    };
    row.appendChild(btn);
  });
}

function renderModes() {
  const row = document.getElementById("modeRow");
  row.innerHTML = "";
  MODES.forEach(m => {
    const btn = document.createElement("button");
    btn.className = "mode-btn" + (m.id === state.mode ? " active" : "");
    btn.textContent = m.label;
    btn.onclick = async () => {
      saveScoreAsync();
      state.mode = m.id;
      localStorage.setItem("hanzi_mode", m.id);
      state.seenQuestions.clear();
      state.retryQueue = [];
      state.retryCount = 0;
      // Load the correct persistent streak for the new mode type
      if (state.user) await loadCoins();
      await checkCoinEligible();
      updateScoreboard();
      document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      loadQuestion();
    };
    row.appendChild(btn);
  });
}

// --- Load question ---
async function loadQuestion(reuseCurrentQ) {
  state.answering = false;
  document.getElementById("hintArea").innerHTML = "";

  // When toggling stroke order, reuse the current question
  if (reuseCurrentQ && state.currentQ) {
    renderQuestion(state.currentQ);
    return;
  }

  // Check retry queue first (wrong answer to repeat immediately)
  if (state.retryQueue.length > 0) {
    const retryQ = state.retryQueue[0];
    if (retryQ.mode === "dictation_handwrite" || retryQ.mode === "pinyin_typing") {
      renderQuestion(retryQ);
      return;
    }
    // For multiple choice, reshuffle the options
    const reshuffled = Object.assign({}, retryQ);
    const opts = [...reshuffled.options];
    // Shuffle options
    for (let i = opts.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [opts[i], opts[j]] = [opts[j], opts[i]];
    }
    reshuffled.options = opts;
    reshuffled.correct_index = opts.indexOf(reshuffled.answer);
    renderQuestion(reshuffled);
    return;
  }

  let url = `/api/question?grade=${encodeURIComponent(state.grade)}&mode=${state.mode}`;

  // Try to get a question not seen before, with retries
  let q = null;
  for (let attempt = 0; attempt < 8; attempt++) {
    const res = await fetch(url);
    q = await res.json();
    if (q.error) break;
    const qKey = state.mode + "|" + (q.answer || q.question);
    if (!state.seenQuestions.has(qKey)) {
      state.seenQuestions.add(qKey);
      break;
    }
    // If we've seen all questions, clear and accept this one
    if (attempt === 7) {
      state.seenQuestions.clear();
      state.seenQuestions.add(qKey);
    }
  }

  if (q.error) {
    document.getElementById("questionArea").innerHTML = `<div style="color:#e53e3e">${q.error}</div>`;
    return;
  }

  renderQuestion(q);
}

            <button class="game-pinyin-tone-btn" onclick="setGamePinyinTone(${i},4)">ˋ</button>

// --- Answer handling ---
function handleAnswer(selected, q, btn) {
  if (!state.answering) return;
  state.answering = false;

  const allBtns = document.querySelectorAll(".option-btn");
  allBtns.forEach(b => b.classList.add("disabled"));

  const isCorrect = selected === q.correct_index;
  const hint = document.getElementById("hintArea");

  state.totalQuestions += 1;
  if (isCorrect) {
    btn.classList.add("correct");
    state.correctAnswers += 1;
    state.combo += 1;
    if (state.combo > state.comboMax) state.comboMax = state.combo;
    const bonus = Math.min(state.combo, 10);
    const points = 10 + bonus * 2;
    state.score += points;
    hint.innerHTML = `<span class="correct-text">正确! +${points}分</span> &nbsp; 组词: ${q.word_hint}`;

    if (state.combo > 0 && state.combo % 5 === 0) {
      spawnConfetti();
    }
    reportStreak(true);

    const comboEl = document.getElementById("comboBox");
    comboEl.classList.remove("hot");
    void comboEl.offsetWidth;
    comboEl.classList.add("hot");
  } else {
    btn.classList.add("wrong");
    allBtns[q.correct_index].classList.add("reveal");
    state.combo = 0;
    reportStreak(false);
    hint.innerHTML = `<span class="wrong-text">答错了!</span><br><span style="font-size:28px;font-weight:900;color:#2d3748;display:inline-block;margin:8px 0">正确答案: ${q.answer}</span><br><span style="color:#718096">组词: ${q.word_hint}</span>`;
    // Only record and queue retry for first attempt (not retries)
    if (state.retryQueue.length === 0) {
      recordWrongAnswer(q);
      state.retryQueue.push(q);
      state.retryCount = 0;
    } else {
      // This is a retry attempt
      state.retryCount += 1;
      if (state.retryCount >= 2) {
        // Max 2 retries, move on
        state.retryQueue.shift();
        state.retryCount = 0;
      }
    }
  }

  updateScoreboard();

  if (isCorrect) {
    // If this was a retry and answered correctly, remove from queue
    if (state.retryQueue.length > 0 && state.retryQueue[0].answer === q.answer) {
      state.retryQueue.shift();
      state.retryCount = 0;
    }
    setTimeout(loadQuestion, 100);
  } else {
    // Show OK button and wait for user to click
    const okBtn = document.createElement("button");
    okBtn.textContent = "OK";
    okBtn.className = "ok-btn";
    okBtn.onclick = () => loadQuestion();
    hint.appendChild(okBtn);
  }
}

// --- Dictation ---
function handleDictationAnswer(userInput, q) {
  if (!state.answering) return;
  state.answering = false;

  const isCorrect = userInput === q.answer;
  const hint = document.getElementById("hintArea");

  state.totalQuestions += 1;
  if (isCorrect) {
    state.correctAnswers += 1;
    state.combo += 1;
    if (state.combo > state.comboMax) state.comboMax = state.combo;
    const bonus = Math.min(state.combo, 10);
    const points = 10 + bonus * 2;
    state.score += points;
    hint.innerHTML = `<span class="correct-text">正确! +${points}分</span>`;

    if (state.combo > 0 && state.combo % 5 === 0) spawnConfetti();
    reportStreak(true);
    const comboEl = document.getElementById("comboBox");
    comboEl.classList.remove("hot");
    void comboEl.offsetWidth;
    comboEl.classList.add("hot");
  } else {
    state.combo = 0;
    reportStreak(false);
    hint.innerHTML = `<span class="wrong-text">答错了!</span> 你写的: ${userInput}<br><span style="font-size:28px;font-weight:900;color:#2d3748;display:inline-block;margin:8px 0">正确答案: ${q.answer}</span>`;
    if (state.retryQueue.length === 0) {
      recordWrongAnswer(q);
      state.retryQueue.push(q);
      state.retryCount = 0;
    } else {
      state.retryCount += 1;
      if (state.retryCount >= 2) {
        state.retryQueue.shift();
        state.retryCount = 0;
      }
    }
  }

  updateScoreboard();

  if (isCorrect) {
    if (state.retryQueue.length > 0 && state.retryQueue[0].answer === q.answer) {
      state.retryQueue.shift();
      state.retryCount = 0;
    }
    setTimeout(loadQuestion, 100);
  } else {
    playStrokeAnimation(q.answer, hint);
    const okBtn = document.createElement("button");
    okBtn.textContent = "OK";
    okBtn.className = "ok-btn";
    okBtn.onclick = () => loadQuestion();
    hint.appendChild(okBtn);
  }
}

// --- Handwriting quality check ---
function checkStrokeQuality(strokes, canvas) {
  // Count total points across all strokes
  let totalPoints = 0;
  for (const s of strokes) totalPoints += s[0].length;
  // Too few points = random dots/taps
  if (totalPoints < 8) return "笔画太少，请认真书写后再提交";
  // Check if strokes cover too much area (scribble / black blob)
  let allX = [], allY = [];
  for (const s of strokes) { allX.push(...s[0]); allY.push(...s[1]); }
  const minX = Math.min(...allX), maxX = Math.max(...allX);
  const minY = Math.min(...allY), maxY = Math.max(...allY);
  const bboxArea = (maxX - minX) * (maxY - minY);
  const canvasArea = canvas.width * canvas.height;
  // Estimate ink density: total points * lineWidth^2 vs bbox area
  const inkArea = totalPoints * 25; // ~5px lineWidth squared
  if (bboxArea > 0 && inkArea / bboxArea > 1.5) return "写得太密了，请清除后重新工整书写";
  // Check average stroke has reasonable length (not just taps)
  const avgPointsPerStroke = totalPoints / strokes.length;
  if (strokes.length > 3 && avgPointsPerStroke < 3) return "笔画太潦草，请清除后写工整一些";
  return null; // OK
}

// --- Stroke order mode (Hanzi Writer) ---
let strokeOrderEnabled = localStorage.getItem("hanzi_stroke_order") === "true";
let strokeAnimEnabled = localStorage.getItem("hanzi_stroke_anim") !== "false"; // default on
let hzWriters = [];  // HanziWriter instances for current question
let hzCharIndex = 0; // current character index being written
let hzChars = [];     // characters to write

function getStrokeToggleHTML() {

    <label>
      <span class="stroke-toggle">

      </span>

    </label>

}

function toggleStrokeAnim(on) {
  strokeAnimEnabled = on;
  localStorage.setItem("hanzi_stroke_anim", on);
}

function toggleStrokeOrder(on) {
  strokeOrderEnabled = on;
  localStorage.setItem("hanzi_stroke_order", on);
  // Reload the current question to switch mode
  if (hwQuiz.questions && hwQuiz.questions.length > 0 && hwQuiz.questions[hwQuiz.currentIndex]?.mode === "dictation_handwrite") {
    showHwQuizQuestion();
  } else if (state.currentQ && state.currentQ.mode === "dictation_handwrite") {
    loadQuestion(true);
  }
}

// Play stroke order animation after answer submission
function playStrokeAnimation(answer, containerEl) {
  if (!strokeAnimEnabled || !containerEl) return;
  const chars = answer.split("");
  const wrap = document.createElement("div");
  wrap.style.cssText = "display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-top:8px";
  chars.forEach((ch, i) => {
    const box = document.createElement("div");
    box.id = `_strokeAnim${i}`;
    box.style.cssText = "width:80px;height:80px;border:1px solid #e2e8f0;border-radius:8px;background:#fafafa";
    wrap.appendChild(box);
  });
  containerEl.appendChild(wrap);
  // Animate sequentially
  let idx = 0;
  function animNext() {
    if (idx >= chars.length) return;
    const writer = HanziWriter.create(`_strokeAnim${idx}`, chars[idx], {
      width: 80, height: 80, padding: 4,
      strokeAnimationSpeed: 2,
      delayBetweenStrokes: 150,
      showCharacter: false,
      showOutline: true,
      outlineColor: '#e2e8f0',
      strokeColor: '#2d3748',
    });
    const curIdx = idx;
    idx++;
    writer.animateCharacter({
      onComplete: function() { animNext(); }
    });
  }
  animNext();
}

function initStrokeOrderUI(chars, onAllComplete) {
  hzWriters = [];
  hzCharIndex = 0;
  hzChars = chars;

  chars.forEach((ch, i) => {
    const cellId = `hzCell${i}`;
    const targetId = `hzTarget${i}`;
    const cell = document.getElementById(cellId);
    if (!cell) return;

    const writer = HanziWriter.create(targetId, ch, {
      width: 160, height: 160, padding: 8,
      showCharacter: false,
      showOutline: false,
      strokeColor: '#2d3748',
      outlineColor: '#e2e8f0',
      highlightColor: '#5a67d8',
      drawingWidth: 6,
      showHintAfterMisses: false,
      highlightOnComplete: true,
      strokeAnimationSpeed: 2,
      delayBetweenStrokes: 200,
    });

    hzWriters.push({ writer, char: ch, cellId, done: false });

    if (i === 0) {
      cell.classList.add("active");
      startCharQuiz(0, onAllComplete);
    }
  });
}

function startCharQuiz(index, onAllComplete) {
  if (index >= hzWriters.length) {
    onAllComplete();
    return;
  }
  hzCharIndex = index;
  // Mark current cell active
  hzWriters.forEach((hw, i) => {
    const cell = document.getElementById(hw.cellId);
    if (!cell) return;
    cell.classList.remove("active");
    if (i === index) cell.classList.add("active");
  });

  const statusEl = document.getElementById("hwStrokeStatus");
  if (statusEl) statusEl.innerHTML = `第 ${index + 1}/${hzWriters.length} 个字 — 请按正确笔顺书写`;

  hzWriters[index].writer.quiz({
    onMistake: function(strokeData) {
      if (statusEl) {
        statusEl.innerHTML = `<span class="stroke-error">笔顺错误! 请按正确顺序书写</span>`;
      }
      const cell = document.getElementById(hzWriters[index].cellId);
      if (cell) { cell.classList.add("error"); setTimeout(() => cell.classList.remove("error"), 600); }
    },
    onCorrectStroke: function(strokeData) {
      if (statusEl) {
        statusEl.innerHTML = `<span class="stroke-ok">✓</span> 第 ${index + 1}/${hzWriters.length} 个字`;
      }
    },
    onComplete: function(summaryData) {
      hzWriters[index].done = true;
      const cell = document.getElementById(hzWriters[index].cellId);
      if (cell) { cell.classList.remove("active"); cell.classList.add("done"); }

      if (summaryData.totalMistakes > 0 && statusEl) {
        // Show animation of correct stroke order before proceeding
        statusEl.innerHTML = `<span class="stroke-error">本字有 ${summaryData.totalMistakes} 次笔顺错误，演示正确笔顺...</span>`;
        hzWriters[index].writer.animateCharacter({
          onComplete: function() {
            setTimeout(() => startCharQuiz(index + 1, onAllComplete), 400);
          }
        });
      } else {
        setTimeout(() => startCharQuiz(index + 1, onAllComplete), 200);
      }
    }
  });
}

function showStrokeOrderAnimation(charIndex) {
  if (charIndex < 0 || charIndex >= hzWriters.length) return;
  hzWriters[charIndex].writer.animateCharacter();
}

// --- Canvas handwriting ---
let canvasStrokes = [];
let currentStroke = null;
let isDrawing = false;

function initCanvas() {
  canvasStrokes = [];
  const canvas = document.getElementById("writeCanvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  ctx.lineWidth = 5;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = "#2d3748";

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return [t.clientX - rect.left, t.clientY - rect.top];
  }

  function startStroke(e) {
    e.preventDefault();
    isDrawing = true;
    const [x, y] = getPos(e);
    currentStroke = [[x], [y], [Date.now()]];
    ctx.beginPath();
    ctx.moveTo(x, y);
  }

  function moveStroke(e) {
    if (!isDrawing) return;
    e.preventDefault();
    const [x, y] = getPos(e);
    currentStroke[0].push(x);
    currentStroke[1].push(y);
    currentStroke[2].push(Date.now());
    ctx.lineTo(x, y);
    ctx.stroke();
  }

  function endStroke(e) {
    if (!isDrawing) return;
    e.preventDefault();
    isDrawing = false;
    if (currentStroke && currentStroke[0].length > 0) {
      canvasStrokes.push(currentStroke);
    }
    currentStroke = null;
  }

  canvas.addEventListener("mousedown", startStroke);
  canvas.addEventListener("mousemove", moveStroke);
  canvas.addEventListener("mouseup", endStroke);
  canvas.addEventListener("mouseleave", endStroke);
  canvas.addEventListener("touchstart", startStroke);
  canvas.addEventListener("touchmove", moveStroke);
  canvas.addEventListener("touchend", endStroke);
}

// --- Game pinyin (给汉字注音 mode) with handwrite/type toggle ---
let gamePinyinState = { recognized: '' };
let gamePinyinCharCount = 0;
let gamePinyinCellStrokes = [];
let gamePinyinCellRecognized = [];
let gamePinyinToneSelections = [];
let gamePinyinBaseInputs = [];
let gamePinyinDrawingState = []; // per-cell drawing state

const _gameToneMap = {
  'a': ['ā','á','ǎ','à'], 'e': ['ē','é','ě','è'], 'i': ['ī','í','ǐ','ì'],
  'o': ['ō','ó','ǒ','ò'], 'u': ['ū','ú','ǔ','ù'], 'ü': ['ǖ','ǘ','ǚ','ǜ'],
};

function gameApplyTone(base, tone) {
  if (!base) return '';
  base = base.toLowerCase().trim().replace(/v/g, 'ü');
  if (tone === 0) return base;
  const vowels = 'aeiouü';
  let target = -1;
  for (let i = 0; i < base.length; i++) {
    if (base[i] === 'a' || base[i] === 'e') { target = i; break; }
  }
  if (target === -1) {
    const ouIdx = base.indexOf('ou');
    if (ouIdx !== -1) { target = ouIdx; }
    else { for (let i = base.length - 1; i >= 0; i--) { if (vowels.includes(base[i])) { target = i; break; } } }
  }
  if (target === -1) return base;
  const ch = base[target];
  const toned = _gameToneMap[ch] ? _gameToneMap[ch][tone - 1] : ch;
  return base.substring(0, target) + toned + base.substring(target + 1);
}

function initGamePinyinCanvases() {
  gamePinyinDrawingState = [];
  for (let i = 0; i < gamePinyinCharCount; i++) {
    const box = document.getElementById(`gamePyBox${i}`);
    const canvas = document.getElementById(`gamePyCanvas${i}`);
    if (!canvas || !box) continue;
    canvas.width = box.clientWidth;
    canvas.height = box.clientHeight;
    const ctx = canvas.getContext("2d");
    ctx.lineWidth = 4; ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.strokeStyle = "#2d3748";
    const ds = { isDrawing: false, currentStroke: null };
    gamePinyinDrawingState.push(ds);
    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const t = e.touches ? e.touches[0] : e;
      return [t.clientX - rect.left, t.clientY - rect.top];
    }
    const idx = i;
    function startStroke(e) { e.preventDefault(); ds.isDrawing = true; const [x,y] = getPos(e); ds.currentStroke = [[x],[y],[Date.now()]]; ctx.beginPath(); ctx.moveTo(x,y); }
    function moveStroke(e) { if (!ds.isDrawing) return; e.preventDefault(); const [x,y] = getPos(e); ds.currentStroke[0].push(x); ds.currentStroke[1].push(y); ds.currentStroke[2].push(Date.now()); ctx.lineTo(x,y); ctx.stroke(); }
    function endStroke(e) { if (!ds.isDrawing) return; e.preventDefault(); ds.isDrawing = false; if (ds.currentStroke && ds.currentStroke[0].length > 0) gamePinyinCellStrokes[idx].push(ds.currentStroke); ds.currentStroke = null; }
    canvas.addEventListener("mousedown", startStroke); canvas.addEventListener("mousemove", moveStroke);
    canvas.addEventListener("mouseup", endStroke); canvas.addEventListener("mouseleave", endStroke);
    canvas.addEventListener("touchstart", startStroke); canvas.addEventListener("touchmove", moveStroke); canvas.addEventListener("touchend", endStroke);
  }
}

async function recognizeGamePinyin() {
  const recEl = document.getElementById("gamePinyinRecognized");
  let anyStrokes = false;
  for (let i = 0; i < gamePinyinCharCount; i++) {
    if (gamePinyinCellStrokes[i].length > 0) { anyStrokes = true; break; }
  }
  if (!anyStrokes) return;
  if (recEl) recEl.textContent = "识别中...";
  try {
    const results = await Promise.all(gamePinyinCellStrokes.map(async (strokes, i) => {
      if (strokes.length === 0) return '';
      const box = document.getElementById(`gamePyBox${i}`);
      const w = box ? box.clientWidth : 140;
      const h = box ? box.clientHeight : 180;
      const res = await fetch("/api/handwriting", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ strokes, width: w, height: h }),
      });
      const data = await res.json();
      try { if (data[0] === "SUCCESS") return data[1][0][1][0]; } catch(e) {}
      return '';
    }));
    for (let i = 0; i < gamePinyinCharCount; i++) {
      gamePinyinCellRecognized[i] = results[i] || '';
      const resEl = document.getElementById(`gamePyResult${i}`);
      if (resEl) resEl.textContent = results[i] || (gamePinyinCellStrokes[i].length > 0 ? '?' : '');
    }
    const combined = results.join(' ').trim();
    gamePinyinState.recognized = combined;
    if (recEl) recEl.textContent = combined ? `识别结果: ${combined}` : "未能识别，请清除后重写";
  } catch(e) {
    if (recEl) recEl.textContent = "识别失败，请重试";
  }
}

function getGamePinyinAnswer() {
  const mode = localStorage.getItem("pinyin_input_mode") || "handwrite";
  if (mode === 'type') {
    const parts = [];
    for (let i = 0; i < gamePinyinCharCount; i++) {
      const base = (document.getElementById(`gamePyInput${i}`)?.value || '').trim().replace(/v/g, 'ü');
      const tone = gamePinyinToneSelections[i];
      if (!base) return null;
      if (tone === null || tone === undefined) return null;
      parts.push(gameApplyTone(base, tone));
    }
    return parts.join(' ');
  } else {
    return gamePinyinState.recognized || null;
  }
}

function normalizePinyinGame(s) {
  return s.toLowerCase().trim().replace(/\s+/g, ' ');
}

async function submitGamePinyin() {
  if (!state.answering) return;
  const mode = localStorage.getItem("pinyin_input_mode") || "handwrite";
  if (mode === 'handwrite') {
    let anyStrokes = false;
    for (let i = 0; i < gamePinyinCharCount; i++) {
      if (gamePinyinCellStrokes[i].length > 0) { anyStrokes = true; break; }
    }
    if (!gamePinyinState.recognized && anyStrokes) {
      await recognizeGamePinyin();
    }
  }
  const userAnswer = getGamePinyinAnswer();
  if (!userAnswer) {
    const el = document.getElementById("gamePinyinRecognized");
    if (el) el.textContent = mode === 'type' ? "请输入所有拼音并选择声调" : "请先写拼音";
    return;
  }
  state.answering = false;
  const q = state.currentQ;
  const hint = document.getElementById("hintArea");
  const btn = document.getElementById("gamePinyinSubmitBtn");
  if (btn) btn.disabled = true;

  const isCorrect = normalizePinyinGame(userAnswer) === normalizePinyinGame(q.answer);
  state.totalQuestions += 1;

  if (isCorrect) {
    state.correctAnswers += 1;
    state.combo += 1;
    if (state.combo > state.comboMax) state.comboMax = state.combo;
    const bonus = Math.min(state.combo, 10);
    const points = 10 + bonus * 2;
    state.score += points;
    hint.innerHTML = `<span class="correct-text">正确! +${points}分</span> &nbsp; ${q.word_hint ? '组词: ' + q.word_hint : ''}`;
    if (state.combo > 0 && state.combo % 5 === 0) spawnConfetti();
    reportStreak(true);
    const comboEl = document.getElementById("comboBox");
    comboEl.classList.remove("hot"); void comboEl.offsetWidth; comboEl.classList.add("hot");
    if (state.retryQueue.length > 0 && state.retryQueue[0].answer === q.answer) {
      state.retryQueue.shift(); state.retryCount = 0;
    }
    updateScoreboard();
    setTimeout(loadQuestion, 100);
  } else {
    state.combo = 0;
    reportStreak(false);
    hint.innerHTML = `<span class="wrong-text">答错了!</span> 你写的: ${userAnswer}<br>
      <span style="font-size:28px;font-weight:900;color:#2d3748;display:inline-block;margin:8px 0">正确答案: ${q.answer}</span>
      <br><span style="color:#718096">${q.word_hint ? '组词: ' + q.word_hint : ''}</span>`;
    if (state.retryQueue.length === 0) {
      recordWrongAnswer(q);
      state.retryQueue.push(q);
      state.retryCount = 0;
    } else {
      state.retryCount += 1;
      if (state.retryCount >= 2) { state.retryQueue.shift(); state.retryCount = 0; }
    }
    updateScoreboard();
    const okBtn = document.createElement("button");
    okBtn.textContent = "OK"; okBtn.className = "ok-btn";
    okBtn.onclick = () => loadQuestion();
    hint.appendChild(okBtn);
  }
}

// --- Wrong answer recording ---
function recordWrongAnswer(q) {
  if (!state.user) return;
  let character, pinyin;
  if (q.mode === "char_to_pinyin" || q.mode === "pinyin_typing") {
    character = q.question;
    pinyin = q.answer;
  } else if (q.mode === "pinyin_to_char") {
    character = q.answer;
    pinyin = q.question;
  } else if (q.mode === "listen_to_char") {
    character = q.answer;
    pinyin = q.question_pinyin || "";
  } else {
    // dictation: answer is a word, question is pinyin
    character = q.answer;
    pinyin = q.question;
  }
  fetch("/api/wrong_answers", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      character, pinyin,
      words: q.word_hint || q.answer || "",
      grade: state.grade,
      mode: state.mode,
    }),
  });
}

function getStreakMilestones() {
  const isWriting = state.mode === "dictation_handwrite";
  const milestones = isWriting ? COIN_MILESTONES.writing : COIN_MILESTONES.recognition;
  return (milestones || []).slice().sort((a, b) => a.streak - b.streak);
}

function calcStreakBarState(combo, milestones) {
  if (!milestones.length) return null;
  const maxStreak = milestones[milestones.length - 1].streak;
  // Cycle: after all milestones, reset bar and count towards next round
  const cycle = Math.floor(combo / maxStreak);
  const pos = combo % maxStreak;
  // Shift milestones to absolute values for this cycle
  const shifted = milestones.map(m => ({
    streak: cycle * maxStreak + m.streak,
    coins: m.coins,
    local: m.streak,
  }));
  const nextMilestone = shifted.find(m => m.streak > combo);
  const trackMax = maxStreak;
  const fillPct = Math.min(pos / trackMax * 100, 100);
  return { combo, pos, cycle, shifted, nextMilestone, trackMax, fillPct };
}

function updateStreakBar() {
  const bar = document.getElementById("streakBar");
  if (!state.coinEligible) {
    if (bar) bar.style.display = "none";
    return;
  }
  if (bar) bar.style.display = "";
  const milestones = getStreakMilestones();
  const barState = calcStreakBarState(state.combo, milestones);
  if (!barState) return;
  renderStreakBarUI(barState, "streakFill", "streakLabel", "streakReward", "streakMarkers");
}

function renderStreakBarUI(s, fillId, labelId, rewardId, markersId) {
  document.getElementById(fillId).style.width = s.fillPct + "%";

  const label = document.getElementById(labelId);
  const reward = document.getElementById(rewardId);
  if (s.nextMilestone) {
    label.textContent = `连击 ${s.combo}/${s.nextMilestone.streak}`;
    reward.textContent = `🪙 ${s.nextMilestone.coins} 币`;
  } else {
    // Exactly at max — bar full, about to reset on next correct
    label.textContent = `连击 ${s.combo} ✓ 达成!`;
    reward.textContent = "";
  }

  const markers = document.getElementById(markersId);
  markers.innerHTML = s.shifted.map(m => {
    const pos = m.local / s.trackMax * 100;
    const reached = s.combo >= m.streak;
    return `<div class="streak-marker ${reached ? 'reached' : ''}" style="left:${pos}%">
      <span class="streak-marker-label">${m.local}<br>🪙${m.coins}</span>
    </div>`;
  }).join("");
}

      <p style="font-size:13px">请联系管理员设置你的作业计划</p>
    </div>`;
    return;
  }

  const plan = data.plan;
  const assignments = data.assignments;

  if (!assignments || assignments.length === 0) {
    content.innerHTML = `<div class="hw-no-plan"><p>今日无作业</p></div>`;
    return;
  }

  // Group by type, show one card per type: pending one if exists, otherwise last completed
  const byType = {};
  assignments.forEach(a => {
    if (!byType[a.type]) byType[a.type] = [];
    byType[a.type].push(a);
  });

  let html = '<div class="hw-cards">';
  for (const type of ["recognition", "writing"]) {
    const group = byType[type];
    if (!group) continue;
    const pending = group.find(a => a.status === "pending");
    const a = pending || group[group.length - 1];
    const isCompleted = a.status === "completed";
    const icon = type === "recognition" ? "📖" : "✍️";
    const typeLabel = HW_TYPE_LABELS[type];
    const modeLabel = type === "recognition" ? "给汉字注音" : "看拼音写字";
    const acc = a.total_questions > 0 ? Math.round(a.correct_answers / a.total_questions * 100) : 0;
    const mins = Math.floor(a.time_spent / 60);
    const secs = a.time_spent % 60;
    const completedCount = group.filter(x => x.status === "completed").length;

    html += `<div class="hw-card ${isCompleted ? 'completed' : ''}" ${isCompleted ? '' : `onclick="startHwQuiz(${a.id})"`}>
      <div class="hw-card-icon">${icon}</div>
      <div class="hw-card-type">${typeLabel}作业</div>
      <div class="hw-card-info">第${a.lesson_num}课 · ${gradeShort(a.grade)} · ${modeLabel}</div>`;

    if (isCompleted) {
      html += `<div class="hw-card-status done">✓ 已完成 (今日${completedCount}课)</div>
        <div class="hw-card-result">${a.correct_answers}/${a.total_questions} (${acc}%) · ${mins}分${secs}秒</div>`;
    } else {
      const hasSavedProgress = a.saved_progress && a.saved_progress !== '';
      let savedInfo = '';
      if (hasSavedProgress) {
        try {
          const sp = typeof a.saved_progress === 'string' ? JSON.parse(a.saved_progress) : a.saved_progress;
          savedInfo = sp.currentIndex ? ` (已做${sp.currentIndex}题)` : '';
        } catch(e) {}
      }
      html += `<div class="hw-card-status pending">${hasSavedProgress ? '▶ 继续' + savedInfo : (completedCount > 0 ? '继续下一课' : '待完成')}</div>`;
    }
    // Preview button for recognition homework
    if (type === "recognition") {
      html += `<button class="hw-card-preview" onclick="event.stopPropagation();startHwPreview(${a.id})">预习</button>`;
    }
    html += `</div>`;
  }
  html += '</div>';
  content.innerHTML = html;
}

// --- Load homework progress ---
async function loadHomeworkProgress() {
  const res = await fetch("/api/homework/progress");
  const data = await res.json();

  if (!data.progress || data.progress.length === 0) {
    document.getElementById("hwProgressSection").style.display = "none";
    document.getElementById("hwHistorySection").style.display = "none";
    return;
  }

  document.getElementById("hwProgressSection").style.display = "";
  const grid = document.getElementById("hwProgressGrid");
  const circumference = 2 * Math.PI * 25;

  grid.innerHTML = data.progress.map(p => {
    const pct = p.overall_pct;
    const offset = circumference - (pct / 100) * circumference;
    const cls = !p.active ? "inactive" : pct >= 100 ? "done" : "active";
    return `<div class="hw-progress-item">
      <div class="hw-progress-ring">
        <svg width="60" height="60">
          <circle class="bg" cx="30" cy="30" r="25"/>
          <circle class="fg ${cls}" cx="30" cy="30" r="25"
            stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
        </svg>
        <div class="hw-progress-pct">${pct}%</div>
      </div>
      <div class="hw-progress-label">${p.grade_short}</div>
      <div class="hw-progress-sub">认${p.recognition_lesson - 1}/${p.total_lessons} 写${p.writing_lesson - 1}/${p.total_lessons}</div>
    </div>`;
  }).join("");

  // Render history
  if (data.history && data.history.length > 0) {
    document.getElementById("hwHistorySection").style.display = "";
    let hhtml = '<table class="hw-history-table"><tr><th>日期</th><th>类型</th><th>课</th><th>正确率</th><th>用时</th></tr>';
    data.history.forEach(h => {
      if (h.status !== "completed") return;
      const acc = h.total_questions > 0 ? Math.round(h.correct_answers / h.total_questions * 100) : 0;
      const accCls = acc >= 80 ? "acc-good" : "acc-bad";
      const mins = Math.floor(h.time_spent / 60);
      const secs = h.time_spent % 60;
      hhtml += `<tr><td>${h.date}</td><td>${HW_TYPE_LABELS[h.type]}</td><td>第${h.lesson_num}课</td><td class="${accCls}">${acc}%</td><td>${mins}分${secs}秒</td></tr>`;
    });
    hhtml += '</table>';
    document.getElementById("hwHistoryContent").innerHTML = hhtml;
  }
}

// --- Homework Quiz ---
async function startHwQuiz(assignmentId) {
  const res = await fetch(`/api/homework/start/${assignmentId}`);
  const data = await res.json();
  if (data.error) { alert(data.error); return; }

  hwQuiz.assignmentId = assignmentId;
  hwQuiz.type = data.type;
  hwQuiz.isPreview = false;
  hwQuiz.originalQuestions = data.questions;
  hwQuiz.totalOriginal = data.questions.length;
  hwQuiz.questions = data.questions.map((q, i) => ({ ...q, _origIndex: i }));
  hwQuiz.answering = false;
  hwQuiz.answeredCorrectly = new Set();
  hwQuiz.retryMap = {};

  // Restore saved progress if available
  const saved = data.saved_progress;
  if (saved && saved.currentIndex > 0 && saved.currentIndex < hwQuiz.questions.length) {
    hwQuiz.currentIndex = saved.currentIndex;
    hwQuiz.correctCount = saved.correctCount || 0;
    hwQuiz.wrongItems = saved.wrongItems || [];
    hwQuiz.startTime = Date.now() - (saved.timeElapsed || 0) * 1000;
  } else {
    hwQuiz.currentIndex = 0;
    hwQuiz.correctCount = 0;
    hwQuiz.wrongItems = [];
    hwQuiz.startTime = Date.now();
  }

  // Show quiz, hide others
  document.getElementById("hwTodaySection").style.display = "none";
  document.getElementById("hwProgressSection").style.display = "none";
  document.getElementById("hwHistorySection").style.display = "none";
  document.getElementById("hwResultSection").style.display = "none";
  document.getElementById("hwQuizSection").style.display = "";
  document.getElementById("hwStreakBar").style.display = "";

  // Restore default nav button for homework
  document.getElementById("hwQuizNav").innerHTML = `
    <button onclick="confirmHwBackToList()" style="padding:6px 14px;border:1px solid #a0aec0;border-radius:8px;background:#fff;color:#718096;cursor:pointer;font-size:13px">← 返回作业列表</button>
  `;

  // Start timer
  clearInterval(hwQuiz.timerInterval);
  hwQuiz.timerInterval = setInterval(updateHwTimer, 1000);

  // Load persistent streak for this homework type
  try {
    const coinRes = await fetch("/api/coins");
    const coinData = await coinRes.json();
    const isWriting = data.type === "writing";
    hwStreak = isWriting ? (coinData.writing_streak || 0) : (coinData.recognition_streak || 0);
  } catch (e) { hwStreak = 0; }
  updateHwStreakBar();

  showHwQuizQuestion();
}

  const elapsed = Math.floor((Date.now() - hwQuiz.startTime) / 1000);
