<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉字小达人 - 识字游戏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #333;
  }

  /* Top bar */
  .top-bar {
    width: 100%;
    max-width: 600px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    color: #fff;
  }

  .score-box, .combo-box {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 8px 20px;
    font-size: 18px;
    font-weight: bold;
    backdrop-filter: blur(4px);
  }

  .combo-box { color: #ffe066; }
  .combo-box.hot { animation: pulse 0.5s ease-in-out; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); }
  }

  /* Main card */
  .card {
    background: #fff;
    border-radius: 24px;
    width: 90%;
    max-width: 560px;
    padding: 32px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    position: relative;
    overflow: hidden;
  }

  /* Question display */
  .question-area {
    min-height: 160px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }

  .question-char {
    font-size: 128px;
    font-weight: 900;
    line-height: 1.1;
    color: #2d3748;
    transition: transform 0.3s;
  }

  .question-pinyin {
    font-size: 48px;
    font-weight: 700;
    color: #5a67d8;
    line-height: 1.2;
  }

  .question-label {
    font-size: 16px;
    color: #999;
    margin-bottom: 4px;
  }

  .listen-btn {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #f6d365, #fda085);
    font-size: 48px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(253,160,133,0.4);
    transition: transform 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .listen-btn:hover { transform: scale(1.1); }
  .listen-btn:active { transform: scale(0.95); }

  /* Options grid */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    width: 100%;
  }

  .option-btn {
    padding: 18px 12px;
    border: 3px solid #e2e8f0;
    border-radius: 16px;
    background: #fff;
    font-size: 28px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    color: #2d3748;
    position: relative;
    overflow: hidden;
  }

  .option-btn:hover {
    border-color: #5a67d8;
    background: #ebf4ff;
    transform: translateY(-2px);
  }

  .option-btn:active { transform: translateY(0); }

  .option-btn.correct {
    border-color: #48bb78;
    background: #c6f6d5;
    color: #22543d;
    animation: correctPop 0.4s ease;
  }

  .option-btn.wrong {
    border-color: #fc8181;
    background: #fed7d7;
    color: #9b2c2c;
    animation: shake 0.4s ease;
  }

  .option-btn.reveal {
    border-color: #48bb78;
    background: #f0fff4;
  }

  .option-btn.disabled {
    pointer-events: none;
    opacity: 0.7;
  }

  @keyframes correctPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* Hint area */
  .hint-area {
    min-height: 32px;
    font-size: 18px;
    color: #718096;
    text-align: center;
    transition: opacity 0.3s;
  }

  .hint-area .correct-text { color: #38a169; font-weight: 700; }
  .hint-area .wrong-text { color: #e53e3e; font-weight: 700; }

  /* Controls at bottom */
  .controls {
    width: 90%;
    max-width: 560px;
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 32px;
  }

  .control-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .grade-btn, .mode-btn {
    padding: 10px 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 24px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
    white-space: nowrap;
  }

  .grade-btn:hover, .mode-btn:hover {
    background: rgba(255,255,255,0.3);
  }

  .grade-btn.active, .mode-btn.active {
    background: #fff;
    color: #5a67d8;
    border-color: #fff;
  }

  .section-label {
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    text-align: center;
    font-weight: 600;
  }

  /* Celebration overlay */
  .celebration {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 100;
  }

  .confetti {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 2px;
    animation: fall 1.5s ease-out forwards;
  }

  @keyframes fall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }

  /* Responsive */
  @media (max-width: 420px) {
    .question-char { font-size: 96px; }
    .question-pinyin { font-size: 36px; }
    .option-btn { font-size: 22px; padding: 14px 8px; }
    .card { padding: 24px 16px; }
  }

  .title {
    color: #fff;
    font-size: 28px;
    font-weight: 900;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    margin-top: 16px;
    margin-bottom: 4px;
  }
</style>
</head>
<body>

<div class="title">汉字小达人</div>

<div class="top-bar">
  <div class="score-box" id="scoreBox">得分: 0</div>
  <div class="combo-box" id="comboBox">连击: 0</div>
</div>

<div class="card">
  <div class="question-area" id="questionArea">
    <!-- Filled by JS -->
  </div>
  <div class="options" id="optionsArea">
    <!-- Filled by JS -->
  </div>
  <div class="hint-area" id="hintArea"></div>
</div>

<div class="controls">
  <div class="section-label">选择年级</div>
  <div class="control-row" id="gradeRow"></div>
  <div class="section-label">游戏模式</div>
  <div class="control-row" id="modeRow"></div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const MODES = [
  { id: "char_to_pinyin", label: "看字选拼音" },
  { id: "pinyin_to_char", label: "看拼音选字" },
  { id: "listen_to_char", label: "听音选字" },
];

let state = {
  grade: "一年级上",
  mode: "char_to_pinyin",
  score: 0,
  combo: 0,
  answering: false,
};

// --- Init ---
async function init() {
  const res = await fetch("/api/grades");
  const data = await res.json();
  renderGrades(data.grades);
  renderModes();
  loadQuestion();
}

function renderGrades(grades) {
  const row = document.getElementById("gradeRow");
  row.innerHTML = "";
  grades.forEach(g => {
    const btn = document.createElement("button");
    btn.className = "grade-btn" + (g === state.grade ? " active" : "");
    btn.textContent = g;
    btn.onclick = () => {
      state.grade = g;
      state.score = 0;
      state.combo = 0;
      updateScoreboard();
      document.querySelectorAll(".grade-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      loadQuestion();
    };
    row.appendChild(btn);
  });
}

function renderModes() {
  const row = document.getElementById("modeRow");
  row.innerHTML = "";
  MODES.forEach(m => {
    const btn = document.createElement("button");
    btn.className = "mode-btn" + (m.id === state.mode ? " active" : "");
    btn.textContent = m.label;
    btn.onclick = () => {
      state.mode = m.id;
      document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      loadQuestion();
    };
    row.appendChild(btn);
  });
}

// --- Load question ---
async function loadQuestion() {
  state.answering = false;
  document.getElementById("hintArea").innerHTML = "";

  const res = await fetch(`/api/question?grade=${encodeURIComponent(state.grade)}&mode=${state.mode}`);
  const q = await res.json();

  if (q.error) {
    document.getElementById("questionArea").innerHTML = `<div style="color:#e53e3e">${q.error}</div>`;
    return;
  }

  renderQuestion(q);
}

function renderQuestion(q) {
  const area = document.getElementById("questionArea");
  const opts = document.getElementById("optionsArea");

  // Question display
  if (q.mode === "char_to_pinyin") {
    area.innerHTML = `
      <div class="question-label">请选择正确的拼音</div>
      <div class="question-char">${q.question}</div>
    `;
  } else if (q.mode === "pinyin_to_char") {
    area.innerHTML = `
      <div class="question-label">请选择正确的汉字</div>
      <div class="question-pinyin">${q.question}</div>
    `;
  } else if (q.mode === "listen_to_char") {
    area.innerHTML = `
      <div class="question-label">听读音，选汉字</div>
      <button class="listen-btn" onclick="speakChar('${q.question}')">&#128264;</button>
    `;
    // Auto-play on load
    setTimeout(() => speakChar(q.question), 300);
  }

  // Options
  opts.innerHTML = "";
  const colors = ["#5a67d8", "#d69e2e", "#38a169", "#e53e3e"];
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = opt;
    btn.style.borderColor = colors[i % 4] + "33";
    btn.onclick = () => handleAnswer(i, q, btn);
    opts.appendChild(btn);
  });

  state.answering = true;
}

// --- Answer handling ---
function handleAnswer(selected, q, btn) {
  if (!state.answering) return;
  state.answering = false;

  const allBtns = document.querySelectorAll(".option-btn");
  allBtns.forEach(b => b.classList.add("disabled"));

  const isCorrect = selected === q.correct_index;
  const hint = document.getElementById("hintArea");

  if (isCorrect) {
    btn.classList.add("correct");
    state.combo += 1;
    const bonus = Math.min(state.combo, 10);
    const points = 10 + bonus * 2;
    state.score += points;
    hint.innerHTML = `<span class="correct-text">正确! +${points}分</span> &nbsp; 组词: ${q.word_hint}`;

    if (state.combo > 0 && state.combo % 5 === 0) {
      spawnConfetti();
    }

    const comboEl = document.getElementById("comboBox");
    comboEl.classList.remove("hot");
    void comboEl.offsetWidth;
    comboEl.classList.add("hot");
  } else {
    btn.classList.add("wrong");
    allBtns[q.correct_index].classList.add("reveal");
    state.combo = 0;
    hint.innerHTML = `<span class="wrong-text">答错了!</span> 正确答案: <strong>${q.answer}</strong> &nbsp; 组词: ${q.word_hint}`;
  }

  updateScoreboard();

  // Next question after delay
  setTimeout(loadQuestion, isCorrect ? 100 : 600);
}

function updateScoreboard() {
  document.getElementById("scoreBox").textContent = `得分: ${state.score}`;
  document.getElementById("comboBox").textContent = `连击: ${state.combo}`;
}

// --- TTS ---
function speakChar(char) {
  if (!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(char);
  utter.lang = "zh-CN";
  utter.rate = 0.8;
  utter.pitch = 1.1;

  // Try to find a Chinese voice
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith("zh"));
  if (zhVoice) utter.voice = zhVoice;

  window.speechSynthesis.speak(utter);
}

// Preload voices
if ("speechSynthesis" in window) {
  window.speechSynthesis.onvoiceschanged = () => {};
  window.speechSynthesis.getVoices();
}

// --- Confetti ---
function spawnConfetti() {
  const container = document.getElementById("celebration");
  const colors = ["#f6e05e", "#fc8181", "#68d391", "#63b3ed", "#d6bcfa", "#fbb6ce"];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement("div");
    el.className = "confetti";
    el.style.left = Math.random() * 100 + "%";
    el.style.top = "-20px";
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDelay = Math.random() * 0.5 + "s";
    el.style.animationDuration = (1 + Math.random()) + "s";
    container.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
}

init();
</script>
</body>
</html>
