<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉字小达人 - 识字游戏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #333;
  }

  /* Top bar */
  .top-bar {
    width: 100%;
    max-width: 600px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    color: #fff;
  }

  .score-box, .combo-box {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 8px 20px;
    font-size: 18px;
    font-weight: bold;
    backdrop-filter: blur(4px);
  }

  .combo-box { color: #ffe066; }
  .combo-box.hot { animation: pulse 0.5s ease-in-out; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); }
  }

  /* Main card */
  .card {
    background: #fff;
    border-radius: 24px;
    width: 90%;
    max-width: 560px;
    padding: 32px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    position: relative;
    overflow: hidden;
  }

  /* Question display */
  .question-area {
    min-height: 160px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }

  .question-char {
    font-size: 128px;
    font-weight: 900;
    line-height: 1.1;
    color: #2d3748;
    transition: transform 0.3s;
  }

  .question-pinyin {
    font-size: 48px;
    font-weight: 700;
    color: #5a67d8;
    line-height: 1.2;
  }

  .question-label {
    font-size: 16px;
    color: #999;
    margin-bottom: 4px;
  }

  .listen-btn {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #f6d365, #fda085);
    font-size: 48px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(253,160,133,0.4);
    transition: transform 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .listen-btn:hover { transform: scale(1.1); }
  .listen-btn:active { transform: scale(0.95); }

  /* Options grid */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    width: 100%;
  }

  .option-btn {
    padding: 18px 12px;
    border: 3px solid #e2e8f0;
    border-radius: 16px;
    background: #fff;
    font-size: 28px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    color: #2d3748;
    position: relative;
    overflow: hidden;
  }

  .option-btn:hover {
    border-color: #5a67d8;
    background: #ebf4ff;
    transform: translateY(-2px);
  }

  .option-btn:active { transform: translateY(0); }

  .option-btn.correct {
    border-color: #48bb78;
    background: #c6f6d5;
    color: #22543d;
    animation: correctPop 0.4s ease;
  }

  .option-btn.wrong {
    border-color: #fc8181;
    background: #fed7d7;
    color: #9b2c2c;
    animation: shake 0.4s ease;
  }

  .option-btn.reveal {
    border-color: #48bb78;
    background: #f0fff4;
  }

  .option-btn.disabled {
    pointer-events: none;
    opacity: 0.7;
  }

  @keyframes correctPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* Hint area */
  .hint-area {
    min-height: 32px;
    font-size: 18px;
    color: #718096;
    text-align: center;
    transition: opacity 0.3s;
  }

  .hint-area .correct-text { color: #38a169; font-weight: 700; }
  .hint-area .wrong-text { color: #e53e3e; font-weight: 700; }

  .ok-btn {
    display: inline-block;
    margin-top: 12px;
    margin-left: 12px;
    padding: 10px 40px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #5a67d8, #764ba2);
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .ok-btn:hover { transform: scale(1.05); }
  .ok-btn:active { transform: scale(0.95); }

  /* Controls at bottom */
  .controls {
    width: 90%;
    max-width: 560px;
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 32px;
  }

  .control-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .grade-btn, .mode-btn {
    padding: 10px 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 24px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
    white-space: nowrap;
  }

  .grade-btn:hover, .mode-btn:hover {
    background: rgba(255,255,255,0.3);
  }

  .grade-btn.active, .mode-btn.active {
    background: #fff;
    color: #5a67d8;
    border-color: #fff;
  }

  .lesson-btn {
    padding: 6px 12px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 16px;
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
    white-space: nowrap;
  }

  .lesson-btn:hover { background: rgba(255,255,255,0.25); }

  .lesson-btn.active {
    background: #fff;
    color: #e53e3e;
    border-color: #fff;
  }

  .section-label {
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    text-align: center;
    font-weight: 600;
  }

  /* Celebration overlay */
  .celebration {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 100;
  }

  .confetti {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 2px;
    animation: fall 1.5s ease-out forwards;
  }

  @keyframes fall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }

  /* Responsive */
  @media (max-width: 420px) {
    .question-char { font-size: 96px; }
    .question-pinyin { font-size: 36px; }
    .option-btn { font-size: 22px; padding: 14px 8px; }
    .card { padding: 24px 16px; }
  }

  .title {
    color: #fff;
    font-size: 28px;
    font-weight: 900;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    margin-top: 16px;
    margin-bottom: 4px;
  }

  /* User bar */
  .user-bar {
    width: 100%;
    max-width: 600px;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
    padding: 0 20px;
    color: #fff;
    font-size: 14px;
  }

  .user-bar span { font-weight: 600; }

  .user-btn {
    padding: 6px 16px;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 16px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: all 0.2s;
  }

  .user-btn:hover { background: rgba(255,255,255,0.3); }

  /* Modal overlay */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }

  .modal-overlay.hidden { display: none; }

  .modal {
    background: #fff;
    border-radius: 20px;
    padding: 32px 28px;
    width: 90%;
    max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .modal h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #2d3748;
    font-size: 22px;
  }

  .modal-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid #5a67d8;
  }

  .modal-tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: #fff;
    color: #5a67d8;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .modal-tab.active {
    background: #5a67d8;
    color: #fff;
  }

  .modal input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    font-size: 16px;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .modal input:focus { border-color: #5a67d8; }

  .modal-submit {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #5a67d8, #764ba2);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .modal-submit:hover { transform: scale(1.02); }

  .modal-error {
    color: #e53e3e;
    font-size: 14px;
    text-align: center;
    margin-bottom: 12px;
    min-height: 20px;
  }

  .modal-close {
    display: block;
    margin: 12px auto 0;
    border: none;
    background: none;
    color: #999;
    font-size: 14px;
    cursor: pointer;
  }

  .modal-close:hover { color: #333; }

  /* Dictation mode */
  .hw-canvas-box {
    border: 3px solid #e2e8f0;
    border-radius: 16px;
    overflow: hidden;
    background: #fefefe;
  }

  .hw-canvas-box canvas {
    display: block;
    cursor: crosshair;
    touch-action: none;
  }

  .hw-grid-lines {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .hw-grid-line {
    position: absolute;
    top: 10%;
    height: 80%;
    width: 1px;
    border-left: 2px dashed #e2e8f0;
  }

  .hw-grid-line-h {
    position: absolute;
    left: 10%;
    width: 80%;
    height: 1px;
    border-top: 2px dashed #e2e8f0;
  }

  .canvas-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  #writeCanvas {
    cursor: crosshair;
    touch-action: none;
  }

  .canvas-controls {
    display: flex;
    gap: 12px;
  }

  .canvas-btn {
    padding: 10px 28px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    background: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    color: #2d3748;
  }

  .canvas-btn:hover { border-color: #5a67d8; background: #ebf4ff; }

  /* Leaderboard */
  .lb-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 16px;
  }

  .lb-tab {
    padding: 6px 12px;
    border: 2px solid #e2e8f0;
    border-radius: 16px;
    background: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: #718096;
    transition: all 0.2s;
  }

  .lb-tab.active {
    background: #5a67d8;
    color: #fff;
    border-color: #5a67d8;
  }

  .lb-my-rank {
    text-align: center;
    padding: 10px;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #ebf4ff, #e9d8fd);
    border-radius: 12px;
    font-weight: 700;
    color: #5a67d8;
    font-size: 15px;
  }

  .lb-list {
    max-height: 320px;
    overflow-y: auto;
  }

  .lb-row {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid #f0f0f0;
    gap: 12px;
  }

  .lb-row.me { background: #ebf4ff; border-radius: 8px; }

  .lb-rank {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 14px;
    flex-shrink: 0;
    background: #e2e8f0;
    color: #718096;
  }

  .lb-rank.gold { background: #f6e05e; color: #744210; }
  .lb-rank.silver { background: #e2e8f0; color: #4a5568; }
  .lb-rank.bronze { background: #fbd38d; color: #7b341e; }

  .lb-name { flex: 1; font-weight: 600; font-size: 15px; }
  .lb-score { font-weight: 700; color: #5a67d8; font-size: 15px; }
  .lb-acc { font-size: 12px; color: #a0aec0; margin-left: 4px; }

  /* Coins display */
  .coins-box {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 8px 20px;
    font-size: 18px;
    font-weight: bold;
    backdrop-filter: blur(4px);
    color: #ffe066;
  }

  /* Shop modal */
  .shop-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: 360px;
    overflow-y: auto;
  }

  .shop-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 14px;
    background: #fafafa;
  }

  .shop-item-info { flex: 1; }
  .shop-item-name { font-weight: 700; font-size: 16px; color: #2d3748; }
  .shop-item-desc { font-size: 13px; color: #718096; margin-top: 2px; }
  .shop-item-price { font-weight: 700; color: #d69e2e; font-size: 15px; margin-right: 12px; }

  .shop-buy-btn {
    padding: 8px 18px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #f6d365, #fda085);
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .shop-buy-btn:hover { transform: scale(1.05); }
  .shop-buy-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .shop-coins-bar {
    text-align: center;
    padding: 10px;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #fefcbf, #fef3c7);
    border-radius: 12px;
    font-weight: 700;
    color: #b7791f;
    font-size: 16px;
  }

  .shop-empty {
    text-align: center;
    color: #a0aec0;
    padding: 40px 20px;
    font-size: 15px;
  }

  /* Admin panel */
  .admin-section {
    margin-bottom: 20px;
  }

  .admin-section h3 {
    font-size: 16px;
    color: #2d3748;
    margin-bottom: 10px;
    border-bottom: 2px solid #e2e8f0;
    padding-bottom: 6px;
  }

  .admin-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }

  .admin-input {
    flex: 1;
    padding: 8px 12px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
  }

  .admin-input:focus { border-color: #5a67d8; }

  .admin-btn {
    padding: 8px 16px;
    border: none;
    border-radius: 10px;
    background: #5a67d8;
    color: #fff;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.2s;
    white-space: nowrap;
  }

  .admin-btn:hover { transform: scale(1.03); }
  .admin-btn.danger { background: #e53e3e; }

  .admin-item-list {
    max-height: 200px;
    overflow-y: auto;
  }

  .admin-item-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    border-bottom: 1px solid #f0f0f0;
  }

  .admin-item-row span { font-size: 14px; }

  .admin-link {
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px 8px;
    transition: color 0.2s;
  }

  .admin-link:hover { color: rgba(255,255,255,0.9); }

  /* Admin user detail tables */
  #adminUserDetailContent table {
    font-size: 13px;
  }

  #adminUserDetailContent th {
    text-align: center;
    font-size: 12px;
    color: #718096;
    font-weight: 600;
    white-space: nowrap;
  }

  #adminUserDetailContent td {
    padding: 4px 6px;
    font-size: 13px;
  }

</style>
</head>
<body>

<div class="user-bar" id="userBar">
  <button class="user-btn" onclick="showAuthModal()">登录 / 注册</button>
</div>

<div class="title">汉字小达人</div>

<div class="top-bar">
  <div class="score-box" id="scoreBox">得分: 0</div>
  <div class="coins-box" id="coinsBox" style="display:none">金币: 0</div>
  <div class="combo-box" id="comboBox">连击: 0</div>
</div>

<div class="card">
  <div class="question-area" id="questionArea">
    <!-- Filled by JS -->
  </div>
  <div class="options" id="optionsArea">
    <!-- Filled by JS -->
  </div>
  <div class="hint-area" id="hintArea"></div>
</div>

<div class="controls">
  <div class="section-label">选择年级</div>
  <div class="control-row" id="gradeRow"></div>
  <div id="lessonSection" style="display:none">
    <div class="section-label">按课/单元复习（可选）</div>
    <div class="control-row" id="lessonRow"></div>
  </div>
  <div class="section-label">游戏模式</div>
  <div class="control-row" id="modeRow"></div>
</div>

<!-- Auth modal -->
<div class="modal-overlay hidden" id="authModal" onclick="if(event.target===this)hideAuthModal()">
  <div class="modal">
    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchTab('login')">登录</button>
      <button class="modal-tab" onclick="switchTab('register')">注册</button>
    </div>
    <div class="modal-error" id="authError"></div>
    <input type="text" id="authUsername" placeholder="用户名" maxlength="20" onkeydown="if(event.key==='Enter')document.getElementById('authPassword').focus()">
    <input type="password" id="authPassword" placeholder="密码" onkeydown="if(event.key==='Enter')submitAuth()">
    <button class="modal-submit" id="authSubmit" onclick="submitAuth()">登录</button>
    <button class="modal-close" onclick="hideAuthModal()">取消</button>
  </div>
</div>

<!-- Leaderboard modal -->
<div class="modal-overlay hidden" id="lbModal" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="modal" style="max-width:460px">
    <h2>排行榜</h2>
    <div class="lb-tabs" id="lbTabs"></div>
    <div class="lb-my-rank" id="lbMyRank"></div>
    <div class="lb-list" id="lbList"></div>
    <button class="modal-close" onclick="document.getElementById('lbModal').classList.add('hidden')">关闭</button>
  </div>
</div>

<!-- Shop modal -->
<div class="modal-overlay hidden" id="shopModal" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="modal" style="max-width:460px">
    <h2>商店</h2>
    <div class="shop-coins-bar" id="shopCoinsBar">金币: 0</div>
    <div class="shop-grid" id="shopGrid"></div>
    <button class="modal-close" onclick="document.getElementById('shopModal').classList.add('hidden')">关闭</button>
  </div>
</div>

<!-- Admin login modal -->
<div class="modal-overlay hidden" id="adminLoginModal" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="modal">
    <h2>管理员登录</h2>
    <div class="modal-error" id="adminLoginError"></div>
    <input type="password" id="adminPassword" placeholder="管理员密码" onkeydown="if(event.key==='Enter')submitAdminLogin()">
    <button class="modal-submit" onclick="submitAdminLogin()">登录</button>
    <button class="modal-close" onclick="document.getElementById('adminLoginModal').classList.add('hidden')">取消</button>
  </div>
</div>

<!-- Admin panel modal -->
<div class="modal-overlay hidden" id="adminModal" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="modal" style="max-width:600px">
    <h2>管理员面板</h2>
    <div class="admin-section">
      <h3>用户记录查询</h3>
      <div class="admin-item-list" id="adminUserList" style="max-height:300px"></div>
    </div>
    <div class="admin-section">
      <h3>积分兑换比例</h3>
      <div class="admin-row">
        <input type="number" class="admin-input" id="adminRate" min="1" placeholder="多少积分=1金币" style="max-width:180px">
        <span style="font-size:13px;color:#718096">积分 = 1 金币</span>
        <button class="admin-btn" onclick="saveExchangeRate()">保存</button>
      </div>
      <div id="adminRateMsg" style="font-size:13px;color:#38a169;min-height:18px"></div>
    </div>
    <div class="admin-section">
      <h3>商店商品</h3>
      <div class="admin-row">
        <input type="text" class="admin-input" id="adminItemName" placeholder="商品名称">
        <input type="text" class="admin-input" id="adminItemDesc" placeholder="描述（可选）" style="max-width:120px">
        <input type="number" class="admin-input" id="adminItemPrice" placeholder="价格" min="1" style="max-width:80px">
        <button class="admin-btn" onclick="addShopItem()">添加</button>
      </div>
      <div id="adminItemMsg" style="font-size:13px;color:#e53e3e;min-height:18px"></div>
      <div class="admin-item-list" id="adminItemList"></div>
    </div>
    <button class="modal-close" onclick="adminLogout()">退出管理员</button>
    <button class="modal-close" onclick="document.getElementById('adminModal').classList.add('hidden')">关闭</button>
  </div>
</div>

<!-- Admin user detail modal -->
<div class="modal-overlay hidden" id="adminUserDetailModal" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="modal" style="max-width:600px;max-height:90vh;overflow-y:auto">
    <h2 id="adminUserDetailTitle">用户详情</h2>
    <div id="adminUserDetailContent"></div>
    <button class="modal-close" onclick="document.getElementById('adminUserDetailModal').classList.add('hidden')">关闭</button>
  </div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const MODES = [
  { id: "char_to_pinyin", label: "看字选拼音" },
  { id: "pinyin_to_char", label: "看拼音选字" },
  { id: "listen_to_char", label: "听音选字" },
  { id: "dictation_handwrite", label: "看拼音写词语" },
];

let state = {
  grade: localStorage.getItem("hanzi_grade") || "一年级上",
  mode: localStorage.getItem("hanzi_mode") || "char_to_pinyin",
  lesson: null,   // null = all, number = specific lesson, string = unit name
  score: 0,
  combo: 0,
  comboMax: 0,
  totalQuestions: 0,
  correctAnswers: 0,
  answering: false,
  user: null,
  authTab: "login",
  coins: 0,
  isAdmin: false,
  seenQuestions: new Set(),  // track seen question keys to avoid repeats
  retryQueue: [],            // queue of questions to retry after wrong answer
  retryCount: 0,             // how many times current retry has been attempted
};

let lessonInfo = null; // cached lesson/unit data for current grade

// --- Auth ---
async function checkLogin() {
  const res = await fetch("/api/me");
  const data = await res.json();
  if (data.logged_in) {
    state.user = data.username;
    await loadCoins();
  }
  // Check admin status
  const adminRes = await fetch("/api/admin/check");
  const adminData = await adminRes.json();
  state.isAdmin = adminData.is_admin;
  renderUserBar();
}

async function loadCoins() {
  if (!state.user) return;
  const res = await fetch("/api/coins");
  const data = await res.json();
  if (!data.error) {
    state.coins = data.coins;
    const coinsBox = document.getElementById("coinsBox");
    coinsBox.textContent = `金币: ${state.coins}`;
    coinsBox.style.display = "";
  }
}

function renderUserBar() {
  const bar = document.getElementById("userBar");
  const adminBtn = state.isAdmin
    ? `<button class="user-btn" onclick="showAdminPanel()">管理员</button>`
    : `<button class="admin-link" onclick="showAdminLogin()">管理员</button>`;
  if (state.user) {
    bar.innerHTML = `
      <span>${state.user}</span>
      <button class="user-btn" onclick="showShop()">商店</button>
      <button class="user-btn" onclick="showLeaderboard()">排行榜</button>
      <button class="user-btn" onclick="showScores()">历史成绩</button>
      <button class="user-btn" onclick="doLogout()">退出</button>
      ${adminBtn}
    `;
  } else {
    bar.innerHTML = `
      <button class="user-btn" onclick="showShop()">商店</button>
      <button class="user-btn" onclick="showLeaderboard()">排行榜</button>
      <button class="user-btn" onclick="showAuthModal()">登录 / 注册</button>
      ${adminBtn}
    `;
  }
}

function showAuthModal() {
  document.getElementById("authModal").classList.remove("hidden");
  document.getElementById("authError").textContent = "";
  document.getElementById("authUsername").value = "";
  document.getElementById("authPassword").value = "";
  switchTab("login");
  setTimeout(() => document.getElementById("authUsername").focus(), 50);
}

function hideAuthModal() {
  document.getElementById("authModal").classList.add("hidden");
}

function switchTab(tab) {
  state.authTab = tab;
  const tabs = document.querySelectorAll(".modal-tab");
  tabs[0].classList.toggle("active", tab === "login");
  tabs[1].classList.toggle("active", tab === "register");
  document.getElementById("authSubmit").textContent = tab === "login" ? "登录" : "注册";
  document.getElementById("authError").textContent = "";
}

async function submitAuth() {
  const username = document.getElementById("authUsername").value.trim();
  const password = document.getElementById("authPassword").value;
  const endpoint = state.authTab === "login" ? "/api/login" : "/api/register";

  const res = await fetch(endpoint, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password }),
  });
  const data = await res.json();

  if (data.error) {
    document.getElementById("authError").textContent = data.error;
    return;
  }

  state.user = data.username;
  await loadCoins();
  renderUserBar();
  hideAuthModal();
}

async function doLogout() {
  await saveScore();
  await fetch("/api/logout", { method: "POST" });
  state.user = null;
  state.coins = 0;
  state.totalQuestions = 0;
  state.correctAnswers = 0;
  document.getElementById("coinsBox").style.display = "none";
  renderUserBar();
}

async function saveScore() {
  if (!state.user || state.totalQuestions === 0) return;
  const res = await fetch("/api/scores", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      grade: state.grade,
      mode: state.mode,
      score: state.score,
      combo_max: state.comboMax,
      total_questions: state.totalQuestions,
      correct_answers: state.correctAnswers,
    }),
  });
  const data = await res.json();
  if (data.coins_earned > 0) {
    await loadCoins();
  }
}

async function showScores() {
  await saveScore();
  window.open("/history", "_blank");
}

// --- Leaderboard ---
const MODE_LABELS = {
  char_to_pinyin: "看字选拼音",
  pinyin_to_char: "看拼音选字",
  listen_to_char: "听音选字",
  dictation_handwrite: "看拼音写词语",
};

async function showLeaderboard() {
  await saveScore();
  const modal = document.getElementById("lbModal");
  modal.classList.remove("hidden");

  // Render mode tabs
  const tabs = document.getElementById("lbTabs");
  const allModes = [{ id: "", label: "全部" }, ...MODES];
  tabs.innerHTML = allModes.map(m =>
    `<button class="lb-tab${m.id === "" ? " active" : ""}" onclick="loadLeaderboard('${m.id}', this)">${m.label}</button>`
  ).join("");

  loadLeaderboard("", tabs.querySelector(".lb-tab"));
}

async function loadLeaderboard(mode, tabBtn) {
  // Update active tab
  document.querySelectorAll(".lb-tab").forEach(t => t.classList.remove("active"));
  if (tabBtn) tabBtn.classList.add("active");

  const res = await fetch(`/api/leaderboard?mode=${encodeURIComponent(mode)}`);
  const data = await res.json();

  const myRankEl = document.getElementById("lbMyRank");
  if (data.my_rank) {
    myRankEl.innerHTML = `你的排名: 第${data.my_rank.rank}名 | 累积${data.my_rank.total_score}分 | 正确率${data.my_rank.accuracy}%`;
    myRankEl.style.display = "block";
  } else {
    myRankEl.style.display = "none";
  }

  const list = document.getElementById("lbList");
  if (!data.leaderboard || data.leaderboard.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#a0aec0;padding:20px">暂无数据</div>';
    return;
  }

  list.innerHTML = data.leaderboard.map(r => {
    const rankClass = r.rank === 1 ? "gold" : r.rank === 2 ? "silver" : r.rank === 3 ? "bronze" : "";
    const isMe = state.user && r.username === state.user;
    return `<div class="lb-row${isMe ? " me" : ""}">
      <div class="lb-rank ${rankClass}">${r.rank}</div>
      <div class="lb-name">${r.username}</div>
      <div class="lb-score">${r.total_score}分<span class="lb-acc">${r.accuracy}%</span></div>
    </div>`;
  }).join("");
}

// --- Shop ---
async function showShop() {
  const modal = document.getElementById("shopModal");
  modal.classList.remove("hidden");

  // Show coins bar
  const coinsBar = document.getElementById("shopCoinsBar");
  if (state.user) {
    await loadCoins();
    coinsBar.textContent = `我的金币: ${state.coins}`;
    coinsBar.style.display = "";
  } else {
    coinsBar.style.display = "none";
  }

  // Load items
  const res = await fetch("/api/shop");
  const data = await res.json();
  const grid = document.getElementById("shopGrid");

  if (!data.items || data.items.length === 0) {
    grid.innerHTML = '<div class="shop-empty">商店暂无商品，敬请期待!</div>';
    return;
  }

  grid.innerHTML = data.items.map(item => {
    const canBuy = state.user && state.coins >= item.price;
    return `<div class="shop-item">
      <div class="shop-item-info">
        <div class="shop-item-name">${item.name}</div>
        ${item.description ? `<div class="shop-item-desc">${item.description}</div>` : ""}
      </div>
      <div class="shop-item-price">${item.price} 金币</div>
      <button class="shop-buy-btn" onclick="buyItem(${item.id}, '${item.name}', ${item.price})" ${canBuy ? "" : "disabled"}>${state.user ? "购买" : "登录后购买"}</button>
    </div>`;
  }).join("");
}

async function buyItem(itemId, name, price) {
  if (!state.user) return;
  if (!confirm(`确定花费 ${price} 金币购买「${name}」？`)) return;

  const res = await fetch("/api/shop/buy", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ item_id: itemId }),
  });
  const data = await res.json();
  if (data.error) {
    alert(data.error);
    return;
  }
  state.coins = data.coins;
  document.getElementById("coinsBox").textContent = `金币: ${state.coins}`;
  alert(`购买成功!`);
  showShop(); // Refresh
}

// --- Admin ---
function showAdminLogin() {
  document.getElementById("adminLoginModal").classList.remove("hidden");
  document.getElementById("adminLoginError").textContent = "";
  document.getElementById("adminPassword").value = "";
  setTimeout(() => document.getElementById("adminPassword").focus(), 50);
}

async function submitAdminLogin() {
  const password = document.getElementById("adminPassword").value;
  const res = await fetch("/api/admin/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password }),
  });
  const data = await res.json();
  if (data.error) {
    document.getElementById("adminLoginError").textContent = data.error;
    return;
  }
  state.isAdmin = true;
  document.getElementById("adminLoginModal").classList.add("hidden");
  renderUserBar();
  showAdminPanel();
}

async function showAdminPanel() {
  if (!state.isAdmin) return;
  const modal = document.getElementById("adminModal");
  modal.classList.remove("hidden");

  // Load exchange rate
  const setRes = await fetch("/api/admin/settings");
  const setData = await setRes.json();
  document.getElementById("adminRate").value = setData.exchange_rate;
  document.getElementById("adminRateMsg").textContent = "";

  // Load users
  await refreshAdminUsers();

  // Load items
  await refreshAdminItems();
}

async function refreshAdminUsers() {
  const res = await fetch("/api/admin/users");
  const data = await res.json();
  const list = document.getElementById("adminUserList");
  if (!data.users || data.users.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#a0aec0;padding:16px;font-size:13px">暂无用户</div>';
    return;
  }
  list.innerHTML = data.users.map(u => `
    <div class="admin-item-row" style="cursor:pointer" onclick="showUserDetail(${u.id}, '${u.username}')">
      <span style="flex:1"><strong>${u.username}</strong></span>
      <span style="font-size:12px;color:#718096;margin-right:8px">总分${u.total_score} | 题${u.total_questions} | 正确率${u.accuracy}% | 错题${u.wrong_count} | 已掌握${u.mastered_count}</span>
      <span style="font-size:12px;color:#d69e2e">${u.coins}币</span>
    </div>
  `).join("");
}

async function showUserDetail(userId, username) {
  const res = await fetch(`/api/admin/user/${userId}/details`);
  const data = await res.json();
  if (data.error) { alert(data.error); return; }

  document.getElementById("adminUserDetailTitle").textContent = `${username} 的详情`;
  const content = document.getElementById("adminUserDetailContent");

  const modeLabels = { char_to_pinyin: "看字选拼音", pinyin_to_char: "看拼音选字", listen_to_char: "听音选字", dictation_handwrite: "看拼音写词语" };

  let html = '';

  // Score history
  html += '<h3 style="font-size:15px;margin:12px 0 8px;border-bottom:1px solid #e2e8f0;padding-bottom:4px">历史成绩</h3>';
  if (data.scores.length === 0) {
    html += '<div style="color:#a0aec0;font-size:13px;padding:8px 0">暂无成绩</div>';
  } else {
    html += '<div style="max-height:200px;overflow-y:auto;font-size:13px">';
    html += '<table style="width:100%;border-collapse:collapse"><tr style="background:#f7fafc"><th style="padding:4px 6px;text-align:left">日期</th><th>年级</th><th>模式</th><th>题数</th><th>正确</th><th>得分</th></tr>';
    data.scores.forEach(s => {
      const acc = s.total_questions > 0 ? Math.round(s.correct_answers / s.total_questions * 100) : 0;
      html += `<tr style="border-bottom:1px solid #f0f0f0"><td style="padding:4px 6px">${s.date}</td><td style="text-align:center">${s.grade}</td><td style="text-align:center">${modeLabels[s.mode] || s.mode}</td><td style="text-align:center">${s.total_questions}</td><td style="text-align:center">${s.correct_answers}(${acc}%)</td><td style="text-align:center;font-weight:700;color:#5a67d8">${s.score}</td></tr>`;
    });
    html += '</table></div>';
  }

  // Wrong answers
  html += '<h3 style="font-size:15px;margin:16px 0 8px;border-bottom:1px solid #e2e8f0;padding-bottom:4px">错题记录 <span style="font-size:12px;color:#a0aec0">(' + data.wrong_answers.length + '题)</span></h3>';
  if (data.wrong_answers.length === 0) {
    html += '<div style="color:#a0aec0;font-size:13px;padding:8px 0">暂无错题</div>';
  } else {
    html += '<div style="max-height:200px;overflow-y:auto;font-size:13px">';
    html += '<table style="width:100%;border-collapse:collapse"><tr style="background:#f7fafc"><th style="padding:4px 6px;text-align:left">字/词</th><th>拼音</th><th>组词</th><th>模式</th><th>复习次数</th><th>日期</th></tr>';
    data.wrong_answers.forEach(w => {
      const rcColor = w.review_count === 0 ? '#e53e3e' : w.review_count >= 2 ? '#38a169' : '#d69e2e';
      html += `<tr style="border-bottom:1px solid #f0f0f0"><td style="padding:4px 6px;font-size:18px;font-weight:700">${w.character}</td><td>${w.pinyin}</td><td style="font-size:12px">${w.words}</td><td style="text-align:center;font-size:12px">${modeLabels[w.mode] || w.mode}</td><td style="text-align:center;color:${rcColor};font-weight:700">${w.review_count}</td><td style="font-size:12px">${w.date}</td></tr>`;
    });
    html += '</table></div>';
  }

  // Mastered
  html += '<h3 style="font-size:15px;margin:16px 0 8px;border-bottom:1px solid #e2e8f0;padding-bottom:4px">已掌握 <span style="font-size:12px;color:#a0aec0">(' + data.mastered.length + '词)</span></h3>';
  if (data.mastered.length === 0) {
    html += '<div style="color:#a0aec0;font-size:13px;padding:8px 0">暂无</div>';
  } else {
    html += '<div style="max-height:150px;overflow-y:auto;font-size:13px;display:flex;flex-wrap:wrap;gap:6px">';
    data.mastered.forEach(m => {
      html += `<span style="background:#c6f6d5;padding:2px 8px;border-radius:8px;font-weight:600">${m.character}</span>`;
    });
    html += '</div>';
  }

  content.innerHTML = html;
  document.getElementById("adminUserDetailModal").classList.remove("hidden");
}

async function saveExchangeRate() {
  const rate = parseInt(document.getElementById("adminRate").value);
  if (!rate || rate <= 0) {
    document.getElementById("adminRateMsg").textContent = "请输入正整数";
    document.getElementById("adminRateMsg").style.color = "#e53e3e";
    return;
  }
  const res = await fetch("/api/admin/settings", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ exchange_rate: rate }),
  });
  const data = await res.json();
  if (data.error) {
    document.getElementById("adminRateMsg").textContent = data.error;
    document.getElementById("adminRateMsg").style.color = "#e53e3e";
  } else {
    document.getElementById("adminRateMsg").textContent = "已保存";
    document.getElementById("adminRateMsg").style.color = "#38a169";
  }
}

async function addShopItem() {
  const name = document.getElementById("adminItemName").value.trim();
  const description = document.getElementById("adminItemDesc").value.trim();
  const price = parseInt(document.getElementById("adminItemPrice").value);
  const msg = document.getElementById("adminItemMsg");

  if (!name || !price || price <= 0) {
    msg.textContent = "名称和价格（正整数）不能为空";
    return;
  }

  const res = await fetch("/api/admin/items", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, description, price }),
  });
  const data = await res.json();
  if (data.error) {
    msg.textContent = data.error;
    return;
  }
  msg.textContent = "";
  document.getElementById("adminItemName").value = "";
  document.getElementById("adminItemDesc").value = "";
  document.getElementById("adminItemPrice").value = "";
  await refreshAdminItems();
}

async function refreshAdminItems() {
  const res = await fetch("/api/admin/items");
  const data = await res.json();
  const list = document.getElementById("adminItemList");
  if (!data.items || data.items.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#a0aec0;padding:16px;font-size:13px">暂无商品</div>';
    return;
  }
  list.innerHTML = data.items.map(item => `
    <div class="admin-item-row">
      <span><strong>${item.name}</strong> — ${item.price} 金币${item.description ? " (" + item.description + ")" : ""}</span>
      <button class="admin-btn danger" onclick="deleteItem(${item.id})" style="padding:4px 12px;font-size:12px">删除</button>
    </div>
  `).join("");
}

async function deleteItem(id) {
  if (!confirm("确定删除该商品？")) return;
  await fetch(`/api/admin/items/${id}`, { method: "DELETE" });
  await refreshAdminItems();
}

async function adminLogout() {
  await fetch("/api/admin/logout", { method: "POST" });
  state.isAdmin = false;
  document.getElementById("adminModal").classList.add("hidden");
  renderUserBar();
}

// --- Lesson/Unit selector ---
async function loadLessonInfo(grade) {
  const res = await fetch(`/api/lessons?grade=${encodeURIComponent(grade)}`);
  lessonInfo = await res.json();
  renderLessons();
}

function renderLessons() {
  const section = document.getElementById("lessonSection");
  const row = document.getElementById("lessonRow");

  if (!lessonInfo || !lessonInfo.has_lessons) {
    section.style.display = "none";
    state.lesson = null;
    return;
  }

  section.style.display = "";
  row.innerHTML = "";

  // "全部" button
  const allBtn = document.createElement("button");
  allBtn.className = "lesson-btn" + (state.lesson === null ? " active" : "");
  allBtn.textContent = "全部";
  allBtn.onclick = () => {
    state.lesson = null;
    document.querySelectorAll(".lesson-btn").forEach(b => b.classList.remove("active"));
    allBtn.classList.add("active");
    loadQuestion();
  };
  row.appendChild(allBtn);

  // Unit buttons
  lessonInfo.units.forEach(u => {
    const btn = document.createElement("button");
    btn.className = "lesson-btn" + (state.lesson === u.name ? " active" : "");
    btn.textContent = u.name;
    btn.onclick = () => {
      state.lesson = u.name;
      document.querySelectorAll(".lesson-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      loadQuestion();
    };
    row.appendChild(btn);
  });

  // Individual lesson buttons (skip lessons with no vocabulary)
  lessonInfo.lessons.forEach(l => {
    if (l.ciyu_count === 0) return;
    const btn = document.createElement("button");
    btn.className = "lesson-btn" + (state.lesson === l.lesson ? " active" : "");
    btn.textContent = `第${l.lesson}课`;
    btn.onclick = () => {
      state.lesson = l.lesson;
      document.querySelectorAll(".lesson-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      loadQuestion();
    };
    row.appendChild(btn);
  });
}

// --- Init ---
async function init() {
  await checkLogin();
  const res = await fetch("/api/grades");
  const data = await res.json();
  renderGrades(data.grades);
  renderModes();
  await loadLessonInfo(state.grade);
  loadQuestion();
}

function renderGrades(grades) {
  const row = document.getElementById("gradeRow");
  row.innerHTML = "";
  grades.forEach(g => {
    const btn = document.createElement("button");
    btn.className = "grade-btn" + (g === state.grade ? " active" : "");
    btn.textContent = g;
    btn.onclick = async () => {
      await saveScore();
      state.grade = g;
      localStorage.setItem("hanzi_grade", g);
      state.lesson = null;
      state.score = 0;
      state.combo = 0;
      state.comboMax = 0;
      state.totalQuestions = 0;
      state.correctAnswers = 0;
      state.seenQuestions.clear();
      state.retryQueue = [];
      state.retryCount = 0;
      updateScoreboard();
      document.querySelectorAll(".grade-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      await loadLessonInfo(g);
      loadQuestion();
    };
    row.appendChild(btn);
  });
}

function renderModes() {
  const row = document.getElementById("modeRow");
  row.innerHTML = "";
  MODES.forEach(m => {
    const btn = document.createElement("button");
    btn.className = "mode-btn" + (m.id === state.mode ? " active" : "");
    btn.textContent = m.label;
    btn.onclick = async () => {
      await saveScore();
      state.mode = m.id;
      localStorage.setItem("hanzi_mode", m.id);
      state.score = 0;
      state.combo = 0;
      state.comboMax = 0;
      state.totalQuestions = 0;
      state.correctAnswers = 0;
      state.seenQuestions.clear();
      state.retryQueue = [];
      state.retryCount = 0;
      updateScoreboard();
      document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      loadQuestion();
    };
    row.appendChild(btn);
  });
}

// --- Load question ---
async function loadQuestion() {
  state.answering = false;
  document.getElementById("hintArea").innerHTML = "";

  // Check retry queue first (wrong answer to repeat immediately)
  if (state.retryQueue.length > 0) {
    const retryQ = state.retryQueue[0];
    if (retryQ.mode === "dictation_handwrite") {
      renderQuestion(retryQ);
      return;
    }
    // For multiple choice, reshuffle the options
    const reshuffled = Object.assign({}, retryQ);
    const opts = [...reshuffled.options];
    // Shuffle options
    for (let i = opts.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [opts[i], opts[j]] = [opts[j], opts[i]];
    }
    reshuffled.options = opts;
    reshuffled.correct_index = opts.indexOf(reshuffled.answer);
    renderQuestion(reshuffled);
    return;
  }

  let url = `/api/question?grade=${encodeURIComponent(state.grade)}&mode=${state.mode}`;
  if (state.lesson !== null) {
    if (typeof state.lesson === "string" && state.lesson.startsWith("第")) {
      url += `&unit=${encodeURIComponent(state.lesson)}`;
    } else {
      url += `&lesson=${state.lesson}`;
    }
  }

  // Try to get a question not seen before, with retries
  let q = null;
  for (let attempt = 0; attempt < 8; attempt++) {
    const res = await fetch(url);
    q = await res.json();
    if (q.error) break;
    const qKey = state.mode + "|" + (q.answer || q.question);
    if (!state.seenQuestions.has(qKey)) {
      state.seenQuestions.add(qKey);
      break;
    }
    // If we've seen all questions, clear and accept this one
    if (attempt === 7) {
      state.seenQuestions.clear();
      state.seenQuestions.add(qKey);
    }
  }

  if (q.error) {
    document.getElementById("questionArea").innerHTML = `<div style="color:#e53e3e">${q.error}</div>`;
    return;
  }

  renderQuestion(q);
}

function renderQuestion(q) {
  const area = document.getElementById("questionArea");
  const opts = document.getElementById("optionsArea");

  // Question display
  if (q.mode === "char_to_pinyin") {
    area.innerHTML = `
      <div class="question-label">请选择正确的拼音</div>
      <div class="question-char">${q.question}</div>
    `;
  } else if (q.mode === "pinyin_to_char") {
    area.innerHTML = `
      <div class="question-label">请选择正确的汉字</div>
      <div class="question-pinyin">${q.question}</div>
    `;
  } else if (q.mode === "listen_to_char") {
    area.innerHTML = `
      <div class="question-label">听读音，选汉字</div>
      <button class="listen-btn" onclick="speakChar('${q.question}')">&#128264;</button>
    `;
    // Auto-play on load
    setTimeout(() => speakChar(q.question), 300);
  } else if (q.mode === "dictation_handwrite") {
    area.innerHTML = `
      <div class="question-label">看拼音写词语</div>
      <div class="question-pinyin">${q.question}</div>
    `;
  }

  // Options / input area
  opts.innerHTML = "";

  if (q.mode === "dictation_handwrite") {
    const charCount = q.answer.length;
    const cellSize = 168;
    const isMobile = window.innerWidth <= 500;
    // For 3+ chars on mobile, use 2-column layout
    const cols = (isMobile && charCount >= 3) ? 2 : charCount;
    const rows = Math.ceil(charCount / cols);
    const canvasW = cols * cellSize;
    const canvasH = rows * cellSize;
    opts.style.display = "flex";
    opts.style.gridTemplateColumns = "";
    opts.style.flexDirection = "column";
    opts.style.alignItems = "center";
    opts.style.gap = "12px";

    opts.innerHTML = `
      <div class="canvas-wrap">
        <div class="hw-canvas-box" style="position:relative;width:${canvasW}px;height:${canvasH}px">
          <canvas id="writeCanvas" width="${canvasW}" height="${canvasH}" style="width:${canvasW}px;height:${canvasH}px"></canvas>
          <div class="hw-grid-lines" id="hwGrid"></div>
        </div>
        <div class="canvas-controls">
          <button class="canvas-btn" onclick="clearCanvas()">清除</button>
          <button class="canvas-btn" id="hwSubmitBtn" onclick="submitHandwriting()">确认</button>
        </div>
        <div id="hwStatus" style="color:#999;font-size:14px;min-height:20px;text-align:center"></div>
      </div>
    `;
    // Draw grid lines between character cells
    const gridEl = document.getElementById("hwGrid");
    // Vertical lines between columns
    for (let i = 1; i < cols; i++) {
      const line = document.createElement("div");
      line.className = "hw-grid-line";
      line.style.left = (i * cellSize) + "px";
      gridEl.appendChild(line);
    }
    // Horizontal lines between rows
    for (let r = 1; r < rows; r++) {
      const line = document.createElement("div");
      line.className = "hw-grid-line-h";
      line.style.top = (r * cellSize) + "px";
      gridEl.appendChild(line);
    }
    initCanvas();
    state.currentQ = q;
    state.answering = true;
    return;
  }

  // Reset grid style for multiple-choice modes
  opts.style.display = "grid";
  opts.style.gridTemplateColumns = "1fr 1fr";
  opts.style.flexDirection = "";
  opts.style.alignItems = "";

  const colors = ["#5a67d8", "#d69e2e", "#38a169", "#e53e3e"];
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = opt;
    btn.style.borderColor = colors[i % 4] + "33";
    btn.onclick = () => handleAnswer(i, q, btn);
    opts.appendChild(btn);
  });

  state.answering = true;
}

// --- Answer handling ---
function handleAnswer(selected, q, btn) {
  if (!state.answering) return;
  state.answering = false;

  const allBtns = document.querySelectorAll(".option-btn");
  allBtns.forEach(b => b.classList.add("disabled"));

  const isCorrect = selected === q.correct_index;
  const hint = document.getElementById("hintArea");

  state.totalQuestions += 1;
  if (isCorrect) {
    btn.classList.add("correct");
    state.correctAnswers += 1;
    state.combo += 1;
    if (state.combo > state.comboMax) state.comboMax = state.combo;
    const bonus = Math.min(state.combo, 10);
    const points = 10 + bonus * 2;
    state.score += points;
    hint.innerHTML = `<span class="correct-text">正确! +${points}分</span> &nbsp; 组词: ${q.word_hint}`;

    if (state.combo > 0 && state.combo % 5 === 0) {
      spawnConfetti();
    }

    const comboEl = document.getElementById("comboBox");
    comboEl.classList.remove("hot");
    void comboEl.offsetWidth;
    comboEl.classList.add("hot");
  } else {
    btn.classList.add("wrong");
    allBtns[q.correct_index].classList.add("reveal");
    state.combo = 0;
    hint.innerHTML = `<span class="wrong-text">答错了!</span><br><span style="font-size:28px;font-weight:900;color:#2d3748;display:inline-block;margin:8px 0">正确答案: ${q.answer}</span><br><span style="color:#718096">组词: ${q.word_hint}</span>`;
    // Only record and queue retry for first attempt (not retries)
    if (state.retryQueue.length === 0) {
      recordWrongAnswer(q);
      state.retryQueue.push(q);
      state.retryCount = 0;
    } else {
      // This is a retry attempt
      state.retryCount += 1;
      if (state.retryCount >= 2) {
        // Max 2 retries, move on
        state.retryQueue.shift();
        state.retryCount = 0;
      }
    }
  }

  updateScoreboard();

  if (isCorrect) {
    // If this was a retry and answered correctly, remove from queue
    if (state.retryQueue.length > 0 && state.retryQueue[0].answer === q.answer) {
      state.retryQueue.shift();
      state.retryCount = 0;
    }
    setTimeout(loadQuestion, 100);
  } else {
    // Show OK button and wait for user to click
    const okBtn = document.createElement("button");
    okBtn.textContent = "OK";
    okBtn.className = "ok-btn";
    okBtn.onclick = () => loadQuestion();
    hint.appendChild(okBtn);
  }
}

// --- Dictation ---
function handleDictationAnswer(userInput, q) {
  if (!state.answering) return;
  state.answering = false;

  const isCorrect = userInput === q.answer;
  const hint = document.getElementById("hintArea");

  state.totalQuestions += 1;
  if (isCorrect) {
    state.correctAnswers += 1;
    state.combo += 1;
    if (state.combo > state.comboMax) state.comboMax = state.combo;
    const bonus = Math.min(state.combo, 10);
    const points = 10 + bonus * 2;
    state.score += points;
    hint.innerHTML = `<span class="correct-text">正确! +${points}分</span>`;

    if (state.combo > 0 && state.combo % 5 === 0) spawnConfetti();
    const comboEl = document.getElementById("comboBox");
    comboEl.classList.remove("hot");
    void comboEl.offsetWidth;
    comboEl.classList.add("hot");
  } else {
    state.combo = 0;
    hint.innerHTML = `<span class="wrong-text">答错了!</span> 你写的: ${userInput}<br><span style="font-size:28px;font-weight:900;color:#2d3748;display:inline-block;margin:8px 0">正确答案: ${q.answer}</span>`;
    if (state.retryQueue.length === 0) {
      recordWrongAnswer(q);
      state.retryQueue.push(q);
      state.retryCount = 0;
    } else {
      state.retryCount += 1;
      if (state.retryCount >= 2) {
        state.retryQueue.shift();
        state.retryCount = 0;
      }
    }
  }

  updateScoreboard();

  if (isCorrect) {
    if (state.retryQueue.length > 0 && state.retryQueue[0].answer === q.answer) {
      state.retryQueue.shift();
      state.retryCount = 0;
    }
    setTimeout(loadQuestion, 100);
  } else {
    const okBtn = document.createElement("button");
    okBtn.textContent = "OK";
    okBtn.className = "ok-btn";
    okBtn.onclick = () => loadQuestion();
    hint.appendChild(okBtn);
  }
}

// --- Canvas handwriting ---
let canvasStrokes = [];
let currentStroke = null;
let isDrawing = false;

function initCanvas() {
  canvasStrokes = [];
  const canvas = document.getElementById("writeCanvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  ctx.lineWidth = 5;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = "#2d3748";

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return [t.clientX - rect.left, t.clientY - rect.top];
  }

  function startStroke(e) {
    e.preventDefault();
    isDrawing = true;
    const [x, y] = getPos(e);
    currentStroke = [[x], [y], [Date.now()]];
    ctx.beginPath();
    ctx.moveTo(x, y);
  }

  function moveStroke(e) {
    if (!isDrawing) return;
    e.preventDefault();
    const [x, y] = getPos(e);
    currentStroke[0].push(x);
    currentStroke[1].push(y);
    currentStroke[2].push(Date.now());
    ctx.lineTo(x, y);
    ctx.stroke();
  }

  function endStroke(e) {
    if (!isDrawing) return;
    e.preventDefault();
    isDrawing = false;
    if (currentStroke && currentStroke[0].length > 0) {
      canvasStrokes.push(currentStroke);
    }
    currentStroke = null;
  }

  canvas.addEventListener("mousedown", startStroke);
  canvas.addEventListener("mousemove", moveStroke);
  canvas.addEventListener("mouseup", endStroke);
  canvas.addEventListener("mouseleave", endStroke);
  canvas.addEventListener("touchstart", startStroke);
  canvas.addEventListener("touchmove", moveStroke);
  canvas.addEventListener("touchend", endStroke);
}

function clearCanvas() {
  canvasStrokes = [];
  const canvas = document.getElementById("writeCanvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

async function submitHandwriting() {
  if (canvasStrokes.length === 0) return;
  if (!state.answering) return;

  const canvas = document.getElementById("writeCanvas");
  const statusEl = document.getElementById("hwStatus");
  const btn = document.getElementById("hwSubmitBtn");
  statusEl.textContent = "正在识别...";
  btn.disabled = true;

  try {
    const res = await fetch("/api/handwriting", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ strokes: canvasStrokes, width: canvas.width, height: canvas.height }),
    });
    const data = await res.json();

    // Google API returns: ["SUCCESS", [["zh-t-i0-handwrit", ["词1","词2",...]]]]
    let topResult = null;
    try {
      if (data[0] === "SUCCESS") {
        topResult = data[1][0][1][0];
      }
    } catch (e) {}

    if (!topResult) {
      statusEl.textContent = "未能识别，请清除后重写";
      btn.disabled = false;
      return;
    }

    statusEl.textContent = `识别结果: ${topResult}`;
    handleDictationAnswer(topResult, state.currentQ);
  } catch (e) {
    statusEl.textContent = "识别失败，请重试";
    btn.disabled = false;
  }
}

// --- Wrong answer recording ---
function recordWrongAnswer(q) {
  if (!state.user) return;
  let character, pinyin;
  if (q.mode === "char_to_pinyin") {
    character = q.question;
    pinyin = q.answer;
  } else if (q.mode === "pinyin_to_char") {
    character = q.answer;
    pinyin = q.question;
  } else if (q.mode === "listen_to_char") {
    character = q.answer;
    pinyin = q.question_pinyin || "";
  } else {
    // dictation: answer is a word, question is pinyin
    character = q.answer;
    pinyin = q.question;
  }
  fetch("/api/wrong_answers", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      character, pinyin,
      words: q.word_hint || q.answer || "",
      grade: state.grade,
      mode: state.mode,
    }),
  });
}

function updateScoreboard() {
  document.getElementById("scoreBox").textContent = `得分: ${state.score}`;
  document.getElementById("comboBox").textContent = `连击: ${state.combo}`;
}

// --- TTS (edge-tts via server) ---
let ttsAudio = null;

function speakChar(char) {
  // Stop any currently playing audio
  if (ttsAudio) {
    ttsAudio.pause();
    ttsAudio.currentTime = 0;
  }

  const url = `/api/tts?text=${encodeURIComponent(char)}&elongate=true`;
  ttsAudio = new Audio(url);
  ttsAudio.volume = 1.0;
  ttsAudio.play();
}

// --- Confetti ---
function spawnConfetti() {
  const container = document.getElementById("celebration");
  const colors = ["#f6e05e", "#fc8181", "#68d391", "#63b3ed", "#d6bcfa", "#fbb6ce"];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement("div");
    el.className = "confetti";
    el.style.left = Math.random() * 100 + "%";
    el.style.top = "-20px";
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDelay = Math.random() * 0.5 + "s";
    el.style.animationDuration = (1 + Math.random()) + "s";
    container.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
}

// Save score when leaving the page
window.addEventListener("beforeunload", () => {
  if (state.user && state.totalQuestions > 0) {
    navigator.sendBeacon("/api/scores", new Blob([JSON.stringify({
      grade: state.grade,
      mode: state.mode,
      score: state.score,
      combo_max: state.comboMax,
      total_questions: state.totalQuestions,
      correct_answers: state.correctAnswers,
    })], { type: "application/json" }));
  }
});

init();
</script>
